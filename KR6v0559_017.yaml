body:
  text: 人生佛學的説明十七年夏在上海儉德儲蓄會講稿一佛學之名義二佛學之二大原則三佛學之歷史遷變四現代之人世與中國五人生佛學之大旨附崔參筆記一佛學之名義對於宇宙萬有之真相或法界諸法之實相成功最究竟最圓滿之知覺者或無上正遍覺者謂之佛陀由此先覺之佛陀對於我們人類及其餘一切含生有情等類之後覺未知者用言音形儀開發顯示其所覺知之宇宙萬有真相并導令解悟修入而同得成佛之種種理法行律謂之佛學二佛學之二大原則佛學由佛陀圓覺之真理與群生各別之時機所構成故佛學有二大原則一曰契真理二曰協時機非契真理則失佛學之體非協時機則失佛學之用真理即佛陀所究竟圓滿覺知之宇宙萬有真相時機乃一方域一時代一生類一民族各別之心習或思想文化必協時機而有佛陀之現身説法故曰佛陀以世界有情為依又曰佛陀有依他心無自依心三佛學之歷史遷變現行今此地球人類間之佛學乃發源於二千餘年前現身印度之釋迦牟尼佛者當時印度民族之文化思想則承襲或反動於婆羅門教之各求個人解脫之心習也雖不無文殊彌勒維摩善財等少數大乘之士能領受探求佛陀圓覺之真理而一般束於民族心習者則格格不入佛陀以之只能依外道之有我個人解脫而易之以小乘之無我個人解脫使真能得到個人之解脫涅槃佛示寂後雖文殊彌勒等所聞大乘法亦同結集傳持而形成為教團以住持當時之佛教者則為小乘衆歷四五百年以小乘諸部分裂傳大乘思想者乃乘隙興起歷五六百年性相代興後至密宗盛行始漸成大乘教團而印度之佛教即衰亡矣佛教之來中國以先有軌範人生之儒教與祭天祀鬼求神仙之道教故承受發揮者雖在大乘思想然以人生社會已為儒化所專有故佛法應乎少數儒道之玄學者則為禪宗與天台賢首遊方之外應乎一般民衆之習俗者則由淨土密宗而流為專度亡靈及鬼神禍福之迷信隨俗之習而真正之佛法未能成中國之人群化也且反受中國宗法社會家族制度之影響而將原來六和僧衆之僧團亦化成變態之家族制觀此印中佛史之沿革可知大乘佛學在印度與中國皆未嘗成立教團及成為民衆化矣四現代之人世與中國現代的人間之思想生活雖各民族各有其特殊之處然以世界交通之故已成為普遍之世界文化者則為三事一現實的人生化二證據的科學化三組織的群衆化今為中國民族之文化中心者則為三民主義之文化此三民主義文化則縱承國族五千年文化之精華而橫吸現代普遍世界之文化經過選擇改革以構成者也而尤以現代普遍的世界文化為要素觀此可知施設現代協契時機之佛學當何從矣五人生佛學之大旨佛法雖普為一切有情類而以適應現代之文化故當以人類為中心而施設契時機之佛學佛法雖無間生死存亡而以適應現代之現實的人生化故當以求人類生存發達為中心而施設契時機之佛學是為人生佛學之第一義佛法雖亦容無我的個人解脫之小乘佛學今以適應現代人生之組織的群衆化故當以大悲大智普為群衆之大乘法為中心而施設契時機之佛學是為人生佛學之第二義大乘佛法雖為令一切有情普皆成佛之究竟圓滿法然大乘法有圓漸圓頓之別今以適應重徵驗重秩序重證據之現代科學化故當以圓漸的大乘法為中心而施設契時機之佛學是為人生佛學之第三義故人生佛學者當暫置天鬼等於不論且從人生求其完成以至於發達為超人生超超人生洗除一切近於天教鬼教等迷信依現代的人生化群衆化科學化為基於此基礎上建設趨向無上正遍覺之圓漸的大乘佛學其道當先從大乘經論研求得正確之圓解發菩提心學菩薩行先修習大乘十信位菩薩之善根獲得初步之證驗完成人生成為孔丘王守仁一般之人聖然後再漸趨入於十住十行十回向四加行十地等三無數劫之長劫修證由超人超超人以至於佛而其建立則當有專以修學及宣傳與辦理於佛學為職業之僧團及普收全民衆之學會使皆成為大乘的組織化與紀律化滌除舊染湛發新光見海刊九卷六期附崔參筆記此行由印赴歐有兩目的一以錫蘭緬甸人士思發起釋迦教會議而印度亦來緘邀請故欲赴印發起此會議一人生佛學為佛學上之一題而此題所討論者最為今世人士所要求宜特別提倡因思赴歐一行藉察此部分佛學真理是否的確契機焉甲佛學之名義佛舊譯佛圖從一字譯音其義訓則為覺者覺者猶言學者謂有覺悟之人也然此所謂覺非尋常一部分的覺乃普遍的正確的覺也謂之正遍覺正遍覺者其覺最遍最正最高無上故又稱無上覺合言之為無上正遍覺佛典之諸法實相即普通所謂宇宙萬有真相佛學與通常科學哲學不同科學家以五官感覺為工具根據其所得之經驗而歸納之其所得結論為種種之學問此種學問恆確而不遍屬部份的至哲學家則以一種假設為根據而論宇宙事物其結論為普遍的然恆患不確蓋確而遍惟佛學為能而又有超常之覺者所謂無上正遍覺彼於事事物物萬有之相皆能體妙入微人得此覺即為無上正遍覺者即佛圖也然萬有皆有真相相亦皆有變遷處處變遷時時變遷而在佛識大有之中其變其住其有其無其實其虛自佛察之皆是真相此之察覺謂之無上正遍覺夫一切學問必有對相必承認此對相為真而後結論可以成立宇宙萬物無不有真相惟微察之乃能認識乃能無上遍覺釋迦即能得此覺者也然則佛學非科學之確定一物一事而不移亦非其他哲學之超人生而恆不切實際者也佛學以為一切真相皆在尋常萬有之中日用事物之內故無上正遍覺非惟佛能得之人皆能得之非惟人能得之一切有情生物盡能得之人能覺悟宇宙萬有之真相即能最高無上即能成佛此佛教之所以異於群教者也彼佛以其無上正遍覺覺乎宇宙萬有談佛學者即從而導人將何以若是將何以成佛他教未有能令盡人為耶穌為謨罕默德者而佛學獨令盡人而佛之以是成教佛教者教人以無上正遍覺覺萬有真相者也一部份之哲學科學據數理論理談宇宙之相如天空無垠地球造成無限億載此固理可推斷而不可見聞佛教於尋常萬有之內推論大理自匹夫匹婦皆獲覺之佛與人人同與今世之人同唯佛已得此覺悟詳明其所以得覺之軌令人循軌而皆得之蓋可以驗諸行非徒載諸言而已也故佛教有二部份一佛以無上正遍覺覺察萬有真相一佛更詳此所以察悟之法以教人一則談理一則實驗也乙佛學的兩大原則佛教之目的為導人以無上正遍覺覺萬有真相即述釋迦已履之成法非憑空撰作者也又非釋迦以理想推論比照者也若此教為釋迦個人的則釋迦自己已成就而獲正果正不必更設此種學問其所以創立此教者蓋欲覺夫世間欲覺而未覺之人故佛教為佛之所以自覺與佛之所以覺人由此兩方之關係以構成者學問固必先經先覺之提倡而其施教亦必顧及學之者之境地若何其必易入而後易行由是佛教之兩大原則生焉原則維何合真理契時機是也真理者萬有之實相而佛學之成立在察茲相故不可不相合契時機者今語所謂合世界潮流符群衆心理也佛教目的在覺人故被覺者之心理與環境不可不注意也抑徒合時機則近投機事業徒切真理不問世界潮流則真理至高宜若登天然欲令常人驟覺之不可也故兼及之尤為急務喻若造鐵道於京滬間以數理言令成直線最省最短然計及交通則必委曲轉折彎無錫貼常州臨鎮江以達南京站站令人止之令人登之終至南京而後已佛教亦然須委曲周折貼受者心理令隨程度之差而受教隨其差而造就至一站即得一站結果站站落實而抵達正遍之覺乃為最後目的其抵南京登真理境也其委曲周折委隨城鎮者契時機也求人人能成佛覺故須契時機而時機與世代地方殊異故佛教有歷史之變遷丙佛教歷史的變遷丁現代之人世與中國交通阻塞之時思想為國家的民族的交通既闢思想互相流通互相傳播成世界化普遍化昔之宗教皆以一理想之超人神物為教本或以古帝王賢聖為標準而有所謂聖道王道者今則降一切神聖於吾人之身非超物之思想而為人本之思想所謂人本主義者言吾人生命之存在就其生活上言之即謂之神即謂之聖以人生為起點以生存為準則一切學術思想社會行為因之成就也生存無限進變自中山先生所謂民生進以至人類生存以至一切衆生之生存至於超生存至於妙微皆以人生為起點所以今世思想曰人生的是也又今世之人類生活觀亦非昔比今世為群衆的組織的而非個體的從前自己作自己之行為發明自己之道理今世之思想行為則非擴大言之與社會群衆息息相關弗可故曰今世之潮流為群衆的是也又今世之科學皆取五官之感覺的可見可聞信而有徵者為根據推論發明步步研究纍積而成感覺之所不到者弗確非經積纍而成者不真惟真確的步驟的於是乎取故今世之潮流曰科學的是也然則欲順今世之潮流而契時機以行教則其必含人生的群衆的與科學的意味矣故居今而欲契時機以行真理造成現代之佛學者則佛學中之人生的佛學最宜戊人生佛學之大旨論人生的佛學所以冀培養現代之人生發展現代之人生至於超人至於微妙至於無窮夫佛本所覺悟衆生者也動植萬有無不有生然其精義可取歸之人而能談佛説能聽佛説者唯人故雖專為人説亦無不可也按佛説窮全人生之生存故既及吾人之生存亦及吾人之物故而言佛者不能及自己個人之物故則於大生存之中取吾個人有始有終之一段生活為發端即以是推論全人之生存故現代人生可以推全人生存人之生存可以推之萬物生存佛教以現代人生為起點此合於今世之潮流者一也發展人生至於正遍覺至於超超人為大乘之本而契時機必經之途佛非為消滅人生而為發展人生蓋為積極非消極者也小乘欲解脫個人大乘欲超度衆生故大乘為群衆的此合於今世之潮流者二也佛教教人修行最先達到完全之人格然後發展至於超人至於超超人至於微妙至於無窮境故人而上有菩薩焉有諸多菩薩焉而後成佛夫以步驟的發展合於科學之有次序性也修行一步即成果一步步步成績顯著可觀此合於科學之有真確性也是人生的佛學亦為科學的此合於今世之潮流者三也故人生的佛學者以現代人生為起點以發展生存至於微妙導人至於正覺為目的為人生的群衆的而又科學的者也今茲所言特具梗概詳其深造實有賴於諸君見太虛叢書哲學
