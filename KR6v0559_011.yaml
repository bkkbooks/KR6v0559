body:
  text: 八正道與改善人群生活二十九年四月在星加坡維多利亞紀念堂講佛之教訓富有改善人群生活之作用而最精粹者當推八正道佛說之八正道乃依之觀察人生宇宙真相而自由進化於至善之正當道路如解釋之則有八義一正見謂於現實之宇宙人生真相有正確之見地肅清違越於現實之唯神論唯識論唯物論之一切迷謬真知灼見不復被其障蔽搖惑此非改進教育而有最善之教育不為功亦為教育所求達之目的也二正欲或正思維欲非不善有善不善亦有非善不善和合私心之貪瞋癡慢及邪見而起之欲則謂之不善欲和合正見及大公無私心無貪瞋癡慢而起之欲則謂之善欲亦曰正欲欲為人生宇宙一切事業之發動及推進機須絕滅其邪惡而導進於正善不當一味壓抑使之萎縮但如何謂之善此當解釋有利益於現在未來自身及他身之心身活動謂之善反是有害於現在未來自身及他身之心身活動謂之不善有害於現在自身而有益於未來他身他身指群眾者謂之準善有利益於現在自身而有損於未來他身者謂之準不善無何損害利益或僅損害利益自身而無涉現在未來他身之心身活動者謂之非善不善欲望之發動如此故當輔於正見之觀察善則奮勉而為不善則滅之不稍猶豫如善不善未能自覺自決則當考之現實真相繩以正見而求解決不可冒昧從事三正精進放逸懈怠懶惰最為人生進化於善之障礙故必撲滅一切放逸懈怠懶惰之習慣得正見正欲而擇善固執後當繼之以勤勉奮發勇往直前譬如俠士與萬人敵大雄大力不屈不撓世之以懶散閑逸為清高者是孔子所謂飽食終日無所用心之朽木而已四正業或正命夫身安則道隆欲得身安必有正當資生事業之生活方法此應根據現實之真相不可戕食其他動物以厚人生但當用近代科學方法發明利用一切無生物植物以為厚生之正業由是而得衣食住及交通衛生之所需即為此正業之果五正語言語文字為自心他心交通之利器由此可收儲他心古今人類一切知見情意於自心亦可放射自心一切知見情意於他心今後人類然有心者各有其永續自覺之自由活動不可強制不可侵犯若強制侵犯之必生反應而還以強制侵犯加于己故於他人及人群不可藉語言文字之利器以為侮弄欺罔當為柔軟質直和悅真實之文語是之謂正語人之能和合為社會基於人與人之信用而人與人之信用又在於正語正語失則人群之社會分崩矣六正行此謂人與人之人群社會間所有正當行為亦即人類立身處世之道德政治法律據人各有心不可強制侵犯之原則及自心他心可以感應交通之原則人當自治亦當有公平之政治此導之以德齊之以禮公平原則之公平政治謂之正行七正念念者謂習熟明見而憶念之也根據正見所知宇宙人生真相而習熟明記之且於起欲及精進與營業發語動行之間時時憶念而不忘失不令流於錯誤是謂正念八正定定謂心力集中亦謂心一於境堅固安定不流蕩於唯神論等邪僻迷謬之見而能專心於現實之真相是謂心力集中於現實真相洞明契應而無復絲毫違越是謂心一於境顏回之三月不違仁近之而究竟則唯佛陀矣此中正見正念正定皆為教育然小學至大學教育應注重於正見而正念正定則當由年長後自修之如佛之淨土法門等亦修正念正定之一種法門耳正業則為經濟正語正行則為政治教育政治經濟為人生社會之三要素正欲正精進則為發動推進此三要素而完成人生之自由社會之進化者也世人誠能於此佛說之八正道了然有契於心奉以為教育政治經濟之最高準則則人群生活未有不日進於善良者值此爭殺不安之時代敬以此貢獻於願求人類和平幸福者葦舫記見訪問日記
