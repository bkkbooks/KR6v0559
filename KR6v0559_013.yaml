body:
  text: 佛法原理與做人卅二年十二月廿七日在湖南粵漢路大禮堂講在佛法原則上法就是講宇宙間存在的事物都離不了因果法則這個法則從自然界到社會以至心知一切都是具有的亦名因緣所生法例如一盆花的生長和存在必有種子的因和水土人工日光等緣才能生長出來這是自然界的植物其他動物礦物如化學上由水而化成氫氧氣水就氫氧氣等因緣的所生法就是物質分析到最細的原子也還是由電子所構成功的從此分析下去就是電子也是一種因緣所生法大而至地球或太陽系乃至星雲星海佛學上之大千世界華藏世界無不都是因緣所生法近而觀察人生亦是因緣所生法凡動物的生命都是因緣相續生命的因遇到父母的緣才可生起生後由天地間各種的培植方能長成這都是因果法離開了因果法是沒有存在的科學上研究明白的也只是因果法中一部分由科學所研究到的各部分總合起來追尋他的根本因此便進一步而成為哲學在一切存在變化的因緣關係上研究他的原理便是哲學於這兩種的研究而外還有各種宗教然而各宗教或立一種神或立多種神而產生宇宙萬有的一切這是幻想我們宇宙萬有外是不必要有另一個創造神的佛法是科學的哲學哲學的宗教與其他帶迷信之宗教不同佛法的出發點是現實的無量眾生世界這都是科學上所研究到的事實故佛法完全是現實的科學科學與佛法雖同以現實世界眾生為對象而科學只研究到一部分的現象而佛法是作一個總的觀察普遍的覺悟所以佛法不但有科學而且是科學的哲學佛法教人了解一切普遍的因果法則都不是固定的從因的上面可予以種種改變使人類進而改善明白這一改善的方法如是可以達到最善最純潔最高尚最圓滿光明最妙的境界如是名為佛從實踐實行上求改善求進步而達到這種最高尚最完善的境界就是極樂世界佛的大慈悲心是要一切眾生都同佛一樣的得到安樂故把他所覺悟的境界及達到覺悟的方法指示他人這就是先覺後覺的意思所以佛法是科學而不只是科學是哲學而不只是哲學佛法是科學哲學的宗教佛是最澈底的覺悟者所覺悟的因果法不是另外有一個神他是把覺悟的都指示出來使大家都能覺悟而同到達完美微妙的境界這就是佛教亦可名為佛學佛法由此談到做人且就最小範圍的地球人類上說在佛法原理上地球上的人類是眾生中較為重要的在眾生中雖有比人類更高妙的種類但是人因活動的創造的力量大因此佛法中看世界中之人類是能夠達到與佛一樣的覺悟的故佛說人生難得而人生是有很深意義很大價值的如此了解人生價值才成立一種有意義的人生觀宇宙間能變化的力量是眾生心此外沒有造世界的神由眾生心的力量變現一切宇宙間的因果變化例如一個國家之興衰是全國民的心理關係如能將人心改善振作國家便強反之國家便衰弱雖不無其他原因但此實為原因之主要點如清季之衰衰在人心頹唐現在民國之轉強亦強在孫先生之改善人心以新的各種因緣條件而造成新的民治國家進而能領導世界我們每一個人亦復如是眾生心力是相續的不是新起的也不會斷滅的偶爾變化亦不過是生命的一個階段我們若了解人生宇宙原理則所起一種思想一種動作可以改變人生宇宙一切故勤作善事能令人類眾生完善否則亦能令一切眾生墮落如殺害他人而想利益自己是違背因果的實際上還是自害例如日本之侵略我國而現在將漸次滅亡了故知一切都有因果第一一切須以眾生之利益為前題如此方可造成完美的人生故在佛法的原則上須要供獻自己所有的使一切人類進步改善使一切人類都無侵略爭奪之事乃可達到世界永久和平尤其現在交通發達倘若一個地方發生戰爭很容易波動到全國或全世界故若不急求世界永久和平則今後人生將永遠淪在戰爭的殘酷中再如前次世界戰爭與此次大戰相較其破壞力量遠勝過去故現在世界永久和平是迫切需要的第二現在有一種人完全是為個人的利益著想他的才智完全作了自私自利的工具是整個以身家利益為前題的這種人小而能造成目前資產勞動階級不平等的社會大而能造成國際間的優劣故我們要做到完善的人生必須互利互惠因此要明白這因果法則把個人的力量獻給大眾的利益上而達到自他兩利復次應有尊卑長幼有次序的社會人生這是第三種人生第四是要有誠信使社會能精誠團結向上發達由這因緣所生法上的真理去實踐實行合到道德行為理性生活這是覺悟人生的開始這就是佛法上說的五戒十善的人生再進一步就是大乘菩薩所行的六波羅密行使一切眾生都做到這種人生道德最高尚微妙完善的菩薩行為方是最完善最美好的人生大乘佛法是為大眾謀幸福的例如車子人力車只容一人汽車可容少數人喻如小乘若火車則能容大量的人絕不是為那一個人的故喻大乘大乘佛法是絕不為己而為一切眾生謀利益的要想從人類更進步的去修菩薩六度萬行完成最高人生改良人類社會這是佛法指示做人的最高道理聞又澄源合記見海刊二十五卷十二期
