body:
  text: 人生進善之階段二十四年十一月在丹陽正則女中講今天提出一個與人生非常切近的題目這題目就是人生進善之階段一人生之解析照通常解釋起來人生就是人的一生人生究竟是什麼我且來解析一下可先分作兩大幹一理性理是普遍貫通的與之相對的就是事相我們如果把人生解析開來可以分作理性與事相兩部分二事相就是事實上的人生相依此以顯出我們是人的這就叫事相在這事相部分又可以分成三類甲根塵根塵是佛典上特定的名詞根就是眼耳鼻舌身五根普通稱之曰五官與五根相對的是五塵耳聽見的謂之聲塵眼見的謂之色塵鼻嗅的謂之香塵舌辨的謂之味塵身接的謂之觸塵還有一部分的法塵這五根六塵是人生中分析出來的物質部分乙心識關於心識的分析肯先要知道人生不但有物質的部分而且還有精神的部分心識就是人生的精神現象分析來講可以分成四類一前五識即由眼耳鼻舌身五根發生出來的五種不同知識五識是根據五根而發生的所以不能獨自的存在二意識這意識就是第六識前五識僅有感覺而這第六識能構成有系統的知識和思想來完成人生的一切對於人生的精神部分要詳細的分析起來尚不止此五識所依有意識而意識背後還有三意根如見色依於眼根聽聲依於耳根所以意識也並不是憑空發生出來的而是依意根發生的四在意根後面還有一個識叫藏識這個藏識什麼都被他所包藏與庫藏一樣無論什麼東西都可以包括在裏面等到要用的時候再一樣樣拿出來譬如十年二十年前所經過的事情到了現在如果要用著它就馬上可以把它復現出來宛與目前所做的一樣這就是藏識的功能無所不包羅無所不收藏的藏識是廣博無涯的但它是意根最親切的根同時還是為意根緊緊吸住的東西為意根拘執為我丙分位時間空間及人生所經過的生老病死等謂之分位是根塵心識離合變化而附現出來的並沒有獨立的性質在事相裏最重要的還是心識心識中還有心所在意識上所起的心理作用是很多很多的這就是五十一心所有法在前五識共有三十四種心所有法在意根上有十八種心所有法在藏識上最少祗有五種心所有法如果要詳細的解說佛書中有一部比較清楚的百法明門論講到許多心所有法分配到各心識的還有一部八識規矩頌現在再將人生的善與不善區別分析一下人生的所謂善是能夠使本身的性質成為純粹優美同時還能領導大眾為大眾解除痛苦使大家安寧利樂這就叫做善與此相反的就叫不善在這善與不善的兩者之間還有一種非善非不善的佛典上稱它為無記因為沒有辦法來記別它是善與不善的包括這善與不善以及無記而最複雜的常首推意識所以意識的變化很多意根的性質最為特別它既非善又非不善所以也可以稱它為無記但它雖然是無記而它的性質是暗蔽的如一間暗室一樣故是有覆性藏識與根塵亦同為無記性至於理性本來是清淨的事相雖然未是清淨但可以用改造的方法來使它清淨所以也可以說是可能清淨的二進善之階段在古今的聖賢豪傑他們對於人生都抱有一種改良的目標努力進行於改善至於改善的階段約可分為下列五種一生活之改善人在世界上脫不了經濟與政治人群的社會生活非經濟不為功至於政治它能調劑保障人群社會生活的安寧所以我們要改善人生首先要改善經濟與政治也可說是人生根塵部分的改善二德行之改善這就是道德行為的改善在佛學上說起來就是戒律比較生活之改善還要密切孔子云非禮勿視非禮勿聽他就是叫人提高人格成就德行所以德行之改善就是倫理道德對於人生之改善及於人身五根前六識之分齊三定心之改進前面所講的德行在佛學上謂之戒律它自有充分的力量來規範我們改善我們但還不能把我們提高到超人的地位這因為在道德行為的改善上祗做到五根六識的改善還不能將這最複雜最活動而最富創造力的意識集中在一處而積極改善的原故所以定心最著重於意識定就是將心的力量集中統一起來所以定心的改進更為深刻本來定心改進又可以叫做精神上的修養中國古時候的道家也都有這種精神修養的假使能夠修得禪定初步的功夫差不多是另進入了定心的世界定心世界與現在的世界性質完全不同因為它是超過欲界之外的色無色界於是這個人就到達了超人生的地位但這還不過是第三種階段祗能做到意識分位上的改善沒有把意根改善過來四淨慧之改進淨慧是證明本淨理性的真慧它能消滅照破一般的黑暗而使之光明起來我前面已經說過意根是黑暗得像暗室一樣所以必須以淨慧的光明來消滅照破這種黑暗使意根澈底澄清起來永遠清淨即所謂轉六七識成為妙觀察平等性智如果一個人能夠做到此處則他已成為超超人或為菩薩了這是人生進修中的第四階段五淨善之圓滿如已進修到這樣地步還決不能就此中止必須要更進一步使無記的藏識與根塵澈底改善而達到第五階段淨善之圓滿因為意根雖然經過努力的改善而藏識根塵還未澈底清淨所以還要更加努力進而到達淨善之圓滿的階段像這樣纔算是到達了佛學上人生進善的究竟並且這個人就可以被稱為佛了胡夢蝶記見海刊十六卷十二期
