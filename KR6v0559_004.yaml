body:
  text: 生命之研究十七年四月在杭州之江大學講宇宙間形形色色變化萬千要其指歸無非有生命與無生命兩種現象而已耳觀夫山木之欣欣向榮江水之滔滔東下就其表面論之固似有長大變化之能力存乎其中然吾不以水木為有生命現象吾之所謂為有完全生命現象者厥為人類以其為萬物之靈也夫人既為有生命現象之動物矣則其生命何自來不可不一研究之有人謂生命之來由係由於無生命之物質變化而成其根據即以化學上若干種元素可以構成人體為言而反之者則又以為生命係由有生命物體父母體而出決不能由無生命物質而成其所持以辯論者即難化學上若干元素既能構成人體何不以之造成一有生命之人今既不能造成一有生命之人則生命不出於無生命之物質可以斷言雖然余亦有問焉夫既謂生命都由父母體而來則逆數而上必有一最初之男與一最初之女此男也女也不能復謂其有父母生之也既無父母生之則其生命又從何而來耶吾知主生命出自父母體之說者必結舌不能措一答也在吾之意以為生命本係固有自古迄今生命自在特有適當機會時則發現其現象否則潛伏焉耳吾姑采日常事理以證吾說考物理有動靜兩種力動者有現象可見靜則潛伏而不興生命亦有動靜力焉在白日則動故一切現象都見夜昏則靜至聲息全無然而睡熟時聲息全無者乃在潛伏時內而不能謂生命即停止於夜中也昔人有詩曰晨昏小死生揆其意蓋亦以為晨而起如死之復生昏而臥若生而入死然者此特就生命現象之一小部分言之也擴而充之謂生命之大死生如晨之生昏之死亦無不可也蓋人死云者特在生命現象上告一段落而生命之潛伏力固猶存也遇有相當機會則復生焉惟復生之生命與前生之生命其現象亦不必盡同蓋視時機之如何而定也譬如杭州乘車赴滬車中一覺而醒來已是北站矣夫北站之風景固異於杭州而覺後之所見當亦異於未睡時之所睹以此例復生與前生之現象之不同正相符合是故以生命出於無生命物質或由於父母體者其說多有時而窮誠不若以生命本身為常存者之說之為當也惟生命常存故無始無終無終無始而現象之有時發現有時潛伏則機會為之耳雖然生命固無始終而實有變化其變也有秩序焉人苟能明心見性順其秩序以求生命之源則生命之創造亦有在乎人者要視各人之根底如何耳毛汶記見海刊九卷四期附註太虛叢書哲學改題生命今依海刊原題附答生命研究之疑問季炎君之疑問讀四月三十日杭州報星期副刊載有毛汶君記錄太虛法師生命之研究一文不禁發生疑問茲特臚陳意見如左以供世之研究生命學者有以教之焉原文主張生命自在之說謂有適當機會則發現其現象為生否則為死且以物理有動靜兩種力以證明生命之隨動靜而生死焉可見其所謂動靜云者即此適當之機會也說理未嘗不圓然生命既屬自在但有動機即發何不自生自發而必待父母配偶以造端乎其動機既待父母之配偶以其造端乎動機是主持此動機者即原文所謂適當機會仍為父母也即不能謂之自在與生命係由有生命物體而來之說何異矧機會之權能操之于父母愛欲其生惡欲其死更影響於生命本身使其失卻自在耶此疑問者一又原文不若以生命本身為常存者之說為當也句僅以寤寐夢覺等為喻亦不能確實證明生命本身之常在何以見之例如醒後之人對於夢中幻境類能記憶又如一人由杭州乘車至滬車中一覺醒來已是北站但此人既睹北站景物同時亦能記憶杭州景物不失故謂之生命本身常存於理尚說得過去而何以賦有真正本身常存之生命一隔陰迷即不能記憶前生之情事乎常存之理於何徵實哉此疑問者二總而言之不受動靜機會之支配而失其本來面目而後謂之自在不受境遇變幻之攪亂而失其湛明知覺而後謂之常存研究生命學者其亦於此二點疑問加之意乎否則其所主張即不能成立一七五一季炎一佛明諸法皆仗因託緣以生起但云自在如不明託父母所緣乃起為現行則成實我之常執而不明生命不常不斷之真相二醒能憶夢而夢不必能憶醒後一夢亦必不能憶前一夢佛菩薩常覺而通宿命如醒異生類如前夢後夢相續雖不相憶而不容為相續不斷見海刊九卷五期
