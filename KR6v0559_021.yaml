body:
  text: 人生的佛教三十五年八月在鎮江歡迎大會講現在國內與國際所有的人類經過這次大戰的痛苦大家都希望社會安定世界和平而且長遠永久不再受戰爭的災難這是人人普遍的心理美總統杜魯門講在今日高度科學發展下亟須高度的道德配合重造和平幸福的世界因科學發展製造新式武器如不以道德運用駕御為害人類實甚此則非昌明高度道德性的宗教不可世界三大宗教以佛教教義博大精深最適合人類實際生活之道德足以補科學之偏息戰爭之禍以維持世界的永久和平與幸福佛教的本質是平實切近而適合現實人生的不可以中國流傳的習俗習慣來誤會佛教是玄虛而渺茫的於人類現實生活中了解實踐合理化道德化就是佛教所以擬定這人生的佛教題目來和各位平平實實地談談在人類生活中做到一切思想行為漸漸合理這就是了解了佛教也就是實行了佛教因為佛陀教人持戒修善息滅煩惱就在使人類的生活合理化人類生活中可共同通行之道便是道德互相欺詐淫亂爭奪殺害皆是不道德的行為佛法切實的指導改進使其互相推誠仁愛謙讓扶助這就是學佛的初步學佛並不一定要住寺廟做和尚敲木魚果能在社會中時時以佛法為軌範日進於道德化的生活就是學佛若以合理的思想道德的行為推動整個的人生向上進步向上發達就是菩薩亦即一般所謂賢人君子再向上進步到最高一層就是佛亦即一般所謂大聖人故佛菩薩並不是離奇古怪的神祕的而是人類生活向上進步的聖賢佛教並不脫離世間一切因果法則及物質環境所以不單是精神的也不是專為念經拜懺超度鬼靈的所以不單是死後的在整個人類社會中改善人生的生活行為使合理化道德化不斷的向上進步這才是佛教的真相人生的解釋狹義說是人類整個的生活廣義說人是人類生是九法界的衆生人類是九法界一切衆生的中樞一念向下便為四惡趣等一念向上便為天及三乘等故人類可為九法界衆生的總代表也就是九法界衆生的轉捩點全宇宙的一切存在盡是衆緣所生由於因緣和合關係相續流行為宇宙間一切存在的事物一切存在中有一部分是有情衆生這一切有情衆生是指具有情感意識的地獄餓鬼畜生阿修羅人及天等衆生中的人是衆生中具有聰明才智的一種故諺曰人為萬物之靈因為它太靈活所以向上也容易向下也容易人做得不好就可以墮下做得好就可以向上若不能向上總要保持為人之道勿使墮落才好人生不論古今中外的宗教賢哲總是教人為善與人為善向上進步以養成完美的人格增益人類共同的生活以求安樂和平佛教於充實人生道德極為注重人生佛教尤以此為基本依佛教進修更可由人生進升三界諸天以及於出世三乘的羅漢辟支佛菩薩即所謂依五戒進修十善四禪八定而生天觀四諦而成羅漢悟十二因緣而成辟支佛修六度萬行而為菩薩再由天及三乘加功進行成大菩薩以大願大悲遍一切世界普度衆生即成為遍在三乘六趣的大菩薩由大菩薩積功纍德福慧圓滿乃證盡善盡美正等正覺的佛果所謂佛果即以全宇宙盡虛空遍法界究竟清淨為身也就是人生煩惱痛苦完全消滅至於最合理最道德的和平安樂的境界由此以觀由人向下為一切有情衆生由人向上為天及三乘菩薩佛上下總依人生為轉依可見人生之重要性我們應依佛的教法在人類生活中把一切思想行為合理化道德化佛法化漸漸向上進步由學菩薩以至成佛才是人生最大的意義與價值佛教狹義說佛是釋迦牟尼佛教是釋迦佛所說三藏十二部的學理故亦曰佛學廣義說一切衆生皆是佛一切世間人及衆生的思想行為精神物質正報依報的一切總不出佛說的因果法則故亦曰佛法所以普泛言之佛教是一切衆生所依的佛教切近言之就是人生的佛教今天感謝各位冒暑開會即以此略為貢獻覺先茗山記見中流四卷七八期
