body:
  text: 救世覺人之佛法十五年九月在星加坡維多利亞紀念堂講一佛是為救世人而求得正覺者二正覺是明徹人生世間真相的甲緣起無盡乙性空無礙三解悟人生世間真相之成果甲緣起無盡故得人生之真價乙性空無礙故離世間之苦厄四佛法能覺世救人維多利亞是英國有名一女王當日曾致英國強盛使英國國旗飄揚於世界今在星洲之維多利亞紀念堂與諸君講演或為佛法昌明於大地之兆想諸君皆有此同感也茲拈出救世覺人之佛法講之一佛是為救世人而求得正覺者云何為佛梵語佛陀英語華譯為正覺者佛之一字乃是公有名詞非一人所獨有故過去現在未來十方一切之得正覺者均稱之為佛惟此處所講之佛則專以釋迦牟尼為依據蓋吾人現在得聞之佛法實由釋迦牟尼遺傳下來也云何為正覺者有真正明確的大覺悟之人稱曰正覺者是即佛也佛之正覺何以知為救世人而求得耶請舉釋迦佛為救世人捨國修道之動機以說明之有二一曾因親歷戰爭及睹蟲魚鳥等互相吞殘之慘由悲痛而起救世之思想二曾因見世人雖極富貴終苦於老病死之逼迫由悲痛而起救世之思想再從釋迦佛求得正覺之事例以說明之有四一看破塵世榮利情愛而捨國求道二學歷天神外道諸教而捨邪自修三孤處深山苦行禪定未能得其正覺而轉趨積極的修持四受食後樹下端坐降魔得成正覺上僅就釋迦牟尼佛之歷史方面觀察知佛是為普救世人而求正覺者再從世界宗教學術各方面以觀察佛之地位更可以見佛之偉大精神也一佛非多神教的神亦非一神教的神世界宗教大概分多神教如道教一神教如基督教或無神教等佛是全宇宙之正覺者故非俗人向之求福避禍之多神教的神亦非創造主宰宇宙萬有之一神教的神二佛非冷酷的厭世者亦非熱中的迷世者佛極富於同情心以一般人之苦樂為苦樂積極的熱心救世者故非冷酷厭世又不熱中於榮華富貴乃是求正覺而得之者故非迷戀塵世者三佛非宗教家而亦為宗教家凡宗教家必須崇拜一種神以為一般人之信仰佛不立一種神以令人信故非宗教然佛亦出其悟得之真理以立人之信仰故亦宗教家四佛非教育家亦為教育家凡教育家必有種種學科課程以為教導之標準佛則並不以何種學科書本教授人故非教育家然憑其正覺大悲以隨機化導故亦教育家五佛非哲學家而亦為哲學家凡哲學家必以其理智所推測之某種條件為真理佛則不馳其理智以創立學理故非哲學家然憑其正覺大悲而為諸學者闡幽析微故亦哲學家六佛非科學家而亦為科學家凡科學家必精研物理以為人中資生之用佛則不專究一門求致物用故非科學家然憑其正覺大悲而隨諸問者說明各種事情皆合科學故亦科學家七佛為證真者而亦是應俗者佛雖是實證真理者而無執著故恆隨順俗情以為說法八佛為實行者而亦是理論者佛之為佛皆由其親身實行之成就然成佛後日為人說法而無暇晷九佛為超特者而亦是平常者佛未出家前已將常人一生經過做完出家後皆為超人之行為然亦僅享人之恆壽同於常人十佛為莫測者而亦是無奇者佛之神通寂定智慧辨才均不可思議然每早起宴息穿衣食飯無何奇怪二正覺是明徹人生世間真相的云何正覺是明徹人生世間真相的欲明此理先解字義人生者謂人類及非人類之一切有情衆生也世間者謂遷變無常之宇宙萬有也真相者謂人生世間真實如此之真相狀也此真相狀唯正覺者始能明白徹了絶非不覺者能領悉分毫也但佛之正覺所明徹的人生世間之真相究竟是如何耶則緣起無盡性空無礙是也甲緣起無盡欲明緣起無盡先釋其名義緣以生剋消長之關係為義其內容可分如下因緣主因主要的因無間緣緣緣增上緣助因輔助的緣事事物物都是衆緣之所集起謂之緣起舉例如下業識因種子因緣人身父緣所起的草木水土所起的母緣緣風日增上緣明此緣起之義則知人生世間是衆緣所起一非是大梵上帝神等之所造作的故亦非彼之所主宰的二非是從虛空虛無而有的三亦非是自然而然的四亦非是從那幾種特定的原質力而有的五亦非是從哲學者假想所立太極冥初等等而有的但緣起事中有力的事緣尤在於人生的心識以心識是有覺知力及活動力的故緣起之說明在佛學即為唯識論上來是明緣起如何是無盡無一事一物不是衆緣所起故一一事物皆備攝一切事物又一一事物又皆為緣能起其餘一切事物故一一事物皆攝入一切事物例如人身由萬物所成而備萬物亦能遍為萬物生起之因緣以互攝互入故推前前無始起推後後無終止推內內無中核推外外無邊際由無始無終無邊無中故曰無盡乙性空無礙性以固定實在之體質為義但何以有此性空耶以事事物物都是緣起無盡的故此種固定實在之體質是空無的唯此無性的空理是遍於一切事物本來如此永久如此的故唯此無性的空理是一切事物的真性由此一切事物的真性唯是性空的空性故一切事物皆無質礙的無障礙的無對礙的無限礙的三解悟人生世間真相之成果甲緣起無盡故得人生之真價淺言之則人生以業識為因緣故內為別業之報身外為共業之世界生有從來死有趣往推前無始推後無終故現時一言一行皆有深廣之關係及無窮之價值言行而善必有食福之時言行而不善必有受罪之日由是善惡得其標準而道德有其根據人生乃可孜孜為善而去惡以完成道德之人格深言之則吾人當身即緣起故即無盡故諸法與吾並存法界與吾為一換言之吾人即無限之全宇宙即全宇宙之主何等安樂何等自在乙性空無礙故離世間之苦厄世間之苦厄生於自他之對礙心境之限礙物體之質礙知覺之障礙達人生世間緣起無盡而其性皆空故則諸礙本無所有而苦厄全離淺之則人我之性空故無我我所世間一切是非利害之衝突爭鬥可休息深之則照見五蘊等諸法空故一切老死無明等苦厄無不度脫四佛法能覺世救人依上所說知佛法可離世間苦厄故為衆患逼迫之今世所需今世增劇之苦患尤在地盤戰爭與階級戰爭之兩重戰爭相殺此皆不明國家與階級皆性空故致相礙而多殺知性空無礙則互相扶助以成利濟而爭殺等苦可離矣既唯佛法能得人生真價故尤為茫無依恃之吾人所需也吾人生在今世知識愈豐富愈覺人生無意義吾人為家庭為國家為人群之生活而生活覺得皆無究竟之意義至為個人生活而生活尤覺無趣如此則生不如死而世人自殺之所由多今悟吾人緣起無盡而一言一行皆有無限之關係及無窮之價值由是乎心有所依歸可漸趨光明正覺之路今之世間在多殺之苦痛中唯佛法能救之今之人生在自殺之煩悶中唯佛法能覺之故佛法是能救世而覺人的是之謂救世覺人之佛法寧達蘊記見海刊七卷十期
