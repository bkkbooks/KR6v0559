body:
  text: 人生佛教開題三十三年秋在世苑漢藏教理院講一人生佛教之意趣佛法是佛所證的一切法實相及眾生可以由之證到諸法實相的方法同時在佛親證的方面為證法就佛對眾生說的方面為教法前者是契理的後者亦兼契機的這是佛法大概的性質佛以所證的法應機宣說佛在世時佛為法本一切皆依佛說佛滅度後佛弟子結集佛法而流傳於世始有佛教初為迦葉阿難等綜合整理為阿含經古譯為法歸即一切佛法的匯歸後經幾百年流分為各種部派至五六百年間部派相爭不能見佛法的真相於是龍樹起而破斥抉擇各派以般若義造大智度論中論等為第二次之綜合整理自後學人又以不得其中真義而起紛爭至八九百年無著菩薩又以瑜伽論等為第三次之綜合整理此為印度佛法流傳之情形然此後大小乘之紛爭仍日盛不已因再無綜合之研究及全面之整理者故漸由紛爭而至於滅亡至佛法流傳之地則錫蘭有佛音之綜合整理中國有天台智者賢首法藏等之綜合整理西藏則有著菩提道次第論之宗喀巴為之綜合整理此皆一方根據佛法真理一方適應時代機宜以綜合整理而能昌行一方域者也時至今日則須依於全般佛陀真理而適應全世界人類時機更抉擇以前各時域佛法中之精要綜合而整理之故有人生佛教之集說學佛法的人讀盡千經萬論若不深解人生佛教也等於買櫝還珠二何謂人生人生一詞消極方面為針對向來佛法之流弊人生亦可說生人向來之佛法可分為死的佛教與鬼的佛教向來學佛法的以為只要死的時候死得好同時也要死了之後好這並非佛法的真義不過是流布上的一種演變罷了還有說佛法重在離開人世的精神但死後不滅的精神具體的說即為靈魂更具體的說則為神鬼由此有些信佛者竟希望死後要做個享福的鬼如上海某居士說學佛法先要明鬼故即為鬼本位論然吾人以為若要死得好只要生得好若要作好鬼只要作好人所以與其重死鬼不如重人生何以言之因為人和鬼都是眾生至於死特為生之變化耳我們現在是眾生中之人即應依人生去作去了解了解此生作好此人而了死了鬼亦自在其中此所以對向來死鬼的佛教而講人生的佛教也此似與孔子所謂未知生焉知死未知人焉知鬼之義相混然此猶是消極的方面還有積極方面的意義就不限於儒家所講的了因為我們要把人生擴大起來人只是眾生之一類在人言人即以代表眾生因為現在居於人類故今切近一點來講人亦即是講一切眾生而一切眾生有惑業流轉的六道凡夫有了脫生死證得涅槃的二乘聖人也有覺悟向上而不退轉的菩薩還有福智圓滿的佛陀故人即眾生輪迴六道的為苦縛眾生二乘為超苦眾生菩薩為覺悟眾生佛陀為究竟眾生所以這裏所說的人迵不同儒家狹義之人生者所謂生之緣起生之變易生之轉化等皆包括於佛法之生義中講到生之緣起即緣起而有生是即生而無生之因緣本空義更有無生而生之妙生義則斷非儒家之生義所能及也由此說來所謂死實即生之一部分我們要能了生才能了死相反的若只了死非唯不能了生而且也不能了死所以基於上述之消極意義既可革除向來佛教之弊習改善現實人生而由擴大之積極意義尤能由人生以通達一切眾生法界緣生無生無生妙生之真義此為據理發揮應機宣揚之人生佛教真義學佛法者先應對此有正確認識三人生佛教之目的及其效果就依佛法發心預期說即為目的就修行成功說即為效果此其效果可略分為四一人生改善一般佛經皆說到此義即人民五戒之行輪王十善之化改善人間即是目的人生改善成功即是效果二後世增勝依業果流轉而修行者每希望後世增勝即希望將來比現在之人作得好過去有句話山中無衲子朝中無宰相此為基於後世增勝為目的之修道觀信佛人多是如此唯此並不限於人間乃可由人增進而至於欲色無色等天三生死解脫此因看到後世增勝仍不免於三界輪迴若不修到生死澈底之解脫終必流轉依於此種目的所獲得之效果即為羅漢四法界圓明此為大乘特有者二乘聖者雖了生死然有所知障不知一切法實相縱略知法空亦不究竟故於一切法不能圓滿通達而仍有障礙此即二乘未得法界圓明之缺點亦即菩薩成佛之特點也法界即一切法圓明即離了所知障所成之智此智即一切種智或無上菩提或妙覺佛果復次法界者即是法華所謂唯佛與佛乃能究盡諸法實相圓明者亦即所謂佛之知見如是大乘以通達法界為目的而圓滿明證後即為大乘特有之效果這四種大概言之通常五乘中之人乘即此中第一人生改善天乘即通第二後世增勝至於二乘則綜合前二加上生死解脫之第三種大乘又可綜合前三而加上第四法界圓明不過中國向來所重大概為偏重於此中第二及第三即淺近的求後世勝進高尚的求生死解脫向來佛法緣此以為目的則更於修道之方便法門綜合之而有如淨土宗密宗等此為向來流傳之佛法也然今之所講人生佛教為對治向來偏重於如上二者故特重於人生改善而直接法界圓明換言之今之人生佛教側重於人生之改善特出者即能依之發菩提心而趣於大乘之佛果即於此上消極的則對治佛法向來之流弊積極的則依人生之改善而發菩提心行菩薩道此中自亦含攝後世勝進與生死解脫故第二第三亦即融攝其中故人生佛教云者即為綜合全部佛法而適應時機之佛教也弘悲記見海刊二十六卷第一期
