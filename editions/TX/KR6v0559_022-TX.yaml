body:
  text: 學佛之簡明標準二十一年六月在漢口佛教正信會講近來中國的社會時在變化中往往以前所沒有的忽然而有有而旋滅如電光石火之無常漢口之佛教正信會近雖亦在變化之中然能以自力轉移社會屹然不被搖動此為一切團體中所難得者大眾應護此希有難得之佛團去宣揚佛教使佛教教化力時時繼長增高不負十餘年之苦心建立且使後來者得所依止輾轉使佛法普及一般社會深入人心咸趨光明之路以表現佛法救世救人之功用然於佛法各人當有理解與行為之簡明標準庶可無所歧疑而自度度他修學佛法有二一理解二行為以理解貫入行為之中則能行解一致以行為履踐理解之實則能行解相應先言理解即是無我緣成四字平常的人都以為有個自我佛法則言實無自我可得一有我相即有人相等等無我相即無人相及種種眾生差別之相是謂人無我亦即生空更進明一切事物及一一諸法亦無各別獨立之自體是謂法無我亦即法空此二無我皆從否定一面講若從肯定一面講則人及有情眾生以至於一切事物實都由眾緣所成即四大五蘊十二處十八界等眾緣所成的所以都無實我若有實我則不待眾緣今既從眾緣所成則無實我如眼識能見光能見之識與所見之光無非眾緣交互相遍而成立所以人及眾生諸法皆無自我一人由法界一切諸法所成一一人以至一一眾生一一諸法皆如此則一一人皆攝一切皆入一切此即一即一切一切即一此無我緣成義即佛法之法印亦即佛法簡明理解之標準與此標準相應者即為正知正見違此即非佛法再言行為應以十善六度為標準此通於出世善法從初發心以至於等覺無不依此修行佛則於此十善六度已圓滿而利他亦仍在此十善即離殺盜淫之身三惡業妄言綺語兩舌惡口之口四惡業貪瞋癡之意三惡業十惡業若離此十惡業即是十善行力行十善必成善人亦即為趨向菩提的根本離去諸惡減少一分惡業即增一分法身功德真能修持十善行者須至二地菩薩即離垢地直至成佛乃能究竟然由十善之增上行言之即須行六度乃得成定善無漏善六度第一即是布施能捨一切所有而實行利他對治慳貪如能利他即是自利持戒則能三業清淨戒律即一切言行作止之軌範忍辱則能息除一切瞋惱精進一方懺悔以前惡業一方面努力為善了解諸法禪定即對治散亂由定中所得的明澈覺慧即是般若單行十善名為散善更修六度中第五禪定乃得成定善更進而與般若相應則成為無漏善從散善至無漏善即是從凡夫至佛之進程是為佛法簡明之行為標準不明無我緣成義則十惡六蔽不能離能明無我緣成之義才能圓成十善六度凡學佛的人都應以此標準自修以此標準交友以此標準擇師以此標準做人不問他的咒術如何高定功如何深辯才如何大學識如何廣合此行解標準的可認為佛法中人否則即非佛法中人佛教正信會的正信眾切須於此認清方不致自誤誤他李慧空周慧毓合記見正信第一卷第八期
