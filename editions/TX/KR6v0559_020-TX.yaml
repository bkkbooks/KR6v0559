body:
  text: 人生佛教之目的全部佛教之目的與效果可分四種一人間改善以佛教五乘共法中之五戒等善法淨化人間從家庭倫常社會經濟教育法律政治乃至國際之正義公法若各能本佛法之精神以從事則均可臻於至善減少人生之缺憾與痛苦故現實人生可依佛法而改善淨化之也此雖一般科學哲學及儒家等學術之所共而佛教亦有詳明發揮與其不共之特質者在本此特質進以融攝科哲儒學所長則佛教對此改善人生之目的自可發揮其無盡之效力也二後世勝進生命乃無窮盡之長流循業力以受報生死死生此界他趣輪迴無已故不惟圖現生之改善且應進求後世之勝進也修十善業及諸禪定可獲上生天界持佛號仗他力可往生他方清淨佛土雖生死未了而可得勝進優美之依正二報免四趣苦且可超出人道之上是依佛法可達之目的與效果也此在淨土及密法亦所注重而世間之高等宗教如耶教之求生天國等皆同有此種目的三生死解脫後世勝進非不善然諸行無常有漏皆苦生而不能不死住而不能不滅終不澈底然則如何可斷苦本而滅諸漏耶生必死則求離於生住必滅則諸有不住截生死流拔度苦海而登涅槃寂滅之彼岸我生已盡梵行已立所作已辦不受後有生死魔軍其奈何哉是佛法又進一層之出世目的乃三乘行者共達之效果而為世間一般教學所不逮四法界圓明涅槃解脫美則美矣然尚不盡諸習氣不斷所知障不得一切智於一切法界猶不能圓明且一切有情皆我無始來之六親眷屬奈何自求寂滅而不之或問耶是故菩薩摩訶薩攝一切眾生為己體痛等切膚大悲充溢而度盡為誓歷經時劫廣求無邊福智盡斷二障習氣終乃圓明法界而融遍無礙矣是大乘至極之效果亦佛法究竟之目的也是四重為全部佛法所包容之目的然以言終極惟法界圓明之佛果始為究竟亦可謂此乃全部佛教之真正目的前三層皆為達此之方便也舊行之佛教厭離現實人生之心切每重求後世之勝進或無生之寂滅淨土密法即應此希求之方便門也然專以來世或寂滅為務每與現實脫節不能圓顯佛法之功效今倡人生佛教旨在從現實人生為基礎改善之淨化之以實踐人乘行果而圓解佛法真理引發大菩提心學修菩薩勝行而隱攝天乘二乘在菩薩中直達法界圓明之極果即人即菩薩而進至於成佛是人生佛教之不共行果也表如下人間改善科哲儒等所重人生後世勝進高等宗教所重二乘佛素來佛教所重大乘教生死解脫所重法界圓明錄自人生佛教第一章四節
