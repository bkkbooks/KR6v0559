body:
  text: 佛說善生經講錄二十三年八月在漢口佛教正信會講懸論一就經題以略解名義甲善乙生丙經丁善生戊善生經二就善生以寄明法要甲就法以明善生乙就人以明善生三明此經說義甲就佛說此經以明乙就今講此經以明四明此經譯史釋經甲一證信緣起乙一證信序乙二緣起序丙一述父囑丙二正行禮丙三述佛見丙四佛垂問丙五答佛問甲二應機正說乙一因機贊善乙二汎說諸法丙一四業穢丙二四罪福丁一四事罪丁二四事福丙三六非道丁一長行戊一略釋戊二廣釋己一釋戲求過己二釋非時行過己三釋酒放逸過己四釋近惡友過己五釋喜妓樂過己六釋懶墮過丁二重頌丙四四非親丁一總標丁二別釋戊一釋知事非親戊二釋面前愛言戊三釋言語非親戊四釋惡趣伴丙五四善親丁一總標丁二別釋戊一釋同苦樂戊二釋愍念戊三釋求利戊四釋饒益乙三正說六方丙一長行丁一總標丁二別釋戊一東方父子戊二南方師弟戊三西方夫婦戊四北方主僕戊五下方親族戊六上方施僧丁三明四攝丙二重頌甲三如說奉行懸論先於題前懸論大義如天台之有五重玄義賢首之有十門懸談現在亦分四段來說一就經題以略解名義此經題可分為五一善二生三經四善生五善生經甲善此善字在中國平常語言文字之中常常可以見到聞到如最初讀書時三字經中就說人之初性本善普通術語中如為善最樂惟善為寶在語言中如謂某人是善人某事是善事此善字似乎已很明了不用再解釋然仔細考查起來善的定義如何猶不甚清楚先就分別相對而言如真美善三字明其事理之本來如是如實而知是為真在見聞覺知中感到很愉快的是為美行為上的道德則為善平常所謂修行者行即造作行為此行為由身語表現之而身語皆不離乎心意如心中是善其所發出之言及所作之事乃為善故此行亦可總名之曰心行但有時身語不起現行意中亦可起善惡行業故總稱為三業而三業皆就心行上說真的反面是妄美的反面是醜善的反面即是惡此善惡近就人類而言遠就一切有情而言詳究善惡之界限由善的反面之貪瞋癡等是名惡但有時不能辨別其善惡的中容平常之心行則名無記將惡與無記完全離開方顯出善的心行然此僅就平常的心行而言若澈底講只有善與惡沒有無記以勝義善即以究竟真實完美謂之善與前真美相對立之善不同如真如涅槃及佛果菩提是究竟真實完美圓滿的無漏善非此即為不善而無無記之可說再就善法而言自性是清淨安樂和順利益的故於自於他於現在於將來皆無違反損害是名為善但吾人所起之心所行之事不能拘定於何者是善是惡有時動機雖善而行不得法不能得到好的結果不得謂之善有時動機雖不善而所行之因緣時會或能影響利益於人亦不得謂之不善要發心善而所行適當於自他現未皆無違反損害才是善乙生此生字可作四層解釋一生起義此生與滅相對萬物從無而有謂之生從有而無謂之滅生乃因緣會合而有滅即因緣分散而無二生存義從有相續不壞而存在即四相中之住相三生命義壽煖識相續活動是名有生命此生與生命壞滅之死相對四一生一世義如一生多生或前生今生來生一生即指一世此指生死流轉中一期業報而言生人中則為人之一生生天中則為天之一生生地獄餓鬼中則為地獄餓鬼之一生所謂六道生死輪迴是也丙經經字的本意指布中之經線直長者為經橫短者為緯由此引申古時以聖人之書不易之言可為千古所共遵四海所共行者稱之為經所謂經常大法也在梵音之修多羅或素怛纜本亦是線引申有貫穿攝持之義將佛所覺悟世出世間事理因果之法應眾生之機而說者記錄成章貫攝如線故稱修多羅此有廣狹二義狹義則將佛典分為九部或十二部修多羅乃九部或十二部中之一部廣義則凡集錄佛所說之法皆名為經此經乃與律論雜相對之稱佛為弟子制定之規範名律經律二者皆出於佛經為佛說律為佛制諸弟子依經律而發揮之理論謂之論又有歷代大德之文鈔傳記等為經律論所不攝者謂之雜集故佛典分為經律論雜四藏亦如中國書籍分為經史子集之四庫然丁善生善生是人名此經佛為善生長者子而說故名善生既立善生為名必有其義由善根而生為人故名善生又使此人生不空過不虛度由善生善更能使來生之善法得以生起故名善生戊善生經合善生經三字則此乃為善生說明善生義之經也二就善生以寄明法要甲就法以明善生宇宙萬有法界諸法皆佛之智慧所了照所證明故一切法皆是佛法此諸佛法不外乎因果事理因果即所謂因緣所生法一切法皆因緣所生故因緣即是因所生即是果而一切因果不出乎善與不善就善不善以明一切法之因果此因果為事由事而顯非因非果不生不滅之理為理此事理即生不生義先就善不善以明法界因果法界分六凡四聖其依正果報各有其因而由善不善分別所謂善者有十善業身不殺盜淫口不妄言綺語兩舌惡口意不貪瞋癡是名十善反之則成十惡以上品十惡行為因即成地獄果報以中品十惡行為因即成餓鬼果報以下品十惡行為因即成畜生果報反之如不殺生而能救生不偷盜而能布施乃至不貪瞋癡而能慈濟明解是名十善以下品十善業為因成阿修羅等果報以中品十善業為因成人果報以上品十善業為因成天果報由中品十善而生為人故名善生天中上品善業有散善有定善散善即欲界天定善即色無色界天由此三界六凡等而上之是名四聖亦由善因果而成前世間善是有漏的此出世四聖之因果是由無漏善而成的阿羅漢聞四諦法修三十七道品而證生空涅槃若聞十二因緣法觀流轉還滅相證辟支佛若發菩提心修六度萬行證菩薩果由菩薩行進而至於究竟圓滿即證佛果此亦可說由下品無漏善證阿羅漢中品無漏善證辟支佛上品無漏善證菩薩果由究竟圓滿無上之無漏善方證佛果次就生不生義以明法界事理此法界諸法因果皆由因緣所生之事由事而顯非因緣所生之理如涅槃經云生生不可說生不生不可說不生生不可說不生不生不可說因緣為能生所生法為所生若無能生所生則生義不成立若從已生上言生既生何須更生若從不生上言生既不生如何言生故各宗教哲學於此妄生分別或謂從天生或謂從上帝生謂天地萬物皆從彼生而有但彼能生者是否一物萬物皆須由彼而生彼又由何而生苦謂彼不須他生萬物何須彼生若彼更有所生如此上推則成無窮故生義不成如一茶杯從水土生但水土與杯即是一物非離水土而別有杯故不能說水土是因杯是果因緣所生亦復如是因果是就如幻如化之假相上安立的是故生無自性生即不生如心經中之六不諸法空相不生不滅不垢不淨不增不減及中論之八不等即明法爾真如理性遍於法界善不善因果之事就事顯理即名法性就理顯事即名法相又理即真諦事即俗諦即此總明二諦乙就人以明善生此人廣即有情今且近就人類言一人既是由中品善業而生得之果報則違反善行即不能生存如世間犯十惡業之罪而致死者既違人性故不能生存於人類二既得人生應不虛度此生必須向上更求進步使來生更勝於今生如由人行善而生天等三生天亦有漏善因之果不能出三界而免輪迴之苦故須更引無漏善得以生起四使無漏善究竟圓滿而生得轉依轉依有轉所依轉所捨轉所得轉所得又有二一所顯得的真如涅槃二所生得的菩提功德至無漏善究竟圓滿所生得佛果轉依方圓滿善生之義三明此經說義甲就佛說此經以明一佛證得諸法實相後將所證者開示眾生令同得悟入二佛自己了脫生死之苦為酬度生本願而說法以解脫一切眾生生死之苦但此二義是遍通於一切經的今在此經中所特別見到的一佛之慈悲心平等普遍應機之方便不失其時故佛說法並不拘定其場所若道路若山林若水邊只要有聞法之機者即為說法此經即在水邊說又不拘定其人數為無量人說如是為一人說亦如是所謂搏象用全力搏兔亦用全力此經即為善生子一人說因善生長者子受父遺囑每日早起在水邊向六方禮敬並誦禱詞佛觀其孝思所宜即因機施教就禮六方為喻說此人群善法不同其餘有學問者不肯輕以與人如大學教授必須有入大學之程度的學生才肯教之又如云你不夠資格與我談話執自己之高貴不能隨機利人二大智度論有四悉檀義一世間悉檀即隨世間一般眾生的習俗而為說法二各各為人悉檀即隨各個人之善根機宜習慣程度而為說法三對治悉檀即對治眾生之煩惱病而為說法如眾生有貪病即為說布施功德有瞋病即為說慈悲功德等四第一義悉檀若眾生已聞如上諸法已除如上諸病即為開說諸法勝義此經乃屬各各為人悉檀應善生之機為說人生善法亦即世出世間之菩提根本三佛所說之法教人修習實行的唯在世出世間之善法其教人了知的法則通於十法界因果事理佛法約可分為五乘一人乘法二天乘法三聲聞乘法四緣覺乘法五菩薩乘法人乘法即修中品十善行以得人生又依此善行以保持人格及來生不失此人生佛是應化在人間故所教的眾生以人為對象以人為基本初成道時即先為提謂長者等說五戒十善等人乘善法此人乘乃人與人之間互相資助關係的人倫道德在本經中即是說明此義經中的六方與儒家五倫相似亦可稱為六倫此人倫道德之善法亦可上通於天乘進而可為聲聞緣覺等出世善法之基礎此為佛說此經之別義乙就今講此經以明如今年在廬山講的孛經前年在漢口講的十善業道經此皆向來無人講說到的經佛所說之經每部都有它的特點都有它的機宜應將大藏中不常見聞之經都提來講說流通今講此經亦為適機如提婆菩薩所造之百論第一捨罪福品明惡止善行法先令破除種種邪見使惡行止息俾淨善法自然生起此在前四悉檀中為第三對治悉檀但就現在的世界人類或中國人民的機宜上看起來尚不能用此法須先用善生惡滅之法使其培植善根增長福德得到人倫道德之基礎然後再來止惡因為現在人類正是五濁增盛諸惡叢集之時欲遽除其惡勢有不能如人病重之時不能以劇劑立除其病必須先培養元氣增長生機然後再為治病又如俗云君子道長小人道消小人道長君子道消現在正是小人道長之時欲即除小人而進君子事所難能必先培養君子之道使君子道長小人之道乃可消矣今中國之人民急欲培修善因善業以補人道元氣今講善生經正是為應此機復次現在在天災人禍內憂外患種種災亂困苦交迫之中世界人類皆在生死存亡之間要想救濟或求之能幫助於人類之力如科學利用物質的力量來救濟凡能有利於吾人者必設法以致之再如求之於超人的天神佛菩薩之力量為精神上的救濟設壇誦經祈禱神天之庇佑諸佛菩薩之感應然此皆假借果上所已成就之力量來謀救濟而非根本救濟之法前言人是由中品十善業因而生應常行十善以保茲福果若違反善行則人類之福減故災禍即隨之而至今欲救脫人類災禍仍須修行人類互相資助之十善業使福報增長轉災為祥轉禍為福善生災自滅矣且以十善行為人類之本性不假他力人人可以做到較之求佛天求科學尤為可靠今講此善生經即為人世之根本救災也四明此經譯史佛生於印度以印度語而說法當時所記錄之文字今流傳有兩種一梵文二巴利文由印度語文經過一番翻譯才成為中國文的經故經首對於譯人的資格籍貫及翻譯的年代皆有記載因為世間有許多假託的偽經如由某乩壇寫出的或某處天上墜下一石上有經文或某人自己創說的都稱為經或冒稱佛說故須考查其歷史是否佛說是何人於何時翻譯來華的若歷史不明則不能令人起信不能起信即不能依教奉行此經即為無用今先稽諸譯一後漢安息國三藏安世高所譯名佛說尸迦羅越六方禮經尸迦羅越即善生義二西晉沙門支法度譯名善生子經三姚秦三藏法師佛陀耶舍共竺佛念譯名善生經在長阿含十一卷中二考今譯今所講本乃東晉罽賓三藏瞿曇僧伽提婆所譯亦名善生經出中阿含三十三卷大品中罽賓國在北印度有處譯為迦濕彌羅國瞿曇此云日或云甘蔗乃釋迦之古姓僧伽此云眾提婆此云天眾天是名彼以釋迦之姓為姓故如是稱釋經甲一證信緣起乙一證信序我聞如是一時佛遊王舍城在饒蝦蟆林通常經中有六種或五種證信此經只有四種一舉親聞證信即我聞如是四字是此是阿難結集之語我聞乃阿難親從佛聞顯非虛妄阿難為佛侍者凡佛所說之法皆得親聞即阿難未為侍者以前所說之法佛皆為阿難重說故一切經首皆稱我聞如是或如是我聞謂如是經中所說是我親聞也二舉說時證信即一時二字是如記某一事必須有其年月日但經中不指出確定的日時者以佛法流通廣遍世界各國古今曆法不同故此一時即機教相應說聽俱訖之時三舉說主證信即佛字是佛者梵語佛陀此云覺者即對於宇宙萬有事理因果能究竟覺悟者稱之為佛此佛字本是十方諸佛之通稱但此閻浮提內之教法皆釋迦牟尼佛所說故此經中佛字專指說主的釋迦牟尼佛四舉說處證信即王舍城饒蝦蟆林是蝦蟆林在王舍城附近水邊蝦蟆甚多故名之王舍城是大地名如武昌城蝦蟆林是小地名如佛教正信會王舍城之靈鷲山及竹林精舍皆佛常說法之處乙二緣起序丙一述父囑爾時善生居士子父臨終時因六方故遺勑其子善教善訶曰善生我命終後汝當叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我善生居士子聞父教已白父言唯當如尊勑此段敘善生子受父遺囑善生居士有處譯為善生長者中國今以在家學佛者稱居士而印度之稱居士長者並不一定是學佛的人長者乃一年高二德長三學識才智過人之稱居士係農工商中素封端居之士所稱善生居士子因父得名亦名善生如舍利鶖弗子因母得名善生長者臨終時以禮敬六方囑其子六方之義深遠世間凡能成一具體之物者皆有六方如一人有前後左右上下即是六方前後為南北左右為東西頭足為上下在數學上之三度空間亦即六方如南北為長短度東西為廣狹度淺深厚薄為上下度乃至微塵原子電子小之不可測大之不可量皆有六方故平常所謂不是東西者即不成其為一物也此六方即宇宙一切物之普遍相善生長者使其子禮六方者即對於宇宙萬事萬物起敬心也善教善訶者教善令作訶惡令止業報相續謂之命一期報盡色心分散謂之命終禮不離乎心心中有誠敬則口發讚詞身行跪拜故禮通於三業志誠恭敬是意業稱揚讚嘆是語業叉手合掌是身業此中口出禱詞謂我盡恭敬供養者一盡自己的身命財產以供養之二盡一切眾生而禮敬之彼亦當恭敬供養禮事我者即感應之道凡有生氣之物皆有感應而有心識之有情感應更速爾以志誠恭敬對人人亦以志誠恭敬與爾爾以欺誑凶惡對人人必亦以凶惡欺誑相報在心行上雖然視無形而聽無聞而實最能互相感通如關係密切之人每能不言而喻心心相印聲氣相通信義相孚故眾生得成為共業所感之社會國家此可見人類本是互相關聯的應以善行相資相助方盡為人之道東方如是南西北方下方上方亦復如是則世界即成為和樂安善之世界矣居士子聞父教已即答曰唯唯者答應甚速謂當遵其教勑也丙二正行禮於是善生居士子父臨終後平旦沐浴著新芻摩衣手執生拘舍葉往至水邊叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我此段敘善生長者命終後其子依教奉行於是謂由此也平旦即天初曉日初出東方將明之際沐浴而著新芻摩衣者表其恭敬芻摩衣此云麻衣拘舍葉是印度樹名生者乃新鮮而非枯死之葉也手執此葉用作供養又表吉祥之義丙三述佛見彼時世尊過夜半平旦著衣持缽入王舍城而行乞食世尊入王舍城乞食時遙見善生居士子平旦沐浴著芻摩衣手執生拘舍葉往至水邊叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我此段敘佛早起乞食時見到善生子禮敬聽到善生子禱告世尊乃佛之尊稱梵語薄伽梵即智慧圓滿福德廣大為世所尊之義遙見者遠遠看見形容見時的情境丙四佛垂問世尊見已往至善生居士子所問曰居士子受何沙門梵志教教汝恭敬供養禮事平旦沐浴著新芻摩衣手執生拘舍葉往至水邊叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我耶此段敘佛見已問彼受何人教而作如是禮如是禱也受何沙門梵志教者謂受何類何人所教沙門乃出家之稱此云勤息謂勤行眾善戒定慧息滅諸惡貪瞋癡既出家當精勤行道不得優游放逸也梵志即婆羅門梵指宇宙萬有之清淨本體婆羅門教在印度古時亦稱梵教志者指奉行梵教為志之人也猶中國士農工商之士又如儒教之儒能掌民族文化教育者丙五答佛問善生居士子答曰世尊我不受餘沙門梵志教也世尊我父臨命終時因六方故遺勑於我善教善訶曰善生我命終後汝當叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我世尊我受父遺教恭敬供養禮事故平旦沐浴著新芻摩衣手執生拘舍葉往至水邊叉手向六方禮東方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我如是南方西方北方下方上方若有眾生者我盡恭敬供養禮事彼我盡恭敬供養禮事彼已彼亦當恭敬供養禮事我此段敘善生子回答世尊述父遺囑緣起分竟長阿含經中謂佛當時住在靈鷲山亦列有千二百五十人之聽眾與此譯本少有出入且譯緣起不過數行乃其譯者依中國文法變通而減少者今此本緣起經文廣複係依照梵文形式譯出文中以東方為首者能辨別方位由日出故由東而南而西而北者向右轉故左道為逆故向右轉甲二應機正說乙一因機贊善世尊聞已告曰居士子我說有六方不說無也居士子若有人善別六方離四方惡不善業垢彼於現法可敬可重身壞命終必至善處上生天中佛先問而後說法者恐彼受有邪教故同是禮六方而意義不同若是外道沙門梵志所教或有邪知見即當先破其邪執後為說法今善生長者乃正信居士名聞久著故佛先許曰我說有六方不說無也後依佛法為說六方之義離四方惡業垢者四方即四處四種之義並不指定何方垢即身心上不善之業現法即現生善處指人天二道若能身心清淨則現在為人所敬重來世得生於善道也乙二汎說諸法丙一四業穢居士子眾生有四種業四種穢云何為四居士子殺生者是眾生業種穢種不與取邪淫妄言者是眾生業種穢種於是世尊說此頌曰殺生不與取邪淫犯他妻所言不真實慧者不稱譽四種業四種穢者換言之即四種穢業種子業即事業行動造作皆名業有善有惡通常以業為一不好的名詞如自謙云我的業重又如訶人云造業的東西假若善業重造善業又何嘗不好眾生二子就凡夫說又名異生即常在異類流轉生死之有情廣義則佛亦得稱究竟眾生業種即種子習氣此種子習氣移人甚深故惡的種子習氣萬不可有如小兒從來未見殺雞初見時必起恐慌驚怖之狀如見以為常習以成性心中有此習氣種子即毫不介意而慈悲之心亦因此薄弱君子尚且遠庖廚況自己行殺傷害眾生造此罪業定墮惡趣故佛首先教人戒殺不與取者不得物主允許而取或以強力取或以巧計取皆屬偷盜此亦不可令成為習氣種子如常為盜而有習氣見人財物即起偷心業果相隨苦報繼之佛愍念眾生故次教人戒除不與取邪淫者謂於非夫婦或夫婦而非時非道非處而行淫圓覺經云欲界眾生皆依淫欲而正性命故夫婦配偶非佛所禁但須發乎情止乎禮若侵犯他人妻女即成罪業應感苦報故佛令戒除邪淫至於出家修清淨梵行為成就出世勝因故須全斷妄言即虛妄不實之言人生於世不能獨立生存須假社會人群互相資助若語言虛誑不能使人生信既不為人所信即不能受人之資助則危及自己生活矣此四者皆智者所不肯為所不稱譽之事為古今中外人類道德之基本若國民無此基本則社會即成紊亂人生即成困苦丙二四罪福丁一四事罪居士子人因四事故便得多罪云何為四行欲行恚行怖行癡於是世尊說此頌曰欲恚怖及癡行惡非法行彼必滅名稱如月向盡沒四事即欲恚怖癡四件事欲是貪欲由五根發五識貪著色聲香味觸之五塵又貪世間財色名食睡之五欲但欲非完全不善亦有清淨高尚之願欲此指貪著物欲而言故稱罪事恚是瞋恨忿恚能直接損害於人在一切煩惱中最重者即此瞋恚心所謂一念瞋心起八萬障門開通常以心中苦悶事不如意為有煩惱而不知常不離懷的貪癡等皆為煩惱但瞋恚則相粗而易知故恚心所在三界中惟欲界有也怖即恐怖因受外界所迫內心生起怖畏此由於心中有我貪我見執著我故恐人損我而起怖畏此中行怖者乃是無悲憫心惱害眾生令他生怖但行怖亦非完全不善如遇剛強眾生用威行化而降伏之此雖令他生怖亦能因怖滅惡生善但如水中魚空中鳥人雖無害心彼亦見而生怖此乃魚鳥自己的業感煩惱非人之罪事癡即無智慧而不明了宇宙之因果事理但癡的本身非即罪惡由癡而生貪等煩惱損害有情即成罪事故云一切煩惱無明為本無明即癡之體由癡而直接生出的即是邪見邪見有五種一身見二邊見三邪見四戒取見五見取由邪見發出邪慧而起邪行損惱有情故成罪事此四罪事名為惡行又名非法行即非順法相法性之行如此則聲名敗壞人不稱譽如十六至三十之月漸漸消沒殆盡瑜伽菩薩戒中四根本戒即戒此四事丁二四事福居士子人因四事故便得多福云何為四不行欲不行恚不行淫不行怖不行癡於是世尊說此頌曰斷欲無恚怖無癡行法行彼名稱普聞如月漸盛滿罪福本是對待之稱反上非法行之罪事即成法行之福事法行者即順乎緣生法相性空法性之正行現生成世間善人君子來世感人天福報等而上之證出世三乘之果乃至精進不已福慧兩足而證佛果故喻如月漸盛滿凡是善人人必稱揚能離四罪而行四福自然名稱普聞若更能修證契悟即名傳千古矣世之好名者何不於是求之丙三六非道丁一長行戊一略標居士子求財物者當知有六非道云何為六一曰種種戲求財物者為非道二曰非時行求財物者為非道三曰飲酒放逸求財物者為非道四曰親近惡知識求財物者為非道五曰常喜妓樂求財物者為非道六曰懶墮求財物者為非道前四業穢從倫理道德上講四罪福從心理道德上講此六非道從人間經濟道德上講蓋吾人生活所需不能不求財物但君子愛財須取之有道一種種戲求財物者如賭博競勝比武猜彩等如此求財是為非道二非時行者如玩弄娼妓不作正業唐喪光陰三飲酒放逸亦非求財之道四親近惡知識者知識即相識之人惡知識即惡友親近惡友不但不能得財反而有傾家破產喪身失命之禍五常喜妓樂者即性好歌舞娼妓徒恣浪費六懶墮者性好遊蕩不喜作業前五不儉第六不勤如此求財皆為非道如緣木求魚其害尤有過之戊二廣釋己一釋戲求過居士子若人種種戲者當知有六災患云何為六一者負則生怨二者失則生恥三者負則眠不安四者令怨家懷喜五者使宗親懷憂六者在眾所說人不信用居士子人博戲者不經營作事作事不營則功業不成未得財物則不能得本有財物便轉消耗此段釋上種種戲求財物以博戲而求財物不但求財不得事業不成而本有財物且亦因此消耗又不但喪財而精神亦因之受損失且有六種災患賭博場中最易生怨起爭若與人競爭勝利負則必生羞恥夢寐不安神魂顛倒怨家遂其欲而生喜宗親因愛護而懷憂賭博之徒智者所訶眾人亦不信用己二釋非時行過居士子人非時行者當知有六災患云何為六一者不自護二者不護財物三者不護妻子四者為人所疑五者多生苦患六者為人所謗居士子人非時行者不經營作事作事不營則功業不成未得財物則不能得本有財物便轉消耗此段釋上非時行求財物非時行者如倒晝作夜不顧身家眷屬不行正業即世間放蕩浪子此等人亦有六種災患如文可知己三釋飲酒放逸過居士子若人飲酒放逸當知有六災患云何為六一者現財物失二者多有疾患三者增諸鬥諍四者隱藏發露五者不稱不護六者滅慧生癡居士子人飲酒放逸者不經營作事作事不營則功業不成未得財物則不能得本有財物便轉消耗此段釋上飲酒放逸求財物酒能亂性飲酒者必多放逸因此亦有六種過患一酒醉時往往身家不顧財物喪失二酒含毒汁能傷肺致疾或因醉露宿因醉跌倒致生疾病三酒能興奮易起鬥諍四醉時多發狂言雖有隱密之事不知自護以致計劃失敗五世之醉漢智者所避無人稱譽無人愛護六酒性昏迷能令智慧減滅轉生愚癡己四釋近惡友過居士子若人親近惡知識者當知有六災患云何為六一者親近賊二者親近欺誑三者親近狂醉四者親近放恣五者逐會嬉戲六者以此為親友以此為伴侶居士子若人親近惡知識者不經營作事作事不營則功業不成未得物則不能得本有財物便轉消耗此段釋親近惡知識求財物知識即相認識之義善友為善知識惡友為惡知識或有以知識二字為一名詞者這是錯誤的喜近惡友有六種災即所與為伴侶者皆是狂醉放逸恣肆好勇鬥狠之輩日與嬉戲游蕩不經營正業以致家產蕩盡身敗名裂己五釋喜妓樂過居士子若人喜妓樂者當知有六種患云何為六一者喜聞歌二者喜見舞三者喜往作樂四者喜見弄鈴五者喜拍兩手六者喜大聚會居士子若人喜妓樂者不經營作事作事不營則功業不成未得財物則不能得本有財物便轉消耗此段釋上喜妓樂求財物亦有六種過患即喜聞歌喜觀舞或自歌舞喜鬧熱聚會拍手叫呵此種浪漫行為人所輕視事業荒廢財物消耗己六釋懶墮過居士子若有懶墮者當知有六災患云何為六一者大早不作業二者大晚不作業三者大寒不作業四者大熱不作業五者大飽不作業六者大飢不作業居士子若人懶墮者不經營作事作事不營則事業不成未得財物則不能得本有財物便轉消耗此段釋上懶墮求財物懶墮之人亦有六種過患如文可知凡寒熱飢飽有可藉口之時皆不肯作事如此事業不成求財不得家財轉消故名非道以上六種皆是消耗不能生產現時勞神喪財身敗名裂來生墮落苦趣失卻人生故云非道非人倫善道也人生於世必須有正當事業殷勤經營使衣食豐足生活安定然後才能生起種種善事所謂衣食足然後禮樂興倘使懶墮放蕩無恒業無恒心必致飢寒交迫挺而走險則惡事生而苦報隨之矣即出家修道者亦須四緣具足生活安定所謂身安則道隆世人往往謂學佛者是消極的是分利份子佛法何嘗如是人未依佛法行耳此中正是明在家學佛者於生活所需的正當事業應各盡其責對於社會互相資助今之世人果能依佛所教戒除六種非道各安其業實行人倫互助之道則社會必成一和樂安善之社會矣豈不美哉即出家者亦有正當的修學和弘化不是坐食分利的可分為三種一初出家者如社會上的學生正修學時期應受供養學成後能利人故二學有成就時廣行教化昌明佛法普利人天常以種種善因善行教化眾生有功於社會人類故應受供養三年老身衰之大德既有修學之苦行又有教化眾生之功德一言一行皆可為後學之模範年高臘長所謂長老上座故應受供養本來出家乃脫離家屬拋棄家產水邊林下可以安宿山果野粟可以充飢佛制乞食受供者乃為遊行教化與世人接近令眾生種福田故在中國改為叢林制度或將信施建為寺院庵堂置產安居此亦未嘗不可但須精勤修學弘揚教法使有利於社會人世故亦不是分利份子現今世人皆謂受生活壓迫想出種種方法求其解決而益不能解決仔細觀之太半求之非道若能依佛法行求財於人倫道德善法為根本之正道則人生生活安定經濟問題自易解決矣丁二重頌於是世尊說此頌曰種種戲逐色嗜酒喜作樂親近惡知識懶墮不作業放恣不自護此處敗壞人行來不防護邪淫犯他妻心中常結怨求願無有利飲酒念女色此處敗壞人重作不善行狠戾不受教罵沙門梵志顛倒有邪見兇暴行黑業此處敗壞人自乏無財物飲酒失衣被負債如涌泉彼必壞門族數往至酒鑪親近惡朋友應得財不得是伴黨為樂多有惡朋友常隨不善伴今世及後世二俱得敗壞人習惡轉減習善轉興盛習勝者轉增是故當習勝習昇則得昇常逮智慧昇轉獲清淨戒及與微妙止晝則喜睡臥夜則好遊行放逸常飲酒居家安得成大寒及大熱謂有懶墮人至竟不成業終不獲財利若寒及大熱不計猶如草若人作是業彼終不失樂此總頌六種非道求財重頌即將長行之義重為頌說佛說重頌三義一便於記憶二使鈍根者重聞得以領悟三令後到者得聞丙四四似親丁一總標居士子有四不親而似親云何為四一者知事非親似如親二者面前愛言非親似如親三者言語非親似如親四者惡趣伴非親似如親似親者貌似而實非外雖顏貌和悅似為可親內則包藏禍心不可測度往往令人不能辨別致受其害此世尊教善生子立身處世接物待人之道當認識此種虛偽之人知所防護一知事者長阿含經中譯為畏服謂善伺他人之意小心謹慎殷懃服事而其作用在窺其私奪其財若不能辨別以為可親信任不疑即受其害二面前愛言長阿含經中譯為美言即巧言面諛之義面前讚善背後說非之輩三言語非親者即口中一味順人心中別懷作用四惡趣伴者引人游蕩作惡之伴此種人每能先出錢財引誘於人如請人到茶館酒店吃煙看戲賭博等使其游蕩成性彼即從中沾其便宜或設計相害此四等人皆貌似親而實非親宜明辨而遠離之丁二別釋戊一釋知事非親居士子因四事故知事非親似如親云何為四一者以知事奪財二者以少取多三者或以恐怖四者或為利狎習於是世尊說此頌曰人以知為事言語至柔軟怖為利狎習知非親似親常常遠離彼如道有恐怖一知事奪財者窺知其心中所欲先以便宜與人使墮其彀中後奪其財長阿含經中譯為先與後奪二以少取多者以微少財物與人便起大希望欲其厚報三或以恐怖者彼以小心謹慎現出恐怖畏服之狀以博取其歡心俟其不備彼即行害或竊其財四狎習者狎即親近之義為得利益而親近之非真親近也如此等人是為非親須詳辨識而遠離之視為險道如道路之有盜賊虎狼然萬不可涉足於是致招損害戊二釋面前愛言居士子因四事故面前愛言非親似如親云何為四一者制妙事二者教作惡三者面前稱譽四者背說其惡於是世尊說此頌曰若制妙善法教作惡不善對面前稱譽背後說其惡若知妙及惡亦復覺二說是親不可親知彼人如是常當遠離彼如道有恐怖一制妙事者妙事即善事如利人之事能得名聞功德將來能得善報彼懷嫉妒而破壞之二教作惡者以種種巧言教令作惡事三當面讚揚逢迎四背毀說其惡如此等人是為非親吾人預先知其事之善惡然後才能覺察其說之是非與人之可親不可親若知其不可親常當遠離視為畏途免受其害戊三釋言語非親居士子因四事故言語非親似如親云何為四一者認過去事二者必辯當來事三者虛不真說四者現事必滅我當作不作認說於是世尊說此頌曰認過及將來虛論現滅事當作不作說知非親如親常當遠離彼如道有恐怖言語惑人黠者為之愚者難免受其害有似恭敬誠懇而實為誑者一認過去事者謂對於過去之事加以種種解釋二必辨當來者即對於將來之事說得如何美妙三虛不真說者現在雖見其有錯誤過失而不肯實說專以虛假之言令其歡喜如占相卜卦之流多善為此等言語四現事必滅者如見其事業必敗彼即假事以制伏之俟其有缺陷處彼即乘機相害落井下石或先養成其惡復設法令其暴露而陷害之如此等人陰險可畏常當遠離戊四釋惡趣伴居士子因四事故惡趣伴非親似如親云何為四一者教種種戲二者教非時行三者教令飲酒四者教親近惡知識於是世尊說此頌曰教若干種戲飲酒犯他妻習下不習勝彼滅如月盡常當遠離彼如道有恐怖一教種種戲者即教其賭博游蕩二教非時行者即教其邪淫放逸三教飲酒者令醉而作惡事四教親近惡知識者教其呼朋引類日行非法如此作業必墮惡趣故云惡趣伴如此等事常人雖知其不善而引之為樂不能遠離故世尊詳告善生居士子喻如月將滅盡令生恐怖而遠離之丙五四善親丁一總標居士子善親當知有四種云何為四一者同苦樂當知是善親二者愍念當知是善親三者求利當知是善親四者饒益當知是善親佛告善生居士子有四種人是真善可親者一同苦樂長阿含經中譯為同事即同作事時能苦樂相同患難相共者二愍念者即見人有危難困苦時能悲愍救濟者三求利者即四攝中之利行非求私利凡與人作事必求其以利與人四饒益者能令人止惡行善助其善業成就福德增長多所饒益此四種人是為可親故名善親丁二別釋戊一釋同苦樂居士子因四事故同苦樂當知是善親云何為四一者為彼捨己二者為彼捨財三者為彼捨妻子四者所說堪忍於是世尊說此頌曰捨欲財妻子所說能堪忍知親同苦樂慧者當狎習能與人同甘苦共患難者是為善而可親此有四事能捨己以利人不顧身家眷屬小之財物大之身命妻子皆可為救人而捨捨己即捨身命如古時有刎頸之交所說堪忍者若朋友因一時煩惱衝動縱發非理粗惡之言能自忍受知其心中本無異懷故又如有損人情面之事能隱以相告私下相責使人能忍受悔改如古時忠臣諫君之奏章上後將原稿毀去不使人知令君默忍非故博忠臣之名者若雖屬耿耿忠言當眾呵諫令君難堪則非善此堪忍通於自他能堪忍者是名善親戊二釋愍念居士子因四事故愍念當知是善親云何為四一者教妙法二者制惡法三者面前稱說四者卻怨家於是世尊說此頌曰教妙善制惡面稱卻怨家知善親愍念慧者當狎習教妙法者即教善令行制惡法者即制惡令止面前稱說者見面即讚其善令增長善行卻怨家者如有他人毀說其惡便能代為解釋而抑制之如此之人是為可親有智慧者當親近之戊三釋求利居士子因四事故求利當知是善親云何為四一者密事發露二者密不覆藏三者得利為喜四者不得利不憂於是世尊說此頌曰密事露不藏利喜無不憂知善親求利慧者當狎習一密事發露者如朋友被他人以計相害彼能預先告之使其小心謹慎有所防備不致受害又如有獲利之機會彼亦能祕密相告令其獲利二密不覆藏者謂自己有密事能披膽相告不隱藏三者見友人得利而生隨喜心四者如自己不得利不生憂戚心懷坦白安分守己如此等人是為善而可親戊四釋饒益居士子因四事故饒益當知是善親云何為四一者知財物盡二者知財物盡已便給與物三者見放逸教訶四者常以愍念於是世尊說此頌曰知財盡與物放逸教愍念知善親饒益慧者當狎習愛護於人須顧到生活與教育兩方面若徒以酒肉相親非屬好友常以愍念心見其窮困能與財救濟見其放逸能以正言訶責以善意教誨如是之人是為善而可親以上四四十六事皆是善親但此不過舉其大概而已凡言行合乎人倫道德之標準有利於人者皆是善有智慧者當親近之乙三正說六方丙一長行丁一總標居士子聖法律中有六方東方南方西方北方下方上方前泛說諸法以下正說六方聖法律即佛所說之經律禮六方者非禮方位乃禮敬六方眾生及諸法性相人與人之關係本是合乎倫理道德互相資助互相感應的故禮六方即得六方有情之感應而報酬以禮但人與人之關係並不是儱侗的故世間五倫各有所應盡之義務此中六方即是六倫或是父母師長或是妻子朋友或是子女童僕等級不同故相待相報亦有差異丁二別釋戊一東方父子居士子如東方者如是子觀父母子當以五事奉敬供養父母云何為五一者增益財物二者備辦眾事三者所欲則奉四者自恣不違五者所有私物盡以奉上子以此五事奉敬供養父母父母亦以五事善念其子云何為五一者愛念兒子二者供給無乏三者命子不負債四者婚娶稱可五者父母可意所有財物盡付其子父母以此五事善念其子居士子如是東方二俱分別居士子聖法律中東方者謂子父母也居士子若人慈孝父母者必有增益則無衰耗人倫關係父母最重天地六方東方為首故此處以東方喻父母子女對於父母應以五事奉敬供養一增益財物者須勤勞精進使家產日增不令父母因子女受累二備辦眾事者凡家中所應作之事即上前為父母分勞三所欲則奉四自恣不違者能奉養父母意志若父母身有所需心有所欲當盡其能力財力以供奉之不得違背五能將自己私物奉上父母無有吝惜如此可謂孝順子矣父母亦當以五事善念其子所謂父子有恩一愛念兒子者父母當常存慈愛之念從小至長無時不愛所謂為人父止於慈二供給無乏者如衣食學費等皆能為子女儲蓄無使缺乏三命子不負債者雖有正當供給當監管其浪費無使負債受累四婚娶稱可者子女長而婚嫁須為謀相當之偶配使其稱心可意五財物盡以付子者因子女孝順可承家業即將家財盡付其子或臨終時遺囑付之或年老時即先撒手盡付其子二俱分別者能了解父母與子子與父母之關係子應如何奉敬父母父母應如何慈念兒子能如上所述各盡五事可謂父父子子矣既能父慈子孝福報必有增益無有衰耗戊二南方師弟居士子如南方者如是弟子觀師弟子當以五事恭敬供養於師云何為五一者善恭順二者善承事三者速起四者所作業善五者能奉敬師弟子以此五事恭敬供養於師師亦以五事善念弟子云何為五一者教技術二者速教三者盡教所知四者安處善方五者付囑善知識師以此五事善念弟子居士子如是南方二俱分別居士子聖法律中南方者謂弟子師也居士子若人慈順於師者必有增益則無衰耗中國古時所敬奉者有天地君親師但五倫之中乃無師弟倫五倫乃對家國之關係而言古時政教不分將師弟即攝於兄弟之中矣此中講師弟而無兄弟兄弟亦即可攝於此中矣弟子對師當以五事恭敬供養一恭順者所謂兄友弟恭弟子當恭敬順從於師能起恭順方能受教二善承事者或以財力或以勞力供事於師所謂有事弟子服其勞三速起者見師速起慇懃尊重之表現也四所作業善者能依師所教而實行之五奉敬師者若師有教命敬奉無違師亦以五事善念弟子一教技術能將自己所能之技術教授弟子二速教者能觀其機宜而速教之不使久居人下三盡教所知者能將自已所知盡授弟子不留藝不隱藏四安處善方者能令弟子了解善行入於正軌以所能而獲所報不非理求財五付囑善知識者能指示弟子參訪餘師如華嚴經中善才童子先禮文殊文殊令參德雲比丘展轉親近各方善知識乃至五十三參戊三西方夫婦居士子如西方者如是夫觀妻子夫當以五事愛敬供給妻子云何為五一者憐念妻子二者不輕慢三者為作瓔珞嚴具四者於家中得自在五者念妻親親夫以此五事愛敬供給妻子妻子當以十三事善敬其夫云何十三一者重愛敬夫二者重供養夫三者善念其夫四者攝持作業五者善攝眷屬六者前以瞻侍七者後以愛行八者言以誠實九者不禁制門十者見來讚善十一者敷設床待十二者施設淨美豐饒飲食十三者供養沙門梵志妻子以此十三事善敬順夫居士子如是西方二俱分別居士子聖法律中西方者謂夫妻子也居士子若人慈愍妻子者必有增益則無衰耗此在人乘佛法上明夫婦之關係為夫者對於妻子當以五事愛敬而供給之一憐念者當憐愍愛念不得虐待二不輕者當相待以禮相對如賓不得輕戲三為作瓔珞嚴具者對於身相莊嚴之具當供給之四於家中得自在者謂在家中能作主宰支配家務得以自由五念妻親親者常親愛信任不現疏遠之情妻子當以十三事敬順供養於夫十三事文義可知總其義即須專愛無異念常侍奉飲食起居之事以誠敬相從夫倡婦隨治家作業更能善念夫之眷屬又能供養沙門梵志為全家祈福如此可謂賢妻矣福德必有增益而無衰損戊四北方主僕居士子如北方者如是大家觀奴婢使人大家當以五事愍念給恤奴婢使人云何為五一者隨其力而作業二者隨時食之三者隨時飲之四者及日休息五者病給湯藥大家以此五事愍念給恤奴婢使人奴婢使人當以九事善奉大家云何為九一者隨時作業二者專心作業三者一切作業四者前以瞻侍五者後以愛行六者言以誠實七者急時不遠離八者行他方時則便讚歎九者稱大家庶幾奴婢以此九事善奉大家居士子如是北方二俱分別居士子聖法律中北方者謂大家奴婢使人也居士子若有人慈愍奴婢使人者必有增益則無衰耗長阿含經中以北方講宗族下方才講主僕主僕即首從之義推廣言之君臣亦是主僕大家音姑指主人如云東家主人當以五事愍念僕人當量力使用不可強迫虐待飲食醫藥皆當隨時供給之奴婢當以九事奉事主人即勤謹作事忠實於主人敬愛主人出外則讚揚於主人雖遇急難而不遠離五事九事文義可知戊五下方親族居士子如下方者如是親友觀親友臣親友當以五事愛敬供給親友臣云何為五一者愛敬二者不輕慢三者不欺誑四者施與珍寶五者極念親友臣親友以此五事愛敬供給親友臣親友臣亦以五事善念親友云何為五一者知財物盡二者知財物盡已供給財物三者見放逸教訶四者愛念五者急時可歸依親友臣以此五事善念親友居士子如是下方二俱分別居士子聖法律中下方者謂親友親友臣也居士子若人慈愍親友臣者必有增益則無衰滅此中親友與親友臣乃地位高下之謂當互資助尊長慈幼各盡其親愛之誼此即推父子之恩及於九族所謂親親之道也如此必有增益而無衰損戊六上方施僧居士子如上方者如是施主觀沙門梵志施主當以五事尊敬供養沙門梵志云何為五一者不禁制門二者見來讚善三者敷設床待四者施設淨美豐饒飲食五者擁護如法施主以此五事尊敬供養沙門梵志沙門梵志亦以五事善念施主云何為五一者教信行信念信二者教禁戒三者教博聞四者教布施五者教慧行慧立慧沙門梵志以此五事善念施主居士子如是上方二俱分別居士子聖法律中上方者謂施主沙門梵志也居士子若人尊奉沙門梵志者必有增益則無衰耗施主即在家檀越受施者為沙門梵志農工商皆能直接生利而士則讀書以掌政教應受社會供養廣言士之義則導師沙門皆屬於士沙門梵志乃印度讀書掌教化之士能以世出世間善法教導於人自己亦有高尚之道德修養故沙門又稱為上人能為人之標榜導人行善有利於社會人群故應受供養施主當以五事尊敬供養之一不禁制門者印度沙門梵志不立煙爨乞食為生來行乞時不禁其入門也二讚善者不但不禁且以善言而讚揚之使其心生歡喜增益道行此屬語業供養三敷設床待者即對身形上之供養四奉施飲食須淨美豐饒不應以粗惡之飲食施沙門梵志五擁護如法者能認識佛法能分別善惡邪正是真有德者當如法供養而擁護之若不能分別善惡邪正而擁護供養不但無益而反障蔽正法此在家學佛者所當注意的若欲布施先看對方是否應受供我所供是否如法不應以情感作用或以布施而要令譽施主以財施供養沙門梵志即以法施報答如講經弘法時有偈云利益報檀那厚德法施亦有五事一教信者教其正信三寶行信者依法僧而修信行念信者使其對三寶明記不忘善念增長二教禁戒者教授持佛之禁戒或五戒或八戒或菩薩大戒三教博聞者使依佛教法博聞經典明了正法四教布施者即教其行善獲福布施有三種一報酬有恩對於父母等有恩於己之人以身命財力而供養之此是孝心二奉事有德如建立寺院供奉佛像供養修行大德此是敬心三救濟有苦見一切災亂困苦中眾生設法救濟之此是悲心五教慧者為講種種教義令生智慧但空解其理知而不行仍是無用須有行慧要依理持戒而實行立慧者由戒生定因定而發之慧方是真慧不可移轉如孔教所謂知止而後能定定而後能靜靜而後能安安而後能慮慮而後能得由靜慮而得的方是立慧從持戒修行而得者為之行慧又此教行立三慧即聞思修三慧以上正釋六方竟表面觀之彼以五事待我我以五事報彼似乎計較報酬非究竟善行其實此乃因果不謬報酬不爽法爾如是之感應現象也丁三明四攝居士子有四攝事云何為四一者惠施二者愛言三者行利四者等利凡發菩薩心而利他者當奉行此四法此四法能將一切眾生收攝在佛法中故云四攝法一惠施他處譯為布施欲攝受眾生或以財施或以法施或以無畏施而饒益之彼必願親近而受教二愛言或譯愛語欲教化眾生不能以剛強之言與之抵觸須以柔和之言語至誠之態度令其心悅誠服三行利他處譯為利行凡作事能以利益與人人自易來相親於此行化則庶幾矣四等利他處譯云同事能與人同甘苦共患難人亦必易來相親普通人或以職業不同或以地位不同即有隔礙不易相親或反為敵抗有此四事則可攝受一切眾生而教化之是名行菩薩道丙二重頌於是世尊說此頌曰惠施及愛言常為他行利眾生等同利名稱普遠至此則攝持世猶如御車人頌文與長行前後次第不同又或頌文中有而長行中無者長行中有頌文中無者此六句重頌四攝法能行四攝即是大乘菩薩能攝受世間一切有情御車人者即調御師佛之尊號之義能調伏有情故若為攝持者母不因其子得供養恭敬父因子亦然若有此法攝故得大福佑即家庭父子之間亦不能離此四法須互相供給言語和順作事當互相體量其心能同甘苦於是父母因子得恭敬供養子因父母得慈愛教養家庭和樂福壽增益此頌東方照遠於日光速利翻捷疾不麤說聰明如是得名稱定護無貢高速利翻捷疾成就信尸賴如是得名稱常起不懶墮喜施人飲食將去調御正如是得名稱此三頌參閱長阿含經中之譯文乃汎頌南西北上方之義親友臣同恤受樂有齊限謂攝在親中殊妙如師子此四句重頌觀下方初當學技術於後求財物後求財物已分別作六分一分作飲食一分作田業一分舉藏置急時赴所須拚作商人給一分出利息第五為取婦第六作屋宅家若具六事不增快得樂彼必饒錢財如海中水流彼如是求財猶如蜂採華長夜求錢財自當受快樂凡人必有一種技術技術須先學習否則不學無術無以謀生不能為社會生產故云初當學技術但既能生產尤須善於支配明了消費之法此頌中將所有財產分為六分一分作日常生活所需一分作田業者即購置不動產所謂有恆產然後有恆心一分儲蓄以備急需一分作農工商之活動資本以生利息一分取婦以成立家道第六分作屋宅者長阿含經中謂起塔廟作功德慈善事業興隆三寶前五立業成家令現世優裕第六增長福德善根使來世富貴此亦善生之義也出財莫令遠亦勿令普漫不可以財與兇暴及豪強此四句在長阿含經中即明上之三種布施謂出財布施須有標準不得濫施若與凶暴豪強之人恐反助其為惡也東方為父母南方為師尊西方為妻子北方奴婢使下方親友臣上沙門梵志願禮此諸方二俱得大稱禮此諸方已施主得生天此總頌六方回向生天甲三如說奉行佛說如是善生居士子聞佛所說歡喜奉行歡喜即歡喜接受之義以三皈成立信心以五戒成立善行方能信受奉行今講此經希望聽眾亦能信受奉行此善生之法再進而能展轉將自己所信受之善法開示他人令信令行乃至全武漢全中國全世界人類均能奉行此人倫道德之善生法以善其生使善生惡滅災消福長化刀兵為玉帛轉災禍為吉祥再進而修無漏善法使功德圓滿各各成佛塵空記正信會印單行本
