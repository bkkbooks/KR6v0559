body:
  text: 人生佛教與層創進化論三十三年秋在漢藏教理院講一人生佛教之層系甲無始終無邊中之宇宙事變乙事變中之有情眾生業果相續丙有情業果相續流轉中之人生丁有情流轉中繼善成性之人生戊人生向上勝進中之超人己人生向上進化至不退轉地菩薩庚無始終無邊中之宇宙完美人生佛二人生佛教層系與層刱進化論之比較一人生佛教之層系第一圖的七個橫線是表示人生佛教的七個層系這種次第含有高度和廣度的意義高度者是以其理性的高低淺深而言亦可說為深度廣度即以其範圍而言亦即是示其量的大小今逐層分說於下甲無始終無邊中之宇宙事變說宇宙事變即是說宇宙萬有的一切法時間空間即事變分位宇宙即包括一切法並是有變化有生滅的事事物物一切有生滅變化的法即是無常諸行諸行是指一切有為法因其有生住異滅的變化故說是行無常是說一切有為法的時刻在變化在時間上找不到牠的起始和終止在空間裏尋不著牠的中間和邊際若更進而放寬說亦是無我的一切法並將無為法包括在其中了故無始終無邊中的宇宙事變括盡了有為無為一切法換些名辭也可說為緣起性空法唯識性相法華嚴的五重法界法華的三千性相其範圍至為廣闊故初層的線也最長乙事變中之有情眾生業果相續在無常諸行和無我諸法的盡一切法宇宙事變中特提出有情世間來說這層是以有情眾生為中心以有機的生命為重點在有情上建立一切其層度比初層稍微狹小這兩層若以天台學家所說的百界千如的三千性相來說第一層的宇宙事變可總包括三千性相三千性相即是國土一千眾生一千五蘊等法一千總名叫作三千性相性相等百界千如即是諸法實相這種境界唯佛與佛乃能究竟第二層注重有情世間特說眾生一千性相也但有情亦不能離開依報國土的器世間和有情所依的五蘊等不過此階段特以有情作中心罷了細究這有情的生命相續是由造業感果轉展不已故有情的生死流轉相續不息也由前世造業感今生之果報此生造業又招來生受果故有情流轉三界出沒四生皆是三世業果相繼在教理上特顯示者為十二有支緣起說有情的生死流轉因果由此廣推及一切法的緣起亦不出此十二有支有情的各個報身是由各人的自業所感依報的器界國土亦是諸多有情的共業所招有成住壞空的生滅相續五蘊等一切法是自共業果相續又即五蘊等的積聚試分析有情的本身皆是五蘊法等的組合體此層因以有情為中心故線稍短以示量之較狹丙有情業果相續流轉中之人生在有情業果相續中特提出人生來說在有情界裏人類算是最靈的了由有情各自造業感受別報的身根由共同造業感受總報的世界國土而人類刱造力特強此層特注重人生在有情流轉中來看人生下層有三惡趣上有天趣中間是人的地位好像一切為人生設施的而人生的力量不可思議成凡成聖皆是人所自作故佛陀現身人間說法度生由人成佛能夠聽聞佛法受持學修者亦是人類此層以人為中心去看一切眾生之業果相續流轉生死特別講明人生因果故比上一層更為狹小丁有情流轉中繼善成性之人生在易經裏有兩句嘉言是繼之者善成之者性是說明人生以繼善成性為最善最美的標準這種學說在紛紜繁變的人界中推為至當的格言在講世間法的學說裏也算是最完滿的哲學了這兩句話以佛法來說可證明有情之業果相續中人生是善業所感造人的業因受人的果報人生的業因即由各人所行之五戒十善等業行此業行是善的故感人生之善的果故中國的儒家說人性是善的將此善性繼續而擴大成賢成聖皆由此也孟子說人異於禽獸者幾希二者的距離相差不遠看能否繼善於此幾希中擴充之以完成人性建立完滿的人格故繼之者善而成之者性也於人生中最重要者是善須假繼善之功成完滿善性的人生即是依繼善成性之行為作五戒十善之行以此善的人生因果律成人性完全之善性此層成立人生果報繼續修善完全以人為中心其他一切環境全以人的用功致力而達其美善這種道理是儒家的特長而佛教向來將此忽略了尤其是中國佛法因儒家已有詳細的發揮以為佛法不須重視今講人生佛教特將此點提出來依人的果報修人的業行使相續不失人身作進修的基礎故其寬度較上下度為最狹此為人生的樞紐成凡作佛以此為轉捩點而人生佛教之重心亦在此故此層最為重要戊人生向上勝進中之超人這裏的超人包括天界天神但不用天神的名目者以此層比天界天神的範圍寬廣只要超出人類以上的都是此可包括三界諸天和三乘初發心的修行者若二乘人還沒有得到極果的時候仍不出於人類和欲色界天而大乘菩薩行也在人天中成就故此超人的包括很寬由人修行增進至超人的勝行或是三界裏的天神或是出世的二乘賢聖大乘的菩薩行皆從人成這是人中的向上前進者故此層量度又稍放寬己人生向上進化至不退轉地菩薩由勝進中的超人修大乘行達到不退轉的地位是為二乘聖者的極果以菩薩聖位亦可包括二乘聖者大乘聖者所修菩薩行教化一切眾生為利生故遍入三界五趣除佛的法界外其餘的九法界的眾生皆是菩薩行化領域居於九法界之最上位與第十之佛法界相近了庚無始終無邊中之宇宙完美人生佛這層與初層一樣寬但與初層不同這是佛陀證到的無上正等正覺的最高境界一切法的範圍有多大而佛的智境亦有多大窮盡一切法的邊際就是佛的智慧法身邊際此層最寬廣中間人之一層因屬人生佛教所特提出討論之點是為適應今世界人類之需要作為人的立足點但非是人生究竟的目的而究竟的目的是在成佛這是佛教特有的趨向與儒家不同儒於這七層中前三系和後三系都顧不及即所謂六合之外存而不論是僅顧到人事人間之外的事存而不論也故中間這一層最狹特示明儒家的道理僅說到人間其沒有佛法的廣度尤其沒有佛法的高度深度故居人間而人所依止的一切法一切眾生不能深切明徹其超人之三界天人三乘之聖者菩薩境界及究竟之佛境界皆未之聞也故佛教與儒教不同而向來儒家每謂佛法厭世忽略人生今則特提倡此人生佛教注重人生的因果業報繼善成性達佛之極果一面又指明儒家的道理不及佛法的宏廣高深也二人生佛教層系與層刱進化論之比觀層刱進化論是英人穆耿亞歷山逗所發明的是英國新近的一派哲學其理論是綜合現代科學的成果及各派哲學和宗教哲學的所長而成的為很有層次系統的新哲學有人說我的人生佛教的層系與亞氏的層刱進化論的層系相仿其實不然他的次第是塔模式的上小下大我的這個次第是上下大而中間小不惟是形式的不同尤其是內容更判若雲泥他的最底一層的基礎是以無限或有限的時間和空間建立的似乎更與人生佛教的第一層的無始終無邊中宇宙的意思相同但我說的是包括一切宇宙事變的現實法他只是一個空洞的時空的虛架子他的第二層是物質亦只是時空中的單純物質這與佛法所說的色法相同色法即是有質礙有變化的物質在空洞的時空裏有物質的存在是更加一重意義了他的第三層是比較時空物質再增進一步成為有機的生命物生物與物質的不同是有生命連綿的狀態生殖死限等生機的特性了其第四層為有心理活動的動物前之生物包括一切動植物此則唯指有生命有心理現象的東西其第五層是理性為在一切動物中特具理智性能的人是動物中最靈明優秀的人了人是有最高希望慾的不以人為滿足故有進一層的超人的神的境界以神為最高的一層也是最狹小的一層他的最底的那一層的時間和空間是空洞的不是實事的其物質的和生命的均不在其內我的初層則將宇宙萬有生滅變化的一切法都包括淨盡了而且他的最高層的超人是很狹的只說到天界遠不及我的第五層系中的向上勝進中的超人包括三界及三乘聖者廣大這是我與他的不同點他雖然是在西洋算進步的哲學但比之人生佛教則瞠乎其後還差得很遠呢若能將這人生佛教的道理宣揚於西洋以至全世界則可綜合又超越一切科學哲學而駸駸乎為世界文化世界宗教的歸墟矣世光記見海刊二十六第二期附註人生佛教之層系後轉載於軍事與政治八卷九期改題今名
