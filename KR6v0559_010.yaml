body:
  text: 佛學之人生道德二十四年十二月在廣州復旦中學講一以佛法為非倫理非人生的錯誤二衆生升沈以人為樞紐三人於一切衆生中最富創造力四佛法中五乘共法最重人生道德五善生經之六方與儒家五倫六人生道德之十善與五常七以自他二方現未二世均益為善八自他俱利之精義九以不害他及能利他為道德佛學的人生道德即是從佛教的立場和觀點出發略説人生道德之大概一以佛法為非倫理非人生的錯誤在中國向來有許多學者及一般的人因為沒有了解佛法就對佛法作種種誤會的批評以為佛法是非倫理的非人生的尤其是近年來講中國哲學和人生哲學的誤解得更加利害實則佛陀之説法其動機雖是很廣大的普為一切衆生而説法的中心對象則仍在人類衆生故佛法實是人類衆生的佛法佛所説的一切學理和道德都是不離開人間的所以説佛法非倫理非人生祇要是稍稍研究過佛法的人一聞即知其誤二衆生升沈以人為樞紐依佛典説一切衆生都是佛陀説法教化的對象一切衆生是包括了一切的動物動物中有人類及更上等的和其他低等的動物故佛所教化的對象是很復雜的有知識程度比人類下幾等的亦有知識程度超越人類以上的雖然如此但以人類為一切衆生上下升沈的總樞紐因為在人類中不努力行善而墮落了就成為很愚蠢的知識程度不及人類的低等動物若在人類中更求精進修養的向上則就成為思想和智慧等都超越人類的動物了可知上升下沈的樞紐完全操諸人類那末我們應怎樣注意人類才好呢三人於一切衆生中最富創造力所以要特重於人類就如俗語所謂人為萬物之靈因人類在一切衆生的萬物中意識上多自由活動的力量富於創造性多聞博學知識深刻對於古人遺流下來的一切文化道德等等不但能完全接受過來同時還能於中有思考力起一種是否確實的揀擇真理的作用故人類雖為許多衆生中之一類而高過其他的衆生能以知識研究一切事物並能以多人的知識來作種種交換互助在交換互助中完成創造的進步佛就是觀察到人類衆生有如此特殊的力量所以在人類中現身説法度人了四佛法中五乘共法最重人生道德佛説的一切教法可總括為三類一大乘教法二三乘教法三五乘共法這五乘共法的教義是説明由人乘進到天乘和聲聞乘緣覺乘菩薩佛乘的進化論而以人生為進化的基礎這五乘教法最注重於人生道德為五乘人所共同修學所以叫做五乘共法普通人批評佛法為非人生非倫理是因為他們對于佛法只知出世的三乘教法而沒有了解到普遍的大乘教法和五乘共法的意義其實佛法的根本在於五乘教法就是重在説明人生的道德教人應該養成怎樣善的思想和善的行為方算是人生社會合于理性的道德那末批評佛法為非倫理非人生的謬見也可以不攻自破五善生經之六方與儒家五倫在許多佛經中有一部叫做善生經善生是佛世一個長者的名字因佛為此人講説此經故就以人名為經名善的意義即是道德是明人類由善業為因得生為人類是由于過去善行之因所以得到現在善行之果人類的生命便在這善因善果中保存著維持著但要把這善因善果的生命繼續維持到將來使之不失則依然需要善行的道德因這完全是善的道德的結果若沒有善的道德便要墮落而失卻人的生命了善生經還説明禮拜六方的意義因印度當時有禮拜六方的風俗佛因隨機説明禮拜東南西北上下六方各有意義禮東方時如禮父母應生孝敬之心禮南方時如禮師長應起敬重之心禮西方時如禮夫婦夫婦之間應當和睦與愛敬禮北方時如禮君臣應明君臣相資相助相濟相成之理禮下方時如禮主僕須明主慈僕從之義禮上方時如禮神聖對於一切宗教所崇奉的佛和聖賢等要具有正當的崇仰和敬禮這樣東方如父子南方如師弟西方如夫婦北方如君臣下方如主僕上方如宗教人生在六方中便時時刻刻可以産生出敬愛之心這敬愛心的維持和不失人生就時時刻刻在道德中過生活了儒家所説君臣父子兄弟夫婦朋友的五倫即是從人與人之間的關係上産生出這五種最適宜最合理的行誼故謂之倫理他與善生經六方的意義頗為相類如君臣父子夫婦都是相同師長主僕等的禮義即可攝入朋友兄弟之中了所以善生經的六方和儒家的五倫對于人生倫理道德的發明實有過之而無不及的那麼儒家的五倫既是人生倫理道德佛的六方又何嘗非人生倫理道德呢六人生道德之十善與五常佛教的人生道德的標準便是十善十善從消極的方面説一不殘酷殺害生命二不偷盜他人的財物三不邪淫別人的妻女這是從身體行為動作上説的還有在口頭言語上的則有四種一不説謊話二不綺語三不兩邊搬嘴播弄是非四不惡口罵人在意識上則有三種一不起非分的貪求要達到一種目的必須擇正當的手段與方法二對一切人和一切事不起瞋恨心其反面即是慈悲和平三對於一切學問須以廣大的智慧求充分的了解不局於一隅自作愚癡這是從消極邊説若從積極邊説則此十善即是仁義禮信智的五常不殘殺即仁愛不偷盜即義利不邪淫即是禮不妄言不綺語不兩舌不惡口的四種即是信意識上的不貪不瞋不癡的三種就是智可知佛教的十善道德就是儒家的五倫道德而且是更加周密詳盡的七以自他二方現未二世均益為善上面曾説善生十善此善字便是佛教以之發揮人生道德的根據但佛教所説的善究竟到如何程度才算是善呢善的定義如何簡單點説我們平常在行坐語默出入往還之間凡是起一念行一事於自於他有利而無害有益而無損不但現在如此即未來也是如此在現未二個時代上都合於自他兩利的原則這便是對於善字所下的定義也是佛教説一切道德的基礎八自他俱利之精義佛經中常説凡做一切事業都要自利利他這自利利他表現於行事上就是道德的行為若説明之是有很精微的意義和前説的六方十善五倫五常的人生道德比較起來要更來得普遍與適宜因為自他的範疇應用非常廣大如以一人單位為自則其他的人都是他不但其他人類是他即所有一切衆生都屬於他此義非常廣泛與普遍無處不適用不但他義是如此即自之一義亦非常普遍如以一人單位為自則餘人為他若以一校單位為自則此校以外為他乃至以中華民族單位為自則國際的其餘各民族為他再擴之以全人類單位為自則其餘衆生為他是知自他是從相對上顯明並無固定的範圍雖無固定的範圍而其中自自他他在相對時各有其分齊毫不紊亂如人和人間之自他國和國間之自他本此自他凡有所作所為皆以自他兩利為前提知道自他普遍的原則就可以做到自利利他了九以不害他及能利他為道德從自他兩利的道德的標準上依於佛典説明道德的行為則凡一切行為是害他的即是兩害一切行為是利他的即是兩利故佛教的道德行為以不害他為消極的道德以能利他為積極的道德這就是佛教人生道德的結論竹摩記見海刊十七卷三期
