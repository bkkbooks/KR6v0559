body:
  text: 真佛教徒即俗即真的大乘行者十三年七月在鎮江佛學研究會講談佛法諸山長老參學在先太虛何須立説即諸大居士皆研究有素亦不待太虛啓言況佛法甚深非言語所能及諸法實相唯佛與佛乃能知之以實證説亦唯佛與佛乃能了之且諸法實相豎説橫説重在親證有所説者皆為方便引導假立法門如法華三車之喻不過欲令衆生自證實相之境以斯方便達彼究竟而已又何能説可説之有哉惟不能已於言者蓋佛法難得真諦毫釐有差千里有別故不免落於謬解而於法門自身亦徒然增多障礙茲提撮一二尚希諸君展轉化導勉歸正路積古相傳大都言佛法係清淨無為之學因而自恨為家務國事社會等等事務之牽擾以至不能屏息身心進而學佛故此輩人心雖向佛以諸事障礙故反謝不敏推此類人之心理大概取於所謂五蘊皆空四大非有之二語執此二語以觀佛教於是辦叢林興善舉及種種利濟衆生之事業皆不屑為更以為學佛者所不當為復有在家居士受三皈五戒世人即目之為佛教徒彼等所謂佛教徒者蓋即清淨無為之代名詞也於是見學佛居士有依然為商為軍為政治為教育等事業者遂群起而譏之意若既學佛即不應作諸事業實不知佛法與事業有不即不離之關係所謂佛法世法非一非異但唯學佛者行之方能促歸於善耳中國素研經世濟國之道教化人民幾已為儒教之專職而在儒者亦自以為舍我其誰職是之故以佛法為世外高尚之法學佛者為高尚貞操之士山林隱逸之流間有功成告退隱棲泉石以佛法為消遣或有學理深造研究內典以為清談之資如此之流皆為少數研究佛法者世人亦唯目此為真正之佛教徒自此之外兼有以因果禍福淺近之理曉導愚民者良以因果一道範圍最廣故祈福避禍去苦求樂亦足以挽回風化於是以因果報應吉凶禍福之説深印於中下人民之心然於佛法真義不啻雲泥之判焉例如中國寺院林立老幼男女燒香拜佛者甚夥考其真能了解佛法意義正信不謬者則如鳳毛麟角其視廟中所有神像均與菩薩平等而存一膜拜之觀念逢廟燒香見佛便拜而已如是界限不明之盲從者又烏得謂之為佛教徒乎其所謂真正佛教徒者亦唯推之高隱山林之僧伽與夫居家不仕靜修之清流而已以如是之見解深印於一般人民之識田故凡見謀濟世之僧侶與各界宏化之居士皆誹之為不正以其兼世務而不依清淨無為之旨故也佛教有五乘之法天乘人乘是世間之佛法聲聞緣覺菩薩三乘乃出世間之佛法此五乘佛法各具教理行果修證等事如釋迦應化之印度其人民於衣食住資生之具皆極豐富故於世間生活之經營異常淡泊具有高尚思想輕物質而重精神居則山峰水涯阿練若處觀人間非圓滿究竟有生老病死等境界之逼迫感肉體之痛苦不得自在遂欲超出污穢之濁世而求清淨安樂之世界以從其精神之爽欲釋迦未出世之先多如是之流傳播此等理論影嚮人民之思想頗深釋迦牟尼初成道時轉根本法輪圓頓直顯開示衆生直入佛之知見其能了悟直入者唯少數夙具利根者至於固執邪見迷信之流依然等於盲聾不了故次於鹿苑轉依本起末法輪法華云昔於波羅奈轉四諦法輪即指此也因此等凡夫觀人間苦求生天樂奉大梵等天而修禪定蓋欲超人世間而生色無色界等天也如數論外道説人世界有三苦一肉體制壓苦二天時寒暑逼迫苦三社會環境交惡苦能脫此三苦者即得精神上之妙樂舉其程度最高者曰無色界天彼等以此即為無上涅槃以為可以永脫諸苦矣故此類衆生雖欲離苦得樂實則自我未除苦還仍在樂從何生以此福盡仍墮依然受苦蓋外著色無色等天之樂內隨貪欲之自我所轉故也佛因對封執成迷消極自利者故方便説小乘法其教義不過就外道之法升進一籌耳又因外道雖生天界依然輪回未出猶居三界諸有之中故佛喻以報盡還苦樂非究竟之説又以因苦求樂執有我故則有我所因有我外之非我非我者即障於我而我終不得其解脫是以我佛大聲極呼三界無非一大苦聚我為苦本以有我故起貪瞋癡造福業非福業不動業等而受苦報樂報非苦樂報等輪回流轉無有盡時欲求解脫須先背塵合覺而證無我不唯肉體非我即精神亦非我於是得通達衆生根本之智慧而貪瞋癡三毒之業得消殞三界輪回之諸苦得滅亡是為聲聞緣覺之法如是方能真正了脫分段生死之苦以其除貪瞋癡之根本苦故以上所言並非釋迦出世之本懷方便隨緣之説法然則本懷何在耶法華云今佛轉最妙無上大法輪方暢佛之本懷使一切衆生各各授記作佛於因地中各發菩提心修菩薩行方是佛之出世唯一大因緣也雖然佛何以不憚煩不享清淨無為之樂而欲度衆生成佛此旨又安在耶蓋以如來佛眼見一切衆生本來是佛故佛成道時曰奇哉奇哉大地衆生原具如來德相但以妄想執著不能證得是以發大悲心建大慈願欲皆令如佛得大神通得大安樂良以一切衆生各具如來德性但因迷謬顛倒如窮子然不識衣內有無價寶珠妄自向外馳求致為無明障蔽永不得解脫佛乃苦口婆心諄諄曉諭使各各復其初心而得寂靜之樂是故一切衆生苟根本無諸邪見慧業深固一聞即了便可立證此心本來是佛豈非快事然則衆生云何棄此平坦大乘之道而投羊腸小乘之途哉噫亦可悲矣中國雖代有高僧名士相繼輩出説法玄妙理論深幽然考其平昔修行不外觀輪回苦求脫生死而求自利無非乘羊鹿等車而出火宅若真正發菩薩心乘大白牛車入生死海而度衆生者即求之古德亦猶希焉類皆口説大乘圓頓之教身行小乘偏權之行嗚呼印度佛教大乘不揚小乘熾盛流傳中國雖漸有闡大乘教理者而實行大乘之行者一若晨光熹微之星斗了了可指也餘皆以小乘自利為天下範以是沿習成風一見學佛而兼行利濟衆生之事業者便譏笑其為非真正之佛教徒殊不知此正是大乘即俗即真之妙行也西洋中古時代崇奉天神教基督盛行一時自科學發明幾難存在其所謂科學者不注意道德精神而唯發揮其個人之欲望以科學利器為爪牙此種形而下學術不僅影響於西洋一隅即中國受其熏染亦頗大溯自科學昌明世界之局面為之一變舉凡古代道德文化掃地淨盡著相尚識縱我制物只知肉體上受目前之愈快而不顧精神上受將來之痛苦置事物自然之道德於不講反制服之或摧殘之於是戰爭發生殺機遍地置大陸於擾攘之中拋人民於水火之內歐洲一戰已足證之矣然欲挽回此等苦痛之浩劫捨佛法則無以歸惟希今之學佛者勿復如昔之少數小乘人專於清淨無為消極自利必須人人發其大心誓行大乘勇往直前入火宅而度衆生百折不回庶可發揚大乘之精神暢如來之本懷惟其初步尚須闡揚人乘挽救人道蓋近時社會墮落道德淪亡四境戰爭弱肉強食人格破産野心如焚較之禽獸差別幾希故必就人乘以正人道建大乘佛教之基礎蓋其他宗教雖亦以人倫道德行化但非由大悲心菩提願之所流出故欲造究竟者舍佛法大乘外而欲求其他則猶求龜毛兔角也然欲行斯大乘佛法亦唯立志堅固依佛功德而修持之心心念念與十方三寶感應道交以十方諸佛之所護念故不退不失得大智慧離諸恐怖庶幾無上菩提根本堅固由此發無上悲願苟能如是則其所行無非波羅密行而成金剛堅固深心並信善惡業緣果報奉行五戒十善人倫道德庶幾成就古德曰人倫之至是名聖人其所謂聖人者殆佛之初基歟故其保全人倫道德出於誠意者又孰非學佛之正行耶若再與計有計空之外道小乘及向人間乞憐不知懷內有寶珠之窮子相較得毋高出恆河沙數不可説之倍乎雖然諸天耽樂修羅方瞋餓鬼沈幽於惡趣畜生終埋於昏迷六道之中惟人道易修而謀世界幸福其責亦唯人類所負苟能展轉勸化令各各崇敬三寶奉持五戒十善檢自身心則刀兵匪禍從何而起水災旱災更不致生以因地中正果不紆曲故也夫然後進而十信十住而證等覺層層而上以至於佛豈難事乎是故出家者應以三學持身宏法濟衆自化化他不起滅定而起諸威儀不動本際而作度生事業在家者亦各就所宜以佛法省策身心三業清淨貪瞋不起癡怨不生以是既無聲色貨利可貪亦無五欲塵勞可戀其欺騙恐詐之行損他利己之舉更無由生夫然後佛法之功德普及於大千六道四生無不受其惠矣雖然吾為此言宿習大乘者將歡喜讚嘆其耽於清淨無為小乘外道之流或以豫言為忤也惟希諸君展轉流傳令封執成迷者盡皆悔悟庶足為謀世界幸福者之一助太虛尤所望焉芝峰佛影合記見海刊五卷九期
