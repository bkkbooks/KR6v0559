body:
  text: 構成佛教之要素二十五年一月在澄海佛教會講佛教的要素是什麼第一就是佛講佛教便要首先認識如何是佛佛為梵音具云佛陀或佛陀耶亦作浮屠其義譯即為覺者就是對於宇宙人生有徹底覺悟的人佛為覺者之覺非通常浮泛的覺因這些覺自以為覺其實都是極膚淺的覺甚至或是錯覺唯有佛的覺乃是徹底的覺較之中國聖人所稱之聖的意義更加慎重與深遠是無上正等正覺之覺覺者與聖人相倣所以中國的聖人亦有稱為先覺者唯聖人終究是世間的聖人世間的覺者不能和超世的聖中聖的覺者佛相比擬然此覺者在佛教中亦通於阿羅漢辟支佛菩薩唯羅漢支佛祗能稱為正覺不能稱為正等正覺因其覺量狹小未能普遍一切故大乘菩薩雖亦稱為正等正覺自利利他普於一切然其有上有容不能稱為無上唯有佛才是無上無容正等正覺的覺者講明佛所以稱為覺者的意義就真正知道第一佛與世間聖人不同佛是出世的大聖第二還須知道佛與所謂神道亦不同神和佛在一般中國人的觀念中都是混在一起不能辨別清楚而知佛是覺者之後則佛不同於天神地祇的意義也自然會明白知道佛是出世的大聖人大覺者不但天上天下唯佛獨尊而且是十方所有我盡見一切無有如佛者若以世間神聖來比較無異螢火之鬥日月了既知道佛非禍福於人的神鬼進一步還要知道佛亦非萬能創造萬物的主宰神而是一個覺悟真理的人而已我們衆生自無始以來迷昧不覺所以流轉生死若要了脫生死的苦痛便非依無上正遍覺的佛的方法來修學不為功如此信佛把信心與佛打成一片便再也不會改途易轍去信仰別的宗教和別的主義了但是這樣信佛有什麼益處呢簡單點説就因我們衆生未能真正覺悟宇宙人生的真理迷而流轉於生死而佛既覺悟真理不流浪於生死痛苦同時又把怎樣覺悟真理了脫生死的方法告訴人我們才得依此方法而解脫這便是信佛的大利益佛不能利人佛所以利人者即在於法離了法便無所謂佛所以構成佛教第二重要素就是法那麼我們既信了佛就要信法但要由信仰而去研究明解和修習才算是真正的信法所謂法就是經律論三藏其內蘊不外境行果其方法不出戒定慧其證悟的結果不外菩提涅槃但是法的境界是很廣的太廣了而法為佛所説佛又太高了我們凡夫衆生要躐等的學習是辦不到的故須皈依已經對佛法有所證悟而歷代傳持佛法的僧於是僧又成了構成佛教的第三重要素僧廣義言之可以分作三類一菩薩僧自等覺以下的地向行住信的菩薩都可名之為僧二聖賢僧如聲聞緣覺等已發心修行證到七賢位之修總相念別相念四加行以至四向四果位都是聖賢僧三比丘僧即是秉戒修持能住持佛教的僧伽佛法雖然高廣但由這三種真實的僧伽便可從實踐行事上把佛法引用表現出來使人歌詠讚歎所以佛法如高山峻嶺而比丘僧聖賢僧菩薩僧是一步一步攀上這高山峻嶺的階級那末學佛者要想從凡夫地到佛果地僧就成了必依的規範者整個的佛教就是由這三種要素組合而成所以學佛的人便要在這上面有真正的認識不論在家或出家然後方是真正的佛徒由這真正信佛的份子由少數集合多數的份子就産生出佛教會的團體了所以是真正的佛徒應該從認識三寶起然後由少數的份子集合多數的份子成立堅實的教團宣揚佛教文化竺摩記見海刊十七卷三期
