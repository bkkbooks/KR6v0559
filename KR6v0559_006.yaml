body:
  text: 三世因果十二年正月在宜昌商會講佛出世的因緣是為的甚麼因為佛是覺的人是迷的人既是迷的所以人就要受一切煩惱生死的苦佛本大慈悲心乘大願力降生於中印度為國王太子享受人間尊榮富貴五欲的快樂隨即拋棄人間富貴尊榮去修行以至於證果成佛佛在當時現身因為要覺悟人的迷所以現身作個模範使人曉得了卻一切煩惱生死的苦既是要覺悟人了卻一切煩惱生死的苦所以隨順人的語言文字依人類種種差別病而説種種方便救人的法這佛説覺悟迷妄的法就名佛法依佛法推究人不能夠了卻一切煩惱生死的苦是由於不明白佛説三世因果的緣故今天略將世人謬解因果的與佛所説的因果兩相比較説明之世人因為是迷的所以對於佛説的因果就茫昧不知或者説沒有因果或者憑著意識的理想去推測謂大地山河是自然變化而有的謂人是由祖傳父父傳子而來的又或謂大地山河及人是有創造者的所以人同萬物都是另有個主宰的由上種種謬解妄見發出種種言論世人被這種種言論所惑就有不信因果的謂人在父母未生以前沒有甚麼至於百年生死以後也沒有甚麼這種斷見一生就要任意妄為不怕因果報應也有迷信神教的謂人作了善神就默佑使得享受愛的果人作了惡神就譴責使得享受非愛的果統觀以上種種説法不是屬於無因果派就是屬於謬解因果派這兩派皆足以使人生一種僥幸心以為作了惡可以幸免的那曉得昧於佛説的因果就要墮落因果報應不能夠免卻生死的苦若明白佛説三世因果的道理曉得人生不是突然而生的死也不是就可以了的因為人身是地水火風四大假和合而成人到死的時候四大假和合身雖死而業識實在沒有死明白這個業識的道理那佛説三世因果的道理也就容易明白了何以故因為人生已前有生不止前一世乃至於無始死後也不是可以了的乃至於盡未來際也沒有止息的時候這無始終無內外的業識就是從無始以來自家所作善惡業力積集而成業識善的業強於惡的業則善業先成熟而感受善果惡業強於善業則惡業先成熟而感受惡果因為有善惡種種大小多少差別所以就感受貧富貴賤賢愚種種的差別所以古德云欲知前世因今生受者是欲知來世果今生作者是平常人迷於佛説的三世因果看見罪大惡極的人偏偏的是富貴雙全兒孫滿堂看見為善不倦的人偏偏的是無兒無女受那貧賤的苦報應相左遂謂沒有因果這是由於不明白業識受生的緣故這業識受生有因緣業識為因父母為緣合緣與因而成人身今假定有人作種種善業這業因屬於善當然要結善果然必要假父母兩業緣又須此父母有應得這個造善因受善果的兒子報應然後才能夠藉此父母兩業緣而受生具這三種業的因緣就謂之同業所感業識猶如穀種父母兩業緣猶如土水日光人工等因緣具足而後可以發芽結穀善惡果報由善惡業因而成猶如種豆得豆種瓜得瓜這種因果是毫釐不爽的世人不明白佛説因果的道理猶如不明白長江源流的人今假定長江向東而流中間被山所阻折而由北向南南岸是平原平原上的人就説長江源頭從山而起至平原而止像這種斷見人是知道錯的而不明白業識相續不斷與業識受生的理那因果的理就不能夠明白也與平原之人觀察長江的錯謬一樣我們若能夠真實明白三世因果試問有人欲受惡果報應否所以種善因得善果種淨因得淨果乃至成佛都是由於自己一念依佛所説而行世間惡人尚敢為惡否故佛教昌行的時候人人都是明白三世因果的道理人人都是向善而行小之可以成為自修之正人君子大之自覺覺他化社會為良善化世界為太平轉五濁而為七寶皆由於此古德云諸惡莫作衆善奉行自淨其意是諸佛教能夠止息諸惡奉行衆善就能夠自淨其意這就是諸佛所説的教法以上不過將世人與佛説因果略為比較而已陳妄清記見海刊四卷三期附注原題太虛法師在宜昌商會之演講今改題
