body:
  text: 學佛先從做人起二十二年二月在思明縣佛教會講在佛典裏有這樣的兩句話人身難得佛法難聞今天在座的諸君已是一個人世間的人又能來到這兒聽講佛法因此我今天特提出此學佛先從做人起來講我們還保存著這人的身體但在世間的難療的生死中我們説不定會墮諸惡道到那時有誰來聽你的一腔哀聲所以做了人倘若不學佛法豈不是在人生道上空跑一趟嗎因此不由的想到人身難得佛法難聞的意義引起我講此題的動機先從做人講起如我們現在所得的人身有什麼善因有什麼勝緣而得來的呢既得了人身生活在這無邊的人海裏要怎樣的資養牠維持牠才能夠很安善的過這一生呢更進一步講要怎樣使其了知人生的真意義而且得到人生最高的真價值才不辜負這人身呢這問題一到深處便必須學佛才有解決的希望否則生死難關衝不破弄到船沉人盡沉到生死海裏畢竟失了人身難得的真意義和價值了我們畢竟是人世間的人我們不是披毛戴角的動物因為我們有人的身體然而我們的人身究竟從何而來呢我們的回答是從自身過去世造作了能得人身果報的福業因再憑藉了現在世父母的遺體緣由此可知道我們此身的來之不易倘若沒有過去世福業的因和現在世父母的緣我們做人基礎的身體即無由成立了知構成此身體的因和緣所以我們要繼續培修福業而同時對於父母要孝順恭敬奉養這是人生應作的第一要事培本報恩也即是開闢未來世的升進之路我們從生身起以至老死每天所需要的衣食住行之具從何而來你如果肚皮餓了有食物來充飢冷了有衣服來遮體風雨襲來有房屋給你住你如果往何處去有道路給你走這些資生的贈與都是仗人類互助的能力大衆的力量而得到的人世間林農工商的共同的能力維持了你的生命資養了你的生命換句話説你的生命完全倚靠社會大衆的能力來維持資養所以你要去服務社會替社會謀利益凡是社會各種辛苦事業你要耐勞的去做這是第二報酬於社會的人生在世要怎樣才能安居樂業固然我們的生命由社會群衆的力量來資養但社會如何能使牠安寧我們常能得到豐樂的生活呢這即是要有國家有國家則有政治法律對外有保護疆土之責的軍隊使強暴之外患不能侵入姦逆之內亂可以弭除即天災疫難亦可設法防止若無國家不但外患無法抵禦國內人民的生命也沒有保障生活也沒有安寧要報父母社會恩亦無從報起所以我們更要報答國家恩大家要以愛國心為前提在今日衆敵圍攻的中國我們中國的國民英勇的將士慷慨的豪傑應在衆敵環攻之時一致奮起建設光榮的國家吧不瞞你們説如果前三種能夠實踐躬行的做得到也只是一個平庸的人還沒有了解人之所以為人的真意義也沒有得到不虛生而為人的最高價值所以這里要説明進德修道的第四點德者德行也即以做人而言因為過去世造作了德行的福業才有現在世的人身所以我們在享受人世間福樂的時候我們要能在人生道上更進一步好像每次出門做生意必須多賺得幾分利息回去決不要虧了本我們做人亦然要一生一生的上升不要糊裏糊塗的醉生夢死要企圖向上進步因為要進德所以我們要修道要依據真正貫通萬事萬法的道理佛法去修習我們才能進德倘若此生所修的福德比較前世更進了一步也就不枉在人間走一遭談到進德修道則對於現前的師長以及古昔的聖賢都有恭敬親近的需要由是而觀察到聖中之聖的佛覺得唯有他能以究竟圓滿的教法教授我們我們不但要去禮拜同時要依佛的教法去信解行證不然難於超越生死苦海的厄難人面獸心的樣子也不易變化了所以要進德修道便須依佛而學走上學佛的道路因為佛是聖中之聖阿怎麼知道佛是聖中之聖呢我們要知道佛原是人類中的一人不是另外的什麼怪異不過是我們最完全的模範人天師而已佛是梵語此云覺者為什麼稱他為覺者難道我們沒有覺嗎不錯我們也有覺但不是常覺不是普遍覺例如我們生死在人間生不知從何而來死不知向何處去對於世事也許只知其一不知其二所以有許多錯誤顛倒邪見叢生佛呢他是自覺覺他覺行圓滿的究竟覺悟的大覺者假若你要了解人生真義免除人生道上的危險應找這條道兒走這就是要依佛的教法請明師指教去修行歸依三寶依佛的法而行住坐臥不離才有出離生死苦海之一日人生究竟是捉不住的隨著一疊疊的波浪而來去不能自主猶如航海無一時不是過著波浪漂泊的生涯在渺茫的生命道上除非依佛的道理經典去研究進而實行將自己的身心以佛理來範圍牠才能穩登彼岸要使我們的思想與佛的思想合一要以五戒十善為根本五戒是戒殺盜淫妄酒十善是不殺不盜不淫這是身三種不兩舌不惡口不妄語不綺語這是口四種不貪不瞋不癡這是意三種若能如此再進而修習禪定自然能對諸經典不要他人講解而能自己發明而有真的智慧生起漸漸證入佛的真理的境界以上關於學佛的大意已講完了你要是能行前三種只能説勉強算個人不過空空泛泛地做人沒有了知人生真意義沒有得到人生真價值若要了知人生真意義和得到人生真價值要看你能行第四種到如何程度為標準若能行此第四種則人生永遠是上進的此第四種是修學戒定慧的途徑是佛法的精髓如今再回到人身難得佛法難聞的意義在佛法上這是啓示人生的理智的方法就是説人為萬物之靈佛法唯人類才可以修學由此可以見到人生真價值之所在如今我們是人身難得今已得佛法難聞今已聞這種機緣頗不易得既來到這人世間既入寶山切莫空手而歸我們要誓願成佛才能獲得做人的真價值燈霞記見海刊十四卷四期
