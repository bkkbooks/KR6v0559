body:
  text: 生命之起源三十二年秋在世苑漢藏教理院講一生命是什麼二科學說生命起源三哲學說生命起源四宗教說生命起源五佛法對於生命之說明甲法界衆生無始終乙世界衆生可說起源丙有情一期業報可說起源一生命是什麼生普通說的生存對滅亡而言生是生起本來沒有而現在新生叫做生生起了繼續存在名為存滅是毀滅毀滅到最後的空無名亡但生命之生非生存滅亡之生而是平常所說生活的生生活與死相對也就是平常所說的生死的生生與死對活的名生所謂生命就是活的生普通叫生活所需要的一切名生活比如衣食住等衣食等資養人的生活所以叫做生活是後來附加上去的而真正的生活是對死而言的這才是此處所講的生命平常有命令命運等的意義此中所講的命是佛典上所說的命根壽命普通所講的生命不限動物亦可通於一切植物佛學上講的命根壽命則單屬於動物的有情有情雖不限於我們所能見到的動物以種類而言實是動物的一類普通所講的生命連植物也包括在內一草一木都有死活當其生活時都有繼續不斷的生命命可以說是一條一條的如打死一牛或一馬就說害了一條生命而此一條命也正指一個生活的繼續而言在這一草一木也都有生活的繼續所以也各有生命且是個別一條一條的此一枝草的命非彼一枝草的命牛馬草木等這樣一條一條的生命就是通常生命的意義有生命的東西要是給它斷掉了就是死的如一支枯草一具死尸一粒壞穀都是沒有生命的枯草雖是死的但枯乾的形體尚同土塊一樣存在因此科學中說各種存在的東西還沒有滅亡到空無時都是有的死的無生命的和有生活相續的這就是死活相對死的無生命活的有生命亦即所謂生物與非生物有生活繼續的名生物無生活繼續的名非生物土石磚瓦名非生物草木禽獸名為生物這都是從有生命和無生命上分別的但佛學上不作如此分類只作有情與無情的劃分要是有情才有生命所以從生命的狹義上講有情衆生一切動物才有生命有覺知情識才是充足的生命花草樹木不能算是充足的生命現在從一般人所講的生命說包括一切動植物凡有一條生命的東西便是生物而生物都有生命的現象如初有名生長成名長由衰而老由老而死生長老死為生物必經的過程在此過程上生命各成其種類各能傳種續後草木都有此種現象故生物與非生物大有區別因為生物都要生長要維持生命所以要常吸收養料以免很快的老死但生命的個體到相當期間一定不免老死所以在生長力充足時又從個體的生命傳同類的生命像這種生物性可以叫它做生命這生命的現象生命的性能它是怎樣起源的現在就要研究到了二科學說生命起源科學對於宇宙間的一切事物考究它的根本是什麼用的是化學分化因此大概認生物是其餘非生物組合起來的經過化學分化之後所存下的原質已經是非生物的東西了比如我們講人也可用化學分化分化的結果說它是十四種或十五種原質化合成的這種說法恍如佛法講的地水火風四大和合成的一樣但分化之後的原質已經不是生物了科學家為要窮究原質的本來是什麼進而分化成為分子由分子分為原子原子分為電子電子算是最基本的了也有再研究把它分為能子但還未獲得普遍的公認暫且承認電子能夠成為非生物和動植物的基本原素然科學要找出生命的起源也就有了種種的困難因為生物固然可以分化但用化分了的原質再化合有生命的生物則不可能由此說來生命不可用非生命的物質化成非生物的原質不能與生物之生命作起源因此科學對於生命的起源就成了問題有研究生物學的人根據生物來講謂原質根本的電子裏面有陰陽吸收力抵抗力等在發生的作用上只成功了太陽行星等不能生起生命所以這地球上的生物種子也許是由別個世界崩毀時風吹來的我們這個地球上有此種子由少而多就漸漸地生長發達成衆多生物這種起源說等於沒有說再追問一句別個世界的生物種子又是從何而來因此生命起源的問題還是不能解決科學家解說生物是各種物質化合成的就想以這些東西化合成為有生命的生物因而有很多人煞費苦心的去努力研究但結果化合出來的東西如蛋和香蕉雖與真的蛋真的香蕉差不多但也只能看看或吃吃要它化合出來的蛋生小雞香蕉生芽則不可能仍只是死蛋死香蕉所以科學家對於生命起源的問題還是不能解決三哲學說生命起源自然哲學說生物與非生物的分界不過是就自然現象上的分類但研求萬物原來的本質就是用化學分化到原子電子等往下再分結果也還同普通生物學上所謂的細胞有人叫它做生元這自然哲學根據科學研究的結果把生物上最簡單的東西細胞擴充起來以為化學分化出來的電子還可說它有生命因為電子有陰陽性有生滅故電子有生命能子也可以說它有生命不過很隱微平常認為分成種種原質的時候已是非生命的東西其實都還有隱微的生命不過等級不同罷了如達到適當巧妙的化合有生命的生物便構成出來物質是永遠存在的生命也是永遠存在的這是根據科學上的自然哲學對於生命起源的說明近人講的唯生論即是出發於此因為一切皆有生故是唯生的而各種的生命都可同物質是無窮盡的到某種情形便發生某種的生命即或關係條件不足隱微的生命還是存在的還有根據生物學來講的如德國的杜里舒他曾經來過中國他認為一般生物的現象非用化學的物質所能徹底說明他主張生物都有生機隱德來希這生機是非物質的有了此種生機便成為一種生物要是沒有生機則不能成為生物所以單據化學的解說是不充足的生機不是物質而是精神的但也不能與物質完全分開恍如中國講的生氣有生氣便有生命現象無生氣便沒有生命現象但生機究竟是什麼還是難以解說杜里舒我從前在德國會過并且和他討論他以為要有生機這樣東西乃有生物但這生機是原來就有許多的還是原來是一而後來才變成許多的也不能決定的說明大抵物質分化之後變成一個個的有生命的現象進而有感覺知識思想這只是一種假想的推論由此來說以生機化合物質便成為生命的起源還有唯心論的哲學認為宇宙的本原是精神的心靈的這種主張的派別很多依法國柏格森的解說宇宙就是生命之流這是活動的永遠繼續不斷而極其緊張的生命之流純是精神的根本沒有物質在鬆懈停頓的地方才産生物質現象但還離不開生命精神的到了人類正是生命精神的表現非生物不過是生命遺傳下來的散渣無始無終永遠緊張的是生命鬆懈散弛了便成為非生物也可以說在緊張不同上有生物的來源從宇宙偉大的精神生命上分化出來中國古來的學術如易經講到生生之謂易生生不息就是宇宙的本體從這點說似乎也近於生機或生命流的說法四宗教說生命起源有許多宗教不能說出生命的起源尤其是多神教能夠講出幾分道理的只有一神教印度梵天教和基督教等他們認為宇宙萬物的根本都是起源於神一切的起源完全以神為根本總之宇宙間只有一個無始無終大無不包的神能夠創造一切生命說得比較明顯的要算基督教的舊約說神造世界萬物第一天造日月星辰至第六天最後造成人第七天他便休息了如此生物之有生命乃起源於神尤其是人類他們說生物唯有生沒有靈人之有靈更是起源於神這種說法若反問一句宇宙一切都起源於神神的本身又起源於誰還是不能解答這樣看來生命的起源科學的說明既多困難哲學所說若是根據科學科學的問題未得解決哲學也是不能解決宇宙生命流隱德來希其本身也還與神一樣不能給豫徹底的說明五佛法對於生命之說明甲法界衆生無始終要是從法界的衆生來講推求它本來的究竟性一切事事物物乃至人生的體性沒有個別的自性可得因此說它有始有終有一有多都不可說并不是有這樣的問題而故意的避開不論它本來就沒有這樣的問題所以也就根本沒有可說要是從因緣生滅上講法界衆生都是無始無終一切無情的事物和一切有情的生命在因緣離合的變化上流轉無始無終一切有情的生命變來變去總是永遠的相續不斷因此一切法界諸法因緣生滅無始無終一切有情生命業果相續無始無終一切既是無始無終也就無所謂起源佛在仁王護國般若經上說若有說言三界外別有衆生新起者即是外道大有經說這很可為這種意思的說明乙世界衆生可說起源就一個世界上的衆生講可以說有起源世界又分大千世界和小千世界如大千世界壞了經過壞空到了成劫在世界起源的次第上天是最初而有可以說是生命的起源頂明顯的就是小千世界中的一個小世界即大梵天所範圍的世界這世界經過火災的燒壞到了成劫最先生成的就是大梵天的器界和大梵天身大梵天的生命可以說是這個世界生命的起源因為這個小世界最初是大梵天先産生復由世界共業與各別業力的繼續生起漸漸就有梵輔天梵衆天乃至人間而大梵天見了在它以後生起的一切便說是它所生後來一切也因見它生得早些也都認為是它所生大梵是父餘皆是子由此就發生了父子的關係這樣看來以神為生命的起源可以說是從大梵天的觀念産生從佛法來說這種觀念根本就是錯誤因為世界一切的生起一是共同的業報一是各別的業報由這兩種業力總於一處就生起了世界的一切不過先後次第的不同并不是從大梵天所生連大梵天本身也都是業報所生但在業報的事實上確有大梵天是最初先生有了這樣的事實就使一般宗教生起錯誤的觀念以為一切都是從大梵天所生其實有情各隨業報而生就是一切事物的生起也都是有情共業的依報并不是大梵天所生的然若就一個世界來說可以說大梵天是生命的起源丙有情一期業報可說起源就一個有情的一期業報可說生命的起源佛法說有四有即本有死有中有生有由中有入胎得到生有構成一期業報的開始有的經說最初入胎的心識成為有生的生命起源也是就一期業報上講這最初受生的心識就是業識這業識以唯識學來講就是阿賴耶識這就是一期生命的起源例如十二緣起中無明行識的識就是一期生命的起源唯識學就是專指阿賴耶識中的種子也即最初去受胎的識有情受一期業報得一條生命生命的起源可以說就是業識附帶還有個問題就是前面提到的四有當生有的開始後來名本有生命斷了名死有都在一條生命上其死與生的中間所夾的中有還是另一條生命呢還是附屬於前後生命這裏很有問題有的說中有是屬於後有的若是屬於後一期業報與前所說一期業報的開始是業識不合假使中有屬於後有受生業識之前豈不是沒有中有那末後一期的生命應開始於死了以後的中有但常途說十二緣起都說無明與行是屬過去識是現生投胎的最初一期生命的開始若是中有則與此不相合而且也不是整個的中有入胎要說中有完全附屬於後一條生命很講不通若把它附屬於前一條生命則前一條生命既死便已斷了猶帶有中有這個尾巴也講不通這樣看來中有只可以說它是兩個業報過渡期間的另一期的生命這樣來確定的講一期生命起源於最初投胎的識於事於教都很相合中有只可說它是另外一個生命是為後一期生命作預備的另一期生命心月記見海刊二十四卷十一期
