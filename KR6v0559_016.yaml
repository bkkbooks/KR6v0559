body:
  text: 人生十四年七月在廬山講今天且提出人生兩個字的名義來談談人是什麼怎樣叫生這是兩個問題世俗對於人生的解説往往以為人生幾十年光陰就是人生的安立把人生概指為人之一生人的生命或人的生活而已今謂人生應該要分析來講第一人是什麼即是人的一名所名的那個人究竟是怎樣依照中國的人字是象形的所以首先可云人是個有形體的但有形體僅足區別無形體的虛空而已其餘如動植礦物等都是有形體的又如何從有形體的物中顯出這所名的人呢於是從形體上顯然不同的一點則可曰人是自然主義的宇宙下那個渺小的兩手動物胡適之語然此不過在動物中加有兩手的符號罷了其餘就作用而言亦可曰人是能用火或用鐵器的動物或曰人是能有言語文字的動物此亦皆就其一種作用為符號便於指別曰人而已其實有此諸作用未必為人若鳥亦能言語等離此等作用亦未嘗不為人也然大致先認人為動物的一類以為人類所表顯出來的常性就在作用活動那末諸動物若象馬等皆有活動作用難道象馬等也可以叫他做人麼想大家要齊聲説是不對罷於是有謂人是有形物故非虛空人又是有形體有生機物故非土石人又是有形體有生機有活動作用的動物故非草木人又是有能群的政治及理性的道德者故非禽獸講到能群的政治與理性的道德可謂能在動物中嶄然顯出人的不共性了故曰天地之性人為貴又曰人為萬物靈長古來講做一個人要有理性的道德即現在所講做人要有人格就是從理性中發揮道德以完成人格的人這種人格是尊重的是異於禽獸的此內具的理性道德發現於人倫的群衆即為禮法政治等然後以儒家所説的仁最足表明人之性德故孟子説仁者人也子思説人者仁也孔子也説克己復禮為仁此仁乃指人之性德亦指為君子或成人的意思如孔子説君子而不仁者有矣未有小人而仁者也這樣觀察古來賢哲很注重有性德人格的人所以人是應保持仁之理性道德乃能永久不失去人之所以為人的德性不然不但不能養成為有德性的仁人而人與人就不免發生種種衝突種種殘害不仁的事來放眼一觀現世界人類的悲慘現象即由未有完成人格的仁人沒有成人所以不能盡行人道以上所講雖可略明人名所名的人之大較但佛法中則又言人者忍也言人世上如此的苦乃這些人偏能忍受得住此之忍字有譏其不知厭離苦求出苦的意思這是三乘共教的意思若大乘勝義則亦可云是菩薩難忍能忍難行能行的能基為堅忍精進之德但是佛法對於人的看法人祇是十八界十二處五蘊六大等緣法的和合相若是離去十八界十二處五蘊六大等緣的和合其實無人可得從這種五蘊等和合相而假説為一個人而五蘊等又是剎那生滅的故人又是相續生滅的假相人名所名的人祗是和合及相續的假相故金剛經説無人相是表明人本無實不過為諸法和合及相續的假相而已既然為和合及相續的假相則本無固定的實人可知故人假無人第二怎樣叫生生的定義本以對滅滅是滅去生是生起從無而有是謂之生從有至無是謂之滅這一點是通常人所共知的但普通還有一種解説生與死對以死對生分明是一種生活生長的意思生活的生是能相續增長有變化的凡生之後不即死滅有住及異生住異滅謂之四相言生至滅的中間必經過存在的住至少也要經過變化的異而後方滅生死的生合生住異曰生異滅曰死故與生滅的生不同講從無至有的生必有能生所生乃成立生義若無能生即無所謂所生即不能説有從無至有的生但説何為所生者的能生呢若説從自生既未生云何有自若説從他生但此間所説的他須與自相對當未有自的時候云何有他他既不有云何能生若説自他共生但當在未生的時候無自故無他云何有自他共可言共生若説無能生而有生則虛空何不忽然生人自生他生共生無因生皆不得説有生故祗得説緣生從衆緣和合而生然緣生之生本空以實無能生所生之可分劃假説此法為所生而觀此法實唯衆緣假説衆緣為能生而觀衆緣全即此法且衆緣與此法同為衆緣所生法而此法與衆緣亦同為能生的衆緣攝入重重交遍無盡故生空無生照以上看起來人生的意義大概可以明白了略舉於左以當結論一人是什麼是五蘊和合及相續的假相故人假無人二怎樣叫生是衆緣交遍且互融的空性故生空無生三怎樣做人尊重仁及堅忍精進的人格啓發此人人本具的性德做成一個能仁能堅忍精進的仁人四人生為什麼造成人人能仁能堅忍精進的人格去實證人假無人生空無生的人生真相同登正覺大醒記見海刊六卷九期
