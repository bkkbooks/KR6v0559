body:
  text: 佛説十善業道經講要二十一年七月在漢口佛教正信會講懸論一契理與應機甲契理之實義乙應機之對治二經題與譯題甲釋經題乙釋譯題釋經甲一證信甲二正説乙一明世出世業果丙一就因明果丙二即果明因丙三舉因相明丁一觀心無主丁二觀法如幻丁三勸應修善丙四舉果相證丁一以佛果證丁二以菩薩證丁三以天龍證丁四以海衆證丙五結勸修學乙二正明十善業道丙一顯善法用丙二釋善法名丙三出善法相乙三明十善業功德丙一明離殺生功德丙二明離偷盜功德丙三明離邪行功德丙四明離妄語功德丙五明離兩舌功德丙六明離惡口功德丙七明離綺語功德丙八明離貪欲功德丙九明離瞋恚功德丙十明離邪見功德乙四明十善業勝行丙一明六度丁一廣明布施度丁二略明餘五度丙二明衆行丁一四無量心丁二四攝丁三三十七菩提分等丙三結廣乙五明十善業殊勝甲三流通懸論一契理與應機今天開講十善業道經在未講本文以前先講一段經前的懸論一切經皆謂之契經一契理二契機一切佛法皆從此原則而建立一切法的真理所謂諸法真實性相乃佛智慧所親證為開示未證衆生亦令證入是為依契理的原則而説法在契機的方面是依種類根性時節因緣適合一切衆生的機宜各令覺悟而説法具此二義方為契經現在即本此二義而説明此經之大義甲契理之實義契理之實義者謂契合諸法性相的真理之實義此契合真理之實相不以時間而變更不以地域而遷異無論在何時何地何類中都是如此的説明此十善業道經契理之實義今分三段來講十善業為世出世善行之大宗業即行為的意思十善業者謂身業有三即不殺不盜不淫語業有四即不妄語不兩舌不惡口不綺語意業有三即不貪欲不瞋恚不邪見合身語意共成十種反之即是十惡業並不一定不好須視其性而定內心動機是善的而行出來也是利益衆生的即是善業動機是惡的而行出來也是損惱衆生的即是惡業且此身三語四意三的善與不善又須以其未來結果而定又此十善不僅是世間的善行佛經上無不講到所以此十善為一切世出世善行的大總持即大陀羅尼世間由此善行得到人天的好果天即在人以上的世界衆生也是行十善而得成的所以人天的福報都是由十善業所成平常所謂人類的道德行為在佛法即是不殺不盜等五戒但生天則須具足十善的道德行為在欲界天以上更有色無色界天生此天須修四禪八定然亦是意善業上更加深一層禪定功夫而已至於超出三界的出世業則成三乘的聲聞緣覺菩薩菩提果亦無不以此十善業為根本而得成就的所以大乘戒法皆十善行攝由戒生定因定發慧菩薩位中第二離垢地即由十善成業由戒增上成定即深修十善將身語意惡業之極細者亦究竟斷除定心不散亂而得安即成十善行深進一層功夫至於由定成慧則是最後將無明邪見打破無漏智慧發生此即十善業的究竟道所以三乘清淨的出世業果也是包括在十善業內的此為十善業道決定如此的真實理趣之一十善業為造成人間天國之正因到人間樂國最切實的路徑是十善業道若欲達人類安穩快樂之目的即在奉行不殺不盜等十善如能實行此十善業無有不得成就的現在世界相殺相鬥皆因肆行十惡不行十善假使人人皆能行十善立可成為安樂世界所以現今人類的痛苦皆由於不行善業因此由個人而社會而國家而世界成為一個痛苦的苦海但世界上凡有思想的人無論是宗教家或各種學問家都希望搆成相親相善之安樂世界只要能行十善業則古今聖賢理想中的天國若中國所謂的大同之世和西洋人理想的黃金世界皆不難實現只要將十惡業改成十善的行為即可轉五濁惡世成清淨的樂國這實是今日世界人類刻不容緩的要求廬山慧遠大師謂十善業若能從一家一鄉推行到一國立可成為風和俗美刑措政清的清淨國家這是一條定律無論何時若要想成安樂的世界是必須由此坦途而進行的佛説四大洲中的北俱盧洲人自在福樂即是行十善業的結果又説轉輪聖王出世四海清平天下安樂人人皆行十善亦足證此理也十善業為涅槃菩提根本三乘的涅槃菩提二轉依果都是以十善業為根本的以十善業能制止惡的行為將一切不善的對治究竟即解脫一切生死證得大涅槃果此即為十惡業果的斷盡而十善功德發達到圓滿復能將十善普利世間一切衆生即得成大菩提果此亦是一種定律沒有不圓滿十善業而能得三乘果的乙應機之對治佛在當時説法皆因衆生根機適宜而説的現在講十善業道經也是應機對治以期挽救現在世界的衆苦迫惱因為若要將衆苦迫惱轉為安穩快樂非行十善業不可此亦分為三段來講對治鶩外忘己而修已現在世界皆在不景氣中而中國又因天災國難紛至沓來大多數人皆在水深火熱的痛苦中挽救的方法唯在切實的奉行十善業不要怨天尤人也不要向外馳求責任是在自己的不得將責任推之環境或卸於他人或怨社會制度不良或尤物質條件不備不求諸己專望之外假使世界上人人全是這樣世界將沒有一人來負責了設使有人來負責而自己又不願意容受這種病實是無法挽救的還有一種不求之於人於物而求之上帝與鬼神或佛菩薩的不知佛法的真正意義在各人明了法爾因果之理而反求諸己如佛在世時佛之堂弟阿難謂佛將惠我三昧而不修習卒遭摩登伽女之難阿難佛弟子中多聞第一尚且不能依靠佛可知佛法的責任全在自己若放棄了自己而一味求神求物要將此世界社會改造過來這是決不可能的若能先將自心的十惡業改成十善行然後求之於佛方能有效昔孔子有疾子路請禱子曰丘之禱久矣可見向外求物求神是無用的要能修身正己勸人人奉行十善乃能挽回世道人心也對治意誇行劣而重行現在的人意言非常誇大發出的理論句句皆以為超賢越聖從實際考察他的行為不但不能超賢越聖即庸言庸行亦何曾能做到這種誇大狂的病成為現今人類普遍的通行症所以社會再沒有法子弄好這種高調愈唱得高實行上愈加無力危險到萬分孟子論伊尹放太甲之事謂有伊尹之志則可無伊尹之志則篡也但在這裏應加一句有伊尹之能則可無伊尹之能則危矣是故意誇言大而不顧實行以治世則愈治愈亂如頭頂千斤石而戲舞結果鮮有不弄成石破人傷之危險者不但治世如此而學佛亦是如此例如一般狂禪狂密口頭上談的誇大而無所忌憚自謂是佛的大無畏所謂口口談空而行在有中將如來解回為己見要解除這種猖狂的病是在切實奉行十善否則無論技術多大見聞多廣皆是墮三惡道的因子不能成為菩薩行也對治欲高福薄而培福現在的人大抵心比天高而命薄如紙不肯自修福德而時時想把他人壓下去把自己高舉起來不改轉此心而平心奉行十善培修福德必將愈加墮落而無從振拔但心高並非不善要在能培福德如佛果的功德以及天龍的威力等皆由十善福德而成否則單是心高而不去增長善業培植福德則終日在煩惱中出沒決沒好的結果甚至非走入自殺的途徑不可想濟世利人的尤須培修福德昔有一法師講經甚好而沒有人聽後來有一聖僧謂此由汝沒有福緣所致以後應多做利人的事依之而行後來説法就有人聽了所以想在世間立大功建大業的人必須要多培福德修習利己利人的十善業行二經題與譯題甲釋經題佛書大分三類所謂經律論三藏是也經即契經謂契理契機之經常大法經由佛説故云佛説佛即覺者是具足無量福德智慧究竟圓滿同虛空如法界的尊稱而此中專指應生印度的釋迦牟尼而言釋迦是姓譯能仁牟尼是名譯寂默佛為開示衆生暢悅本願故説此經此經名十善業道十善業道的意義在後經文上當講善之義從業上説業即行為即道德學倫理學上的行為依佛法可謂為善行學業之善者須在空間上於人於己皆有利益在時間上通現在未來皆有利益若不顧他人或未來的利益只貪自己眼前相似的利益即成為惡業以大衆利益為前題的利他善業結果自他俱利以損惱大衆為前題的害他惡業結果自他俱害善惡之標準大略如此道即能通之道路十善業是光明達道不是十惡業的黑暗險徑行於十善業的道路上最低可成人天樂果高則可至於三乘聖果故曰十善業道乙釋譯題佛應生在印度此經是在龍宮中説的記載的文字是梵文譯成中文的法師是唐時從于闐國來中國的于闐在現在的新疆省唐時尚未屬中國版圖這位遍通三藏的法師名實叉難陀此是梵語譯為賢喜八十華嚴也是這位法師譯的此經在唐時同本異譯的更有義淨三藏所譯的佛説海龍王大乘經由此知道此經是確有梵本根據的有事實歷史的釋經甲一證信如是我聞一時佛在娑竭羅龍宮與八千大比丘衆三萬二千菩薩摩訶薩俱此一段文是集録的人所記本經是何人在何地何時為何人而説的信史如是即指此經我聞之我是和合總體的假名非我執之我不言耳聞而言我聞是表親聞可信一時即機教相契説聽俱訖之時不指出一定的年月日時因處所不同彼此曆法有異而佛説法時而天上時而人間時而龍宮異國故不指定月日佛的意思在上已釋此顯説者本經所記之文即此佛之所説龍宮是説經處所娑竭羅是梵語此云鹹海在大鹽海中有龍王之宮殿為龍所居佛典之言龍與通俗所説興雲致雨之龍稍異佛經中有天龍空龍陸龍海龍此鹹海龍即海龍世間一般人皆知龍係有神通變化之動物今之生物學家考察古時地上之動物亦謂有龍且曾有以龍為世界主人翁的一時代今阿非利加洲的地上猶遺留有活的陸龍故為可信但今世之龍或在虛空或在海中皆人力所不能到之處故不與人相交涉佛在當時所偕同之聲聞大弟子等皆能有教無類隨類説法故佛説法之處有一天上二人間三龍宮四禪定中等別此經即在娑竭羅龍宮所説而同聽法者則有八千大比丘衆比丘此云乞士以出家比丘律儀為法者但比丘甚多比中所指大比丘是佛的常隨衆同時又有從十方來的三萬二千大菩薩有此同聽法衆足以證信甲二正説乙一明世出世業果丙一就因明果爾時世尊告龍王言一切衆生心想異故造業亦異由是故有諸趣輪轉爾時指説法之時世尊指佛為世所共尊龍王是龍宮之主故佛呼而告之心是心王想指心所衆生之心心所有三界九地五趣四生等不同故所起的行業亦各不同遂使得果亦異所謂人心不同各如其面此就心心所總説為心若分別説則為心及想等然身語意所發之業皆由心造所謂有諸內必發諸外若行動沒有心的功用則不能成善惡之業今之倫理學家亦論到此因心想不同故行為造作不同由此成為五趣輪轉之果如人造善業則生天天造惡業即墮畜生畜生業盡或以善業復為人人行惡或又墮地獄等故名輪轉丙二即果明因龍王汝見此會及大海中形色種類各別不耶如是一切靡不由心造善不善身業語業意業所致先呼龍王使聽真切海中之魚蝦等類種種形色不同果報不同此皆由心想及行業不同所致此業之出發處即身語意而各有善不善故成種種形色此是以果明因丙三舉因相明丁一觀心無主而心無色不可見取但是虛妄諸法集起畢竟無主無我我所心是沒有形色的非眼所見非手能取但由無始虛妄分別於一切法而集起的由種起現三界皆由此虛妄分別而現起畢竟沒有主體不能指孰為我孰為我所若執心有主即成斷常法丁二觀法如幻雖各隨業所現不同而實於中無有作者故一切法皆不思議自性如幻虛妄諸法即五蘊四大之身器等法無一定作者皆由業現起業由心起心又由諸法起展轉幻化不可究詰故不可以思想議論而取古時外道謂有大自在天造作萬有今之耶教謂有上帝能創造及主宰一切在佛法中皆屬妄執所有苦樂之果皆由十業之善不善而異此中明業果之自性如幻即般若真空法相唯識之義亦已包括無餘矣丁三勸應修善智者知已應修善業以是所生蘊處界等皆悉端正見者無厭業性不是固定的世界不是死板的諸法是如幻的無主宰的故應廣修善行止息惡業集起莊嚴端正的蘊處界使一切衆生見聞者歡樂不生厭惡丙四舉果相證丁一以佛果證龍王汝觀佛身從百千億福德所生諸相莊嚴光明顯曜蔽諸大衆設無量億自在梵王悉不復現其有瞻仰如來身者豈不目眩佛身由無量劫修百千萬億福德而生起故有三十二相百福莊嚴光明顯耀諸天龍王雖皆有光明但一見佛其光即不能顯現在天中光明最大者即大自在天及梵王然皆遠不如佛丁二以菩薩證汝又觀此諸大菩薩妙色嚴淨一切皆由修習善業福德而生菩薩的相好光明清淨莊嚴亦皆由修習善業福德而生丁三以天龍證又諸天龍八部衆等大威勢者亦因善業福德所生天龍八部即是阿修羅健闥婆等彼之所以有大威勢者亦由修集福德善業所生故栽培福德最為重要以上三段就善的業果説以下明不善以反證丁四以海衆證今大海中所有衆生形色粗鄙或大或小皆由自心種種想念作身語意諸不善業是故隨業各自受報海中魚鱉蝦蜆或大或小之種種形色皆由自心的想念作種種身語意的不善業故得此粗鄙的報身丙五結勸修學汝今常應如是修學亦令衆生了達因果修習善業汝當因此正見不動勿復墮在斷常見中於諸福田歡喜敬養是故汝等亦得人天尊敬供養要以正見修習善業了達因果不為邪見所傾動邪見即斷常二見斷見者不信業果以為人一死即了故肆意為惡不畏後報常見者以為世間的事物皆是固定的如人即世世生生為人牛馬即世世生生為牛馬造善惡業無關此身的苦樂此由不明正因果義欲專修善行不墮邪見須觀身無常觀心無主觀法如幻隨心造業隨業受報才是了達因果的真相福田謂能種植福德之田此有三種一敬田佛菩薩師長等應恭敬而得福二恩田父母及有恩於己者應孝順而得福三悲田對於苦惱衆生悲愍救濟而得福於此三福田中能歡喜供養就能得到人天尊敬供養的樂果乙二正明十善業道丙一顯善法用龍王當知菩薩有一法能斷一切諸惡道苦何等為一謂於晝夜常念思惟觀察善法令諸善法念念增長不容毫分不善間雜是即能令諸惡永斷善法圓滿常得親近諸佛菩薩及餘聖衆常常思惟觀察善法則心即善心善即無惡業無惡業則不受苦果須專心觀察不使絲毫惡業參雜其間使善法圓滿善法圓滿則能親近諸大菩薩能與諸大菩薩同處極樂世界丙二釋善法名言善法者謂人天身聲聞菩提獨覺菩提無上菩提皆依此法以為根本而得成就故名善法何以名為善法呢因為人道的身天道的身聲聞小乘五分法身戒定慧解脫解脫知見獨覺菩提法身中乘無上菩提法身大乘世出世間諸善行果皆由此十法為根本故名善法丙三出善法相此法即是十善業道何等為十謂能永離殺生偷盜邪行妄語兩舌惡口綺語貪欲瞋恚邪見世出世間的根本善法即十善業道所謂道在邇而不必求之遠由此十善業的光明大道而得到世出世間的樂果殺生乃至邪見名十惡業所謂十善者全在於永離二字上此永離二字的工夫頗不容易若此一時雖離殺生將來或仍行殺今生縱能不殺到來生或猶殺則皆不得謂之永離必要世世生生盡未來際不殺才是永離此須到阿羅漢之位方可殺生本指斷命根而言但若殺而命根不斷亦有殺業但非究竟殺耳戒殺者不但不殺生還要注意護生乃能戒除蚊虻等微細的誤殺殺等十業在內心上外境上歷時上各有上中下之區別今且舉殺業言內心動機上分三種一有瞋恨心知而故殺者最重二若有瞋恨的衝動而心不明了或心雖明了而不瞋恨者處中三若無知誤殺者輕微就對境上説亦有三種輕重不同若出佛身血殺阿羅漢弒害父母及有恩者業重若殺與己同類均等者業中若殺下等衆生業輕又就起心作業經歷時間上説亦有三種不同若未殺時先有殺意樂正殺及殺已歡喜無悔者業重若未殺前無殺意或殺而悔者業中若無瞋恨心誤殺殺而即悔者最輕離殺業亦須依此三種而次第修習先離粗重殺業使身不殺進而更修禪定使殺心亦深伏但猶未斷更修智慧令斷雖斷殺心無始之殺業習氣猶不易盡要到佛果方能究竟清淨昔佛在世時與舍利弗同觀一鴿此鴿子見佛不恐怖見舍利弗猶恐怖舍利弗問佛何因緣如此佛説汝阿羅漢殺心雖無而無始習氣猶未斷盡故彼恐怖第二偷盜亦應如上殺業有三種之三重分別乃至下八種業皆應如理類推分判輕重在中國古書裏有陰符經謂人生在世要善為盜方為有才能可見人謀生活不易離盜而微細之盜業尤為難除偷是以巧法取盜是以強力取第三邪行即指淫欲人間以合理之夫婦配偶為正此外名邪此就粗淺者説深則欲界衆生皆以淫欲而正性命又凡一切五欲境放逸之處皆屬邪行要出欲界方能伏欲要到三果方能究竟離欲以上三種屬於身業第四妄語即虛誑語謂見言不見不見言見知言不知不知言知善言是惡惡言是善以非言是以是言非等在佛法中最要戒的是大妄語即未得謂得未證謂證是若犯此大妄語決定入魔由魔即墮三惡道最為危險若菩薩為利他方便而説妄語則如菩薩戒本所明離妄語即真實語第五兩舌即離間語在此言彼在彼言此使親愛者互相乖角古之縱橫家今之政客等多屬此類其害最大離離間語即得和合語第六惡口即粗惡語如世間之罵詈人等由罵而打而殺小則一人之爭大則社會乃至國際之戰其害亦甚大離粗惡語即得柔和語第七綺語即無義語謂花言巧語文過飾非之類言不真實使人心蕩動唐喪光陰且易引人入於邪途離無義語即如義語以上四種屬於語業平常謂之口業然稱口業義不圓滿發語須喉舌臍等口祇是發語工具之一耳故應改稱語業第八貪欲欲即世間五欲之樂境對境起貪故名貪欲貪欲為生死的要因故應斷除但此貪欲二字並非完全屬於不善欲通三性而對三界善法起貪亦通有覆無記第九瞋恚於可欲境起貪於不可欲境起瞋恚性雖是惡唯欲界有修習禪定四無量心乃能伏離第十邪見通常亦謂愚癡由聰慧者不離愚癡而愚癡中鋭發偏見隨其一偏之見執以為是如執斷常乃成顛倒邪見要離愚癡中之極猛利的邪見須修禪定得般若力方可增長正見圓滿善法以上三種屬於意業乙三明十善業功德丙一明離殺生功德龍王若離殺生即得成就十離惱法何等為十一於諸衆生普施無畏二常於衆生起大慈心三永斷一切瞋恚習氣四身常無病五壽命長遠六恆為非人之所守護七常無惡夢寢覺快樂八滅除怨結衆怨自解九無惡道怖十命終生天是為十若能回向阿耨多羅三藐三菩提者後成佛時得佛隨心自在壽命要究竟十善業須永離十惡業每離一惡業即除去種種煩惱又得成就種種功德若離殺生業即是除一切凶惡之法得到人天安樂之法能常常生起大慈心永斷除瞋恨心使一切衆生見之不生怖畏心就是成就大無畏施如此則生前獲得無病長壽晝夜安樂且為天龍八部等非人之所守護死時又無地獄餓鬼等惡道的怖畏得生天國此離殺業即菩薩行若能以此功德回向無上正等正覺阿無也耨多羅上也三正也藐等也三正也菩提覺也將來成佛時便能得佛隨心自在的壽命佛的真身等虛空遍法界壽命是無量無盡的應身住世的壽命或長或短視衆生的機緣滅住皆可隨心自在如阿彌陀佛此云無量壽皆由永離殺生而得的以下文義易曉解釋從略丙二明離偷盜功德復次龍王若離偷盜即得十種可保信法何等為十一資財盈積王賊水火及非愛子不能散滅二多人愛念三人不欺負四十方讚美五不憂損害六善名流布七處衆無畏八財命色力安樂辨才具足無缺九常懷施意十命終生天是為十若能回向阿耨多羅三藐三菩提者後成佛時得證清淨大菩提智世間資財有五種事可使消滅貧乏一國王二盜賊三水災四火災五非愛子俗稱敗家子若能永離偷盜業即常得資財豐滿不為此五事所散滅且有善名流布辨才無礙為一切人所愛敬讚美不為人欺命終亦得生天若能回向無上菩提將來成佛時得證清淨大菩提智丙三明離邪行功德復次龍王若離邪行即得四種智所讚法何等為四一諸根調順二永離喧掉三世所稱歎四妻莫能侵是為四若能回向阿耨多羅三藐三菩提者後成佛時得佛丈夫隱密藏相諸根眼耳鼻舌身意的六根調順者調善和順也喧掉煩擾不安靜也若能永離邪行即得身心清淨夫妻貞良不為外人侵犯若更能回向無上菩提者將來成佛時即得佛大丈夫隱密藏相三十二相之一即馬陰藏相丙四明離妄語功德復次龍王若離妄語即得八種天所讚法何等為八一口常清淨優鉢花香二為諸世間之所信伏三發言成證人天敬愛四常以愛語安慰衆生五得勝意樂三業清淨六言無誤失心常歡喜七發言尊重人天奉行八智慧殊勝無能制伏是為八若能回向阿耨多羅三藐三菩提者後成佛時即得如來真實語優鉢華是梵語此云青蓮花氣味清香若能永離虛妄不實之語則口常清香發言成證無有錯失善能安慰一切衆生令尊重奉行為人天之所敬愛若更能以此功德回向無上菩提將來成佛時即得如來真實語丙五明離兩舌功德復次龍王若離兩舌即得五種不可壞法何等為五一得不壞身無能害故二得不壞眷屬無能破故三得不壞信順本業故四得不壞法行所修堅固故五得不壞善知識不誑惑故是為五若能回向阿耨多羅三藐三菩提者後成佛時得正眷屬諸魔外道不能沮壞兩舌最易破壞他人之事若能永離兩舌間之語則能獲得己身眷屬信心法行善知識的五種不壞功德若更能以此功德回向無上菩提將來成佛時即得菩薩眷屬不為魔外之所敗壞丙六明離惡口功德復次龍王若離惡口即得成就八種淨業何等為八一言不乖度二言皆利益三言必契理四言詞美妙五言可承領六言則信用七言無可譏八言盡愛樂是為八若能回向阿耨多羅三藐三菩提者後成佛時具足如來梵音聲相若能永離粗惡之語即能成就八種淨業發言必合真理美妙順利不乖法度使一切人信用領受無有譏謗若能以此功德回向無上菩提將來成佛時即得具足如來梵音聲相三十二相之一即梵音深遠相梵音者清淨嘹喨之音也丙七明離綺語功德復次龍王若離綺語即得成就三種決定何等為三一定為智人所愛二定能以智如實答問三定於人天威德最勝無有虛妄是為三若能回向阿耨多羅三藐三菩提者後成佛時得如來所授記皆不唐捐若能永離花言巧語文飾之言即能獲得三種決定功德一定為智者所愛因綺語是無義之語只能誑惑愚人智者所厭聞能離綺語故為智者所愛二定能以智如實答問答人之問要如實才能解疑三定於人天威德最勝無有虛妄所謂事實為最大之雄辨離開綺語所發之言即是就事實和真理而言故人天皆佩其威德若能以此功德回向無上菩提將來成佛時即得如來授記功德皆不唐捐授記者佛功德之一如佛謂衆生何時成佛何時墮地獄吉凶禍福言必有準然係如實知如實説非如上帝之主宰而與之禍福也不唐捐者不空棄也丙八明離貪欲功德復次龍王若離貪欲即得成就五種自在何等為五一三業自在諸根具足故二財物自在一切怨賊不奪故三福德自在隨心所欲物皆備故四王位自在珍奇妙物皆奉獻故五所獲之物過本所求百倍殊勝由於昔時不慳嫉故是為五若能回向阿耨多羅三藐三菩提者後成佛時三界特尊皆共敬養若能永離貪欲即能獲得種種自在自在即隨心自由三業指身語意諸根即眼等六根此為身內之財珍奇妙物為身外之物內財外財無不具足且能所獲過於所求數十百倍若能以此功德回向無上菩提將來成佛之時即得三界特尊皆共敬養三界欲界色界無色界也丙九明離瞋恚功德復次龍王若離瞋恚即得八種喜悅心法何等為八一無損惱心二無瞋恚三無諍訟心四柔和質直心五得聖者慈心六常作利益安衆生心七身相端嚴衆共尊敬八以和忍故速生梵世是為八若能回向阿耨多羅三藐三菩提者後成佛時得佛無礙心觀者無厭若能永離瞋恚即能獲得種種喜悅功德常得柔和慈祥之心無瞋訟損惱之心善能利益安樂一切衆生生前身相端嚴為人恭敬瞋心發時臉赤心悸即身相不端嚴死後得生梵世梵世為得禪定者及三果以上之聖人所生處若能以此功德回向無上菩提將來成佛之時即能得佛無礙心使觀者無厭丙十明離邪見功德復次龍王若離邪見即得成就十功德法何等為十一得真善意樂真善等侶二深信因果寧殞身命終不作惡三惟歸依佛非餘天等四直心正見永離一切吉凶疑網五常生人天不更惡道六無量福慧轉轉增勝七永離邪道行於聖道八不起身見捨諸惡業九住無礙見十不墮諸難是為十若能回向阿耨多羅三藐三菩提者後成佛時速證一切佛法成就自在神通若能永離愚癡邪見即能獲得種種真善功德直心正見明因知果無諸疑惑常得真善伴侶歸佛法僧世世生生生人天道不起邪見不墮諸難福慧轉增邪道永離不起身見身見梵名薩迦耶見即我我所見如執受想行等為我我所此身見為一切煩惱之根本若能更發深遠廣大之心以此功德回向無上菩提將來成佛之時即證得一切佛法成就自在神通乙四明十善業勝行丙一明六度丁一廣明布施度爾時世尊復告龍王言若有菩薩依此善業於修道時能離殺害而行施故常富財寶無能侵奪長壽無夭不為一切怨賊損害離不與取而行施故常富財寶無能侵奪最勝無比悉能備集諸佛法藏離非梵行而行施故常富財寶無能侵奪其家貞順母及妻子無有能以欲心視者離虛誑語而行施故常富財寶無能侵奪離衆毀謗攝持正法如其誓願所作必果離離間語而行施故常富財寶無能侵奪眷屬和睦同一志樂恆無乖爭離粗惡語而行施故常富財寶無能侵奪一切衆會歡喜歸依言皆信受無違拒者離無義語而行施故常富財寶無能侵奪言不虛設人皆敬受能善方便斷諸疑惑離貪求心而行施故常富財寶無能侵奪一切所有悉以惠捨信解堅固具大威力離忿怒心而行施故常富財寶無能侵奪速自成就無礙心智諸根嚴好見皆敬愛離邪倒心而行施故常富財寶無能侵奪恆生正見敬信之家見佛聞法供養衆僧常不忘失大菩提心是為大士修菩薩道時行十善業以施莊嚴所獲大利布施以度慳貪所得的果報即財寶豐滿無有貧乏但施心若不清淨或惡行未能斷除雖有財寶不能長久享受若菩薩依十善行而行施則壽命無夭眷屬和睦所獲財寶最勝無比無人敢侵奪損害且為人所愛敬天龍所護持以十善施能圓滿莊嚴故獲此大利如瞋恨心與人賭氣或為沽名而行布施或愚癡邪見應施者不施不應施者妄施則倒行逆施施非圓滿所得的果報亦不究竟丁二略明餘五度如是龍王舉要言之行十善道以戒莊嚴故能生一切佛法義利滿足大願忍辱莊嚴故得佛圓音具衆相好精進莊嚴故能破魔怨入佛法藏定莊嚴故能生念慧慚愧輕安慧莊嚴故能斷一切分別妄見義利謂實義的利益有現在義利未來義利及究竟義利之分修六度行即得一切義利然皆須以十善行為根本所得義利才能圓滿丙二明衆行丁一四無量心慈莊嚴故於諸衆生不起惱害悲莊嚴故愍諸衆生常不厭捨喜莊嚴故見修善者心無嫌嫉捨莊嚴故於順違境無愛恚心慈悲喜捨為佛菩薩之四種無量心與樂曰慈拔苦名悲於他一切利樂功德之事隨喜讚助曰喜冤親平等不起分別所謂應無所住而生其心名捨推此四心遍及無量衆生故名無量行十善道使此四心圓滿莊嚴所獲功德無量丁二四攝四攝莊嚴故常勤攝化一切衆生四攝即布施愛語利行同事菩薩隨類現身以此四法攝受一切衆生使之受道獲大利益丁三三十七菩提分等念處莊嚴故善能修習四念處觀正勤莊嚴故悉能斷除一切不善法成一切善法神足莊嚴故恆令身心輕安快樂五根莊嚴故深信堅固精勤匪懈常無迷妄寂然調順斷諸煩惱力莊嚴故衆怨盡滅無能壞者覺支莊嚴故常善覺悟一切諸法正道莊嚴故得正智慧常現在前止莊嚴故悉能滌除一切結使觀莊嚴故能如實知諸法自性方便莊嚴故速得成滿為無為樂此三十七菩提分法亦名三十七道品甲四念處亦名四念住一觀身不淨二觀受是苦三觀心無常四觀法無我乙四正勤又名四正斷一已生之惡令速斷二未生之惡令不生三未生之善令速生四已生之善令增長能斷懈怠故名正斷丙四神足亦名四如意足欲念進慧得此神足即能所願如意就能發神通言故名神足丁五根信進念定慧戊五力同上五根就進修説五力就能對治説庚七覺支一擇法二精進三喜四輕安五念六定七行捨辛八正道一正見二正思惟三正語四正業五正命六正精進七正念八正定修此八法可盡離非邪故名正能通涅槃故名道以上總為三十七品若菩薩以十善業為根本修此諸法則能獲得一切功德圓滿輕安快樂丙三結廣龍王當知此十善業乃至能令十力無畏十八不共一切佛法皆得圓滿是故汝等應勤修學此段廣結十善業的勝行並勸修學文義可知乙五明十善業殊勝龍王譬如一切城邑聚落皆依大地而得安住一切藥草卉木叢林亦依地而得生長此十善道亦復如是一切人天依之而立一切聲聞獨覺菩提諸菩薩行一切佛法咸共依此十善大地而得成就此明十善業之功能殊勝為一切善法之根本不可須臾離此故以大地為喻若離十善業欲修行證果譬如空中建樓閣或種稻子欲成就生長無有是處甲三流通佛説此經已娑竭羅龍王及諸大衆一切世間天人阿修羅等皆大歡喜信受奉行此文為結集經人所記娑竭羅龍王為此會受法之主阿修羅此云非天即八部之一等者等及八部也皆大歡喜信受奉行佛令一切經皆如此結成表佛説法不同凡夫戲論説經既已是須要依教奉行的但聽法者必須發歡喜心才能生信有了信心才能領受領受以後才能去奉之以實行這歡喜信受奉行是要大家注意的葦舫塵空合記見海刊十三卷九期
