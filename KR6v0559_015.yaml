body:
  text: 生活與生死今在思想較聰慧之佛徒以本於錫蘭島南方巴利語所謂原始佛教及西洋人用其比較的科學的進化史眼光謂大乘佛教及佛的宇宙哲理阿毘達磨為後起純由佛教流行中與他土宗教哲學交涉後種種時代演進之所成且三界有情及三十七覺分等皆為釋迦時代印度人一般的流行思想佛之特點一為否定有我即梵梵即我的我體二為由不貪欲樂不著苦行之非樂天非厭世的中道解脫故唯解決生死問題的小乘解脫為佛陀的根本精神其論據則一徵釋迦出家修道的動機在感老病死二徵釋迦修道成佛的心境在觀十二緣起故其後轉法輪說為四諦涅槃時演為三十七覺分結為戒定慧及解脫又結為當以法及律為師於是原始佛教乃結法為經藏結律為律藏見呂澂印度佛教史略故原始佛教的真相惟在解脫生死的小乘而一切有情皆可成佛的大乘與小乘大乘同源佛說的源泉遂為窒塞而無蹤跡之可尋一般洋學者遂否認佛學為非人生的為惟是出世的反身退歸於消滅的佛徒之影響於其說者乃不得不別求解決生活問題於他處而惟以佛道為解決生死問題之一法違害佛徒正法莫此為甚吾既直印正等覺於佛心出為人天眼目於此蓋不能不為前佛後佛三世諸佛一雪其誣也言有層次今請先以釋尊出家動機及成正等覺時心境徵之釋尊出家動機有二一如前說其二則佛本行經云太子出遊觀諸耕人赤體辛勤被日炙背塵土坌身喘呷汗流牛縻犁端時時捶掣犁槅研領鞅繩勒咽血出下流傷破皮肉犁場土墢之下皆有蟲出犁過後諸鳥雀競飛吞啄取食太子見已生大憂愁思念諸生活等有如是事語諸左右悉各遠離我欲私行即行到一閻浮樹下於青草上跏趺而坐諦心思惟便入禪定應知釋迦出家修道此為第一動機夫宇宙生生不已而不與聖人同憂患者為其盲目的生生而不顧生生相殘且各以殘他生而生自亦以殘他生而苟全自之生活也如何可以不相殘殺死害而咸得各全其生活此非生活之大問題耶為解決此生活問題而修道即為大乘以大悲心為動機而修道後此以更見老病死而決心捨家修道者夫亦曰不殘他生而生自以自生活使其生活若能藉殘害他生而永久健康繁榮猶有可言也今諸有生者藉殘他生而苟延旦夕旋不免於老病而死則其為可悲痛更何如耶於是乃毅然決然而暫捨家國等以殘他為生活的生活期求得一可以不殘害他生而生活之道再來為之救濟故釋迦出家修道之二種動機乃純為解決生生相殘以生的生活如何可轉為不相殘以生的生活之大乘大悲心所激發而求無上遍正覺以為之解決也換言之即但有無際無盡的浩浩生活問題之須解決而別無生死問題之須解決然生死問題亦隨之而解決不過為解決生活問題上之歷程而已再徵之釋尊成正等覺時之心境試為觀十二緣起所觀因緣及果則為苦集然所觀不離能觀若一究其能觀方面則其歷程及所終極則為依修道動機的大悲心同情心為出發經歷心受身法的觀察止惡行善的正勤定慧及信等之努力經歷長時間精進轉變增盛因位達其終極乃在所觀邊一切擾害黑業的苦滅而為本來寂靜究竟安穩之涅槃在能觀邊即為一切光明美善之菩提及充遍一切有情的大悲願與無量數的巧妙功用果位涅槃曰斷德菩提曰智德悲用曰恩德總曰法身亦曰法界如來藏等智短者聞其語所觀之苦集自求解脫智深者亦聞其語能觀智所由致及其終極之成就隨智深淺各錄其所聞於是有阿含等所記及華嚴等所記夫同一太陽也或觀為如方尺盂之一光輪繞地而行或觀為地球等八大行星所環繞之恆星同一十二緣起論亦然或錄為所謂原始佛教之小乘經或錄為重重因行果證之華嚴等大乘經以世尊正等覺時觀十二緣起故謂大乘經非原始佛教然則其亦以為太陽故非地球等所環繞之恆星耶由此可知釋尊成等正覺之所解決者為生活問題而非生死問題蓋生老病死等本不成問題生活問題解決則死等問題自解決也何者老病死等之成問題由於未悟宇宙人生之真相殘害他生而得生活極大艱苦而終莫保憑此私意乃成為問題而須解決今見宇宙人生真相本來寂靜究竟安穩遂滅除此殺他生自的私意而成無始無終無邊無中的光明美善的生活相利益而不相損害浩浩無際悠悠無盡故生活問題之解決即更無老病死之問題也換言之即俗間之所謂解決生活問題不過藉殘害他生而苟求自身或同族同類之暫時生活而在佛法則本末兼盡既有全宇宙生類不相殘害而當相益資益之圓滿解決復為在未達圓滿解決之境地者各於同情心所能及之不殘害他生範圍內開出種種正命生活之方法俾可漸由進化而至圓滿故但應以俗法為生活問題不澈底之解決佛法為生活問題澈底之解決不應以俗法為解決生活問題佛法為解決生死問題也佛法為解決生活問題之法且為全宇宙生活問題澈底之解決法故釋尊於成等正覺之後還到以爭殺各求其生的人間生活中教以隨宜改良革新進化以趨圓滿的種種生活方法汲汲為利眾的生活勤勇精進終不休息集其一生的行事與言訓曰法與律暫於能及範圍內之種種正命生活方式即道德之律也漸由進化而達圓滿之生活方法即經論之法也由此可知佛陀及佛陀之真正修學者皆為人生的進化的體現人生真相的而其解決宇宙人生大生活問題之公式則為既無自而非他即生他而活自除損他之兩害行益他之兩利於是有人生之安樂於是成宇宙之美善使佛陀不為人生宇宙之生活安善問題而但為個人生死之解脫則其成等正覺而得涅槃應同死滅而無生活何以乃在生活界中有和合眾的美善生活彰彰在人世耶由此應知佛法以大乘為主小乘為從屬佛法之解決問題亦以生活為主生死為從屬大乘佛法無他要言之則大悲大智以護群生而已宇宙之生生不已而相殘以為生者以蔽於各私其生之私意而不見緣起無自性的生活真相也若能以照見緣起無自性的生生真相之慧劍揮去各私其生以相殘之私意乃達護生之目的而獲安全之生活故曰護生須是殺殺盡乃安生生安則常活無死故老病死亦解決矣見海刊九卷三期
