body:
  text: 佛教人乘正法論五年在普陀關中著一總論二信仰皈依三寶三三皈四五戒善法五在家六衆信徒六不殘殺而仁愛七不偷盜而義利八不邪淫而禮節九不欺誑而誠信十不服亂性情品而調善心身十一五戒之類別十二增上五戒十三持戒之因果十四傳授受持之方法十五斷疑生信一總論佛教有五乘法曰人乘曰天乘曰聲聞乘曰緣覺乘曰如來乘前二世間後三出世唯如來乘完全此五今論所取但在人乘此人乘法其本源出於如來乘故曰佛教人乘正法然此非以窮幽體玄造微證真者也乃以現今人倫之習慣風俗性情為質地以佛教人乘正法為準繩使咸納乎人道之正軌耳蓋人倫者唯習俗性以為誠諦離習俗性別無人倫倫即人類人群人道涵有綸貫思理之義所以異乎鳥類獸群之亂無道法也故不務高遠而唯求犁然有所當於群萌之心行也若夫明心見性發真歸元洞萬化之玄妙備衆德而淨妙則塵垢粃粳陶鑄堯舜在乎有志者自為之耳非所以論於萌俗也人倫之道德理法是人類群合之所緣生非是人類為道德理法乃生也蓋自然界生死流轉既暫爾得生為人矣因愛有生綦愛生存外患強烈生存為艱謀相保以生存乃緣起乎社會既生存矣更謀蕃昌浸假而習識人類生存蕃昌所必要之術布為文教化合民心是為人倫道德理法沿習成俗積化成性故此人倫道德理法亦曰人倫理性必如是人類乃生存蕃昌文美安樂不如是則人類必致爭奪殘殺險亂困苦馴至群功渙散倫業消滅然人心莫不惡劫奪殘殺險亂困苦莫不愛永保其生存蕃昌文美安樂故此人倫道德理法又積聚成人類之良心為人類生命情性上所必要之大條理而不可須臾離之矣若近世之倫業群功雖謂由此道德理法所生可也然人心猶未能全合此人倫道理也設能完全契合乎此則人倫之昌盛和樂必不止是吾可斷言至人道之慈善行業由一部分人類於生活力上所缺憾而見功者也人類受範於自然之生界若猝然遇水旱風火兵燹等災於生活上頓生缺憾理有固然勢所必至故須慈善行業以營救之若夫因荒學惰工欺盜淫殺致失其生活力者雖曰孽由自作無事嫗煦然欲廣其慈心令充生不已者亦當一視同仁以慈濟之要之人倫之道理及慈行不外安守分域相為利益此倫理上之最大公例也今論亦闡明此人倫道理推行乎人倫之慈行因國習以求功隨民俗而施教焉耳其趣道真證無生者全超越自然生化界且不見有生之可愛況相謀以保蕃昌文美乎故今當釐定宗界曰出安分相利外雖有勝業即為餘事出人乘戒善外雖有勝諦即務高遠出國法民情外雖有勝説即妨倫俗今論概無取焉其非勝業勝諦勝説者無論已二信仰皈依三寶依佛典有三種三寶一曰性體三寶二曰聖賢三寶三曰住持三寶三寶者佛寶佛法寶佛法僧寶是也何為住持三寶依像而見之佛塔寺是也依書而傳之法經藏是也依律而住之僧叢林是也而此住持三寶又依僧寶而住僧寶清高佛法興盛僧寶污卑佛法衰替是故獨以僧為住持住即居住不遷之義持即任持不失之義僧有僧相僧德辭親投師受戒持律三聚無犯六和無諍此僧相焉修證禪定學通經教此僧德焉然具僧相尤為住持三寶之要具僧相者即具律儀此猶儒家禮樂未嘗不美以無住持部衆故祗空言而無實事蓋禮樂依群衆而存離群索居則無禮樂可言國家禮制因勢變遷時異俗殊則難固守唯集自由信行部衆始可新故相傳住持佛教有此住持部衆故律儀相不致隱沒傳戒講經坐禪設齋皆與禮制樂器相應今者僧衆浸不清淨唯仗二三叢林守之須整理焉具僧相者以律居異又分二衆即比丘比丘尼是也比丘尼衆亦但附屬實則在乎比丘而已苾芻即比丘也所宗多分出世三乘之道今不述之但知僧衆所以為佛教住持三寶之一者足矣信仰者信仰三寶也性體三寶修定慧者可自心證知而世不得見知聞知也聖賢三寶世可聞知而不得見知也可見知者良為住持三寶住持三寶又依僧為住持故在家男女信佛信法矣尤須禮一所信仰之比丘為皈依師而後信仰儀式始完全也蓋佛教非同天神教可不必見知證知而向渺茫漠無之虛空著其信仰者也信仰佛教儀式維何由所禮皈依師於塔寺中佛像或佛經前陳香光之供作鐘梵之樂為説三皈或一戒乃至五戒一也贈與佛像或佛經或縵衣或念珠二也為立一皈依三寶之法名三也教令每晨行三皈禮或念佛名四也如是信仰於諸信仰最為清淨最為簡便皈依者皈依三寶也皈依三寶者信佛教之普通禮儀也無論在家出家皆須行之無此非信佛之徒也猶之五戒為人倫之通常道德無論何國何教莫不崇之無此非人倫之類也故信仰皈依佛教者必兼三皈五戒三三皈云何三皈有誓有願其皈依師當教之稱誦曰自皈依佛誓我生生永不皈依天神鬼物自皈依法誓我生生永不皈依外道邪教自皈依僧誓我生生永不皈依損友惡黨自皈依佛當願衆生體解大覺發無上心自皈依法當願衆生深入經藏智慧如海自皈依僧當願衆生統理大衆一切無礙反本還源曰皈知止心定曰依此中前三皈為發誓後三皈為願誓以自軌乎正願以推善及人三皈義理可淺可深其皈依師當隨解説淺則婦孺與知深則聖賢莫窮更教每晨行三皈法盥漱事畢隨所居處或家中或行旅無處不可張供佛像或陳佛經手爇淨香身披縵衣誦此二種三皈依詞每一皈依即禮一拜共六拜畢乃作他事所費時間日僅五分鐘耳於諸人事都無妨礙四五戒善法云何五戒今當先列其名一不殘殺而仁愛二不偷盜而義利三不邪淫而禮節四不欺妄而誠信五不服亂性情品而調善身心此之五戒上截即是倫理原則下截則同儒家五常上截在止所不當為下截在作所必當為能止所不當為則所作者自合於必當為專作所必當為則自能遠離於所不當為止所不當為者曰戒作所必當為者曰善今因省稱故但曰戒具足應云五戒善法勿惰必勤勿怯必勇則為通策五戒之要行然不得同於五戒善法者以勤勇未必善惰怯未必惡也果敢而力作所不當為事亦勤勇也此則不如惰怯猶足捐減惡行唯惰怯於應止之事而不能止不勤勇於當作之務而不能作斯為惡耳然勤勇於當作之務亦不可偏重其一端宋墨之自苦為極斯斯多噶耶耶穌之冒難相尚其為仁義也過勤勇蓋於禮節及調善身心者偏廢也若孔子庶乎中正耳五在家六衆信徒云何於在家信仰徒衆中又分六衆即依所受五戒完全不完全別之也凡皈依師為説戒時當先告以五戒名義及此六衆差別之界雖讚其勝勿貶其劣令彼自擇勿稍勉強方可廣攝群機令無遺類甲衆但受不偷盜而義利一戒蓋四性戒佛雖俱重唯此偷盜國所必禁犯偷盜罪即犯刑律故此一戒國民必守以裨國治莫大乎此以廣攝機亦此為最否則娼優屠獵之類無由信奉佛教故也或復隨彼受者所喜於五戒中自擇一戒受持亦準甲衆乙衆較甲衆加受不邪淫而禮節一戒端正風化增進民德此為其最除娼優類皆得受之攝機亦寬復隨彼受者所喜於五戒中自擇二戒受持遵守亦準乙衆丙衆較乙衆加受不欺妄而誠信一戒誠信既為人人必要之德則自人人所易行也於五戒中受者自擇三戒持守亦準丙衆丁衆較丙衆又加不殘殺而仁愛一戒若論道德此戒最重然在國群行之稍難是故次於第四於五戒中受者自擇四戒持守亦準丁衆能完全受持乎四戒已足為極良善之國民矣戊衆受具足五戒今當略説五戒義相前之四衆所受一二三四之戒其一一戒所有義相亦皆準此己衆見後第十二分六不殘殺而仁愛云何不殘殺而仁愛殘謂傷有情類有情類者即動物身體殺謂斷有情類生命雖在殺器亦不得執雖在惡蟲亦但防除非徒不殘殺人類也此則當兵執刑屠畜煮蠶皆在遮止之例稍難通於國法民習故今當依方便凡由國法所起殘殺若戰敵國及刑莠民為避瘟疫滅諸毒蟲此雖以殺止殺之事可權輕重偏開許之則於國民義務無妨礙矣且應了知為國卻敵即是愛利全國人民而對敵人亦復泛仁第令退降非必殘殺故仁義之師本在維持和平也屠獵等業則可改操不能改操則可但受甲乙丙三種戒故在此戒定遮止之略舉戒相如左非依國法勿執用殺人器勿傷殘人身體勿殺害人生命非衛身命勿執持兵器勿傷害諸禽獸魚蟲類生命勿於禽獸等親殺使殺而食其肉勿食見殺聞殺之畜生等肉勿業漁獵勿業牧畜勿業煮蠶繅繭勿屠剝烹燒鳥獸鱉等類願令福樂而無災苦之謂愛推愛於衆之謂仁但欲謀己福樂而除己災苦不恤喪人福樂而致人災苦此雖愛己而不愛人不得謂之仁愛仁愛者愛人如愛己人未有不願己之得福樂而免災苦者也愛人如愛己則亦願人之得福樂而免災苦斯不為殘殺矣亦唯不殘殺而後乃真能仁愛也蓋人心無轡不善則惡必斷絶淨盡於殘殺之業者仁愛之量乃全必純粹充滿於仁愛之行者殘殺之根乃拔試隨國俗之習慣略分仁愛之事相當慈愛兒女當恩愛父母當敬愛師長當保愛幼弱幼弱者不能自全福樂而自脫災苦則當保護之當和愛友朋兄弟當在師長幼弱友朋之間當專愛夫妻是男女間愛情專之夫妻非以不愛父母師長等為專愛當親愛國民本國人皆屬之當尊愛國家代表國家之官吏議員軍人皆屬之當泛愛全世界一切人類當憫愛盡大地一切有情類憫彼愚癡苦惱而不傷害之七不偷盜而義利云何不偷盜而義利偷謂詐騙潛竊盜謂強劫豪奪舉要言之人倫間物主權轉移必依正義不與而取非分而取無功而取皆偷盜耳除直接之偷盜為國法所禁外今當略陳不義利之事以戒之勿賭博勿間蕩勿消費遺産而不事生業勿丐求度日而不圖立身能資生活而遂欲望之謂利致利於宜之謂義功食相準受施相稱知利己須利人即利人為利己是之謂義利人人行義利而後偷盜除矣人之生活於人倫中其交待者廣矣一日所飲食服御居寢者不知經幾何人力而後得之然則食於衆者將何功以償之受於人者將何施以酬之不可不思於直接若農工等間接若商賈官吏軍人教師等之生利事業謀任其一任其一而致其勞矣乃可與社會交為功而相為利人己人人各得其宜試隨國俗之習慣略舉義利之差別當教育兒女當孝養父母當供奉師長當惠施幼弱當輔益友朋當分利親屬當交利國民當納稅守法以擁護國家之權利八不淫邪而禮節云何不淫邪而禮節淫指男女牉合之事不正潔之牉合則為邪淫略舉戒相如左不非人淫除依國法民俗所正式結合之夫妻外不得行淫乃至男與男女與女及一切畜生等均不得行淫不非器淫除夫妻之男女根外若自他身若內外物一切不得取以行淫不非處淫除夫妻之房室床第之外於一切處不得行淫不非時淫於一切不宜行淫時不得行淫又淫者過甚其事之謂邪者旁越其行之謂惟男女之欲情最易過於旁越禮節乃緣之生起焉故曰君子之道造端夫婦合理而行之謂禮適當而止之謂節合理則正而不邪適當則樂而不淫矣自夫妻以至於國群皆有其禮節也無論何事無論何行不明分理不量性能或以責己或以律人至於過甚旁越皆足為害故概加以邪淫之名而居己處群均不可須臾有畔於禮節也此中條目不遑一二舉之但能正乎男女之欲情者斯已得禮節之本矣九不欺誑而誠信云何不欺誑而誠信欺者以術愚人誑者以言詐人誠者公私如一信者言行若符不欺誑始可以誠信積誠信則可絶欺誑人必待社會而生活社會之力持於名契名契之力生於誠信不誠無物吾不得知人不誠信則無社會則斷斷乎可無疑矣上至與國交盟下至兩人相約行事欺妄語言誑罔決無屢行而不失敗者也致誠信者毋自欺也當以一切時一切處不妄語為本十不服亂性情品而調善身心云何不服亂性情品而調善身心凡飲食之含激剌奮興性者皆足以習為嗜好腐敗身心并拂亂其性情血氣由之而肆行於盜邪等事愚者畏果智者慎因故當俱遮止之略舉相如左勿食鴉片勿食各項煙草勿飲酒勿食各項奮興性毒性藥品眠起飲食衣服居處勞動休息聚談研習每日皆有一定常度則身心自然調善矣十一五戒之類別能完全守此者謂受具足五戒受持具足五戒則必為人間之賢士君子矣此在儒門為士希賢此之五戒有性有遮前四性是罪惡故戒戒於人心之危者也後一遮其罪惡故戒戒於道心之微者也何則人倫中之善惡皆以及乎人者為斷若欺誑淫邪等其事必由交待而起不行則已行則必致有害於人害人故即事是罪惡若飲酒等其害但及於身在於他人固無妨害然因飲酒則每致亂行誤事馴至於作殘殺偷盜邪淫欺誑等罪惡故亦不可不遮止也十二增上五戒己衆受增上五戒云何增上五戒依前具足五戒而更增廣高尚之也一畢竟不造一切殘殺業而慈護一切有情生命較前應添條件略舉如下不執兵權刑權不充軍警隨所聞見常贖放生命隨所聞見常和解毆鬥勸同胞勝殘去殺勸各國弭兵息戰二畢竟不造一切偷盜業而力謀一切同胞利益應添條件略舉如下不取非正義之財利不作損害人之營業奉事有道德之聖哲尊顯有才智之賢士教育孤貧之兒女撫養老弱病廢之無告者授乞丐等無業遊民以正當工藝拯濟天災人禍之各地同胞三畢竟不造一切淫邪業而以禮節綱維民俗之風化應添條件略舉如下不踰越公守之分理而行不違反國群之風俗而行常守非人非器非處非時之邪淫戒常勸人守邪淫戒助他人得依民禮國法而正式結合助男女同沐文明道德之化而各得和睦生養之樂四畢竟不作一切欺誑語而以誠信正直人倫之名守應添條件略舉如下不於兩處調唆是非不譏訕嘲笑及種種罵詈不作豔詞綺文及浮夸無實之説合禮義而後言所言必可踐履然諾不渝始終五畢竟不服亂性情品而修潔端治其身心應添條件略舉如下不啖血肉不事華飾不食葷辛不觀戲劇於樂境知足不貪之無厭而自迫於苦境知離不瞋之無已而自害於平等境善觀察不癡暗惛悶而自迷能受持此增上五戒終身守之無失此中若不服兵不食肉等其理由甚長當另出之在人乘則優入聖域而復為天乘之初階此在儒為希聖希天後有必生於三十三天矣此天橫有三十三衆猶一地球而有五洲非謂層疊而上有三十三天也層層而上欲界色界無色界共二十一天此當離人最近之一天耳十三持戒之因果佛教三世因果五趣輪回之説其義深廣不遑敷陳但憑眼前平陂往復必然之理信之可也此之五戒即為人道正因一戒不守必墮三塗即畜生等人人一戒不守則人道斷絶矣守一戒至三戒雖得為人未能完全人格人人守一戒至三戒人道可由之而保存受持四戒人格乃全人人受持四戒人道可由之而蕃昌受持具足五戒則為良士人人受持具足五戒人道可由之而進善受持增上五戒則生生於人類為大聖賢人人受持增上五戒則雖地球變成忉利天界可也十四傳授受持之方法此人乘法六衆人等其皈依師為受戒時當極任自由選擇之既擇受已必嚴遵守非有必不得已外緣勿輕退捨苦迫因緣必不能守則當宣告退捨不可覆藏而故犯之或牽外緣或因不知於所持戒有誤犯者當於佛前發露懺悔悔者悔改除惡即善改過即功故能懺悔即無過惡又或於每夜臨睡時內心省察有過犯則日求減少無過犯則自深慶幸積久行之其善德必昭昭然潤乎身也由甲衆而進於乙衆如是次第進至戊衆己衆亦為進善之徵信仰者於此皈依師受乙衆戒異時亦可別禮一皈依師受丙衆戒餘衆仿此雖有多師所受殊分而不妨亂然所受戒唯仗善心自為監督以守持篤行耳若受之而不身體力行之甚至故犯而又掩藏之徒為自欺不如其已十五斷疑生信疑者曰觀五戒所陳者預及男女之居室口體之嗜欲何其苛人私曲之深侵人自由之甚耶其非特立高行者所樂從乎應之曰自由之説今少衰矣然英國穆勒約翰者生最崇自由之俗而又為最重自由之人者也其著群己權界論曰以小己而居國群之中使所行之事利害無涉於他人則不必謀於其群而其權亦非國群所得與忠告教誨勸獎避絶社會所得加於其身者盡此過斯以往皆為蔑理而侵其應享之自由權者也此所謂行己自由之義也然則雖其人之利害無涉於他人而他人固猶得忠告教誨勸獎避絶之也今五戒所陳者獨第五戒非直接及於他人者耳前之四戒為其不當為其害固及他人為其所當為其利亦及他人者也律以穆勒之論固他人得而干涉今佛教之用為教義則概唯曉喻勸導之而已信受與否既悉聽人心之自擇即擇受矣奉行與否又唯任人心之自持而不藉錙銖強迫之干涉者也即在佛教之住持僧律儀之繁密亦甚矣然其始之出家也既唯自意之所樂出家矣而不能清淨乎律儀在師長則勸告教誨之耳在僧衆則默擯而避絶之耳亦不藉錙銖強迫之干涉者也此真各主其身合意為社之大自由義也使特立高行之士而不崇自由則已設崇自由則佛教正特立高行之士所樂從耳況此人乘正法乃人道原始要終之常德淺之則不唯可通於文明之俗亦可通於僿野之倫深之則不唯可通於開化之邦亦可通於郅治之世其關於生理群誼心術者廣矣知其名相而不窮其原委持之固可冥受其益能窮原竟委而明之則持之當彌堅而行之當彌篤耳何為其不可信從乎故政與教殊勢政之所禁行且直接有不容避之囹圄刀鋸等刑加焉政之所勸行且直接有不容辭之爵位利祿等賞加焉而教戒之所可否者則自擇自受自持自行自信自強自欺自捨而已然佛教人乘戒善依其所可否者而行政之所刑者未嘗不自離政之所賞者未嘗不自合違其所可否者而行政之所刑者未嘗不自合政之所賞者未嘗不自離而效功之美善固有國政之刑賞所不逮者也故曰齊之以刑民免無恥齊之以禮民恥且格然離之合之者在人自致而已握其權力者固在政不在教也教之所施始終不踰於忠告善導示誨勸喻而已此政教分塗異用而相助為禮者也蓋唯明於政教之大分者乃知之耳彼神教名教之混合於政權者非此所論故自有史以來立教無清淨於釋迦者矣疑者又曰佛教人乘正法洵美善矣然人情不皆美善也以至美至善之教義律不皆美善之人情又絶無權力可干預其間而為左右專憑口説筆語而期其自擇自好自受自督自趨自致殆人情之所難能乎應之曰人情雖不必皆美善而美善固人之情也且人情未有不好其自所謂善者也特偏狷之私蒙其明而天演之虐困其生或迫之而過激其行或牽之而苟且其事積習成慣習慣成性陷惡而猶自以為善或者繩以人倫道德乃謂彼其人好惡而不好善耳若解其虐而撤揭其蒙湔其習而援出其陷其心縱未淳善若夫識別善惡之能固有之矣由之而好善矣由之而擇善固服矣何為必不能哉夫人倫道德者人所別於禽獸之理性也生而為人既有合乎此理性而行之可能也況其從幼至長周圍所漸漬者皆人倫也又安可謂其必無合乎理性而行之本能乎有此本能而不現行則隱顯之殊耳緣以感之聲以通之由隱而顯固將沛然而莫之禦佛教人乘正法即人倫道德也本非敻絶恆蹊而為人情所必不可及之事其在淺識之民但能信受雖行持之久而漸明其故亦有益無損也又奚難能之有見覺社叢書一期二期
